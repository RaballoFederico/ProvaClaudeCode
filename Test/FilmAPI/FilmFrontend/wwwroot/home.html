<!DOCTYPE html>
<html class="dark" lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | FilmAPI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/styles.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'primary-container': '#e50914',
                        'secondary': '#e9c176',
                        'background': '#131313',
                        'surface-container': '#201f1f',
                        'surface-container-low': '#1c1b1b',
                        'surface-container-high': '#2a2a2a',
                        'on-surface': '#e5e2e1',
                        'on-surface-variant': '#e9bcb6',
                        'outline-variant': '#5e3f3b'
                    },
                    fontFamily: {
                        headline: ['Epilogue'],
                        body: ['Inter']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
    <div id="navbar-container"></div>
    <div class="flex flex-1">
        <main class="flex-1 p-4 md:p-8 lg:p-12 pb-20 md:pb-0 max-w-7xl mx-auto w-full">
            <section class="mb-8">
                <h1 class="font-headline text-3xl md:text-5xl font-bold text-on-surface">Film Disponibili</h1>
                <p class="text-on-surface-variant mt-2">Sfoglia i film in sala e guarda le prossime proiezioni.</p>
            </section>

            <section class="bg-surface-container-low rounded-xl p-4 md:p-6 border border-outline-variant/20 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <input id="search-film" type="text" placeholder="Cerca film..." class="bg-surface-container-high border-none rounded-lg text-sm" />
                    <select id="filter-categoria" class="bg-surface-container-high border-none rounded-lg text-sm">
                        <option value="">Tutte le categorie</option>
                    </select>
                    <input id="filter-data" type="date" class="bg-surface-container-high border-none rounded-lg text-sm" />
                    <button id="clear-filters" class="bg-surface-container-high hover:bg-[#3a3a3a] rounded-lg text-sm font-semibold">Azzera filtri</button>
                </div>
            </section>

            <section>
                <div id="home-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
                <div id="home-empty" class="hidden bg-surface-container-low rounded-xl p-10 text-center border border-outline-variant/20">
                    <span class="material-symbols-outlined text-5xl text-on-surface-variant/50">event_busy</span>
                    <p class="mt-3 text-on-surface-variant">Nessun film/proiezione trovata con i filtri selezionati.</p>
                </div>
            </section>
        </main>
    </div>
    <div id="footer-container"></div>

    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/route-guard.js"></script>
    <script src="/js/template-loader.js"></script>
    <script src="/js/api-client.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        let films = [];
        let proiezioni = [];
        let cinemas = [];
        let categorie = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await loadComponent('navbar-container', '/components/navbar.html');
            await loadComponent('footer-container', '/components/footer.html');
            await loadData();
            bindFilters();
            applyFilters();
        });

        async function loadData() {
            [films, proiezioni, cinemas, categorie] = await Promise.all([
                ApiClient.get('/films'),
                ApiClient.get('/proiezioni'),
                ApiClient.get('/cinemas'),
                ApiClient.get('/categorie')
            ]);

            const categoriaSelect = document.getElementById('filter-categoria');
            categorie.forEach(cat => {
                const option = document.createElement('option');
                option.value = String(cat.id);
                option.textContent = cat.nome;
                categoriaSelect.appendChild(option);
            });
        }

        function bindFilters() {
            document.getElementById('search-film').addEventListener('input', applyFilters);
            document.getElementById('filter-categoria').addEventListener('change', applyFilters);
            document.getElementById('filter-data').addEventListener('change', applyFilters);
            document.getElementById('clear-filters').addEventListener('click', () => {
                document.getElementById('search-film').value = '';
                document.getElementById('filter-categoria').value = '';
                document.getElementById('filter-data').value = '';
                applyFilters();
            });
        }

        function applyFilters() {
            const search = document.getElementById('search-film').value.toLowerCase().trim();
            const categoriaId = document.getElementById('filter-categoria').value;
            const data = document.getElementById('filter-data').value;

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const futureProiezioni = proiezioni.filter(p => {
                const pDate = new Date(p.data);
                return pDate >= today;
            });

            const grouped = films.map(f => {
                const screenings = futureProiezioni
                    .filter(p => p.filmId === f.id)
                    .sort((a, b) => new Date(`${a.data.split('T')[0]}T${a.ora}`) - new Date(`${b.data.split('T')[0]}T${b.ora}`));
                return { film: f, screenings };
            }).filter(item => item.screenings.length > 0);

            const filtered = grouped.filter(item => {
                const f = item.film;
                const matchSearch = !search || f.titolo.toLowerCase().includes(search);
                const matchCategoria = !categoriaId || (Array.isArray(f.categorieIds) && f.categorieIds.includes(parseInt(categoriaId)));
                const matchData = !data || item.screenings.some(s => s.data && s.data.startsWith(data));
                return matchSearch && matchCategoria && matchData;
            });

            render(filtered);
        }

        function render(items) {
            const grid = document.getElementById('home-grid');
            const empty = document.getElementById('home-empty');

            if (!items.length) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.innerHTML = items.map(({ film, screenings }) => {
                const cats = (film.categorie || []).map(c => `<span class="px-2 py-0.5 rounded-full text-[10px] bg-surface-container-high text-secondary">${escapeHtml(c.nome)}</span>`).join('');
                const preview = screenings.slice(0, 3).map(s => {
                    const cinema = cinemas.find(c => c.id === s.cinemaId);
                    return `
                        <div class="bg-surface-container-high rounded-lg p-2">
                            <p class="text-sm text-on-surface font-semibold">${escapeHtml(cinema?.nome || 'Cinema')}</p>
                            <p class="text-xs text-on-surface-variant">${Utils.formatDateShort(s.data)} - ${Utils.formatTime(s.ora)}</p>
                            ${Auth.isAuthenticated() ? `<button onclick="prenota(${s.id})" class="mt-2 w-full py-1.5 bg-primary-container hover:bg-[#c0000c] text-white rounded text-xs">Prenota</button>` : ''}
                        </div>
                    `;
                }).join('');

                return `
                    <article class="bg-surface-container-low rounded-xl p-4 border border-outline-variant/20">
                        <h3 class="text-lg font-bold text-on-surface">${escapeHtml(film.titolo)}</h3>
                        <div class="flex flex-wrap gap-1 mt-2">${cats}</div>
                        <div class="mt-4 space-y-2">${preview}</div>
                    </article>
                `;
            }).join('');
        }

        async function prenota(proiezioneId) {
            if (!Auth.isAuthenticated()) return;
            try {
                await ApiClient.post('/user/proiezioni-salvate', { proiezioneId });
            } catch {
                // gia salvata
            }
            window.location.href = `/profilo.html?prenota=${proiezioneId}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
</body>
</html>
