<!DOCTYPE html>
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proiezioni - FilmAPI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background-color: #131313;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#e50914",
                        "secondary": "#e9c176",
                        "background": "#131313",
                        "surface": "#131313",
                        "surface-container": "#201f1f",
                        "surface-container-low": "#1c1b1b",
                        "surface-container-high": "#2a2a2a",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#e9bcb6",
                        "outline-variant": "#5e3f3b",
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar semplice -->
    <header class="bg-surface-container border-b border-outline-variant/20 px-4 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="index.html" class="text-xl font-black text-white font-['Manrope'] flex items-center gap-2">
                <span class="material-symbols-outlined text-[#e50914]">movie</span>
                FilmAPI
            </a>
            <div class="flex items-center gap-4">
                <a href="login.html" class="text-sm text-on-surface-variant hover:text-white transition-colors">Accedi</a>
                <a href="register.html" class="px-4 py-2 bg-[#e50914] hover:bg-[#c0000c] text-white rounded-lg text-sm transition-colors">
                    Registrati
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 py-8 px-4">
        <div class="max-w-7xl mx-auto">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black text-white font-['Manrope']">Proiezioni in Programma</h1>
                <p class="text-on-surface-variant mt-2">Scopri i film in programmazione nelle nostre sale</p>
            </div>

            <!-- Loading -->
            <div id="loading" class="flex items-center justify-center py-20">
                <span class="material-symbols-outlined text-4xl animate-spin text-[#e50914]">refresh</span>
            </div>

            <!-- Proiezioni Grid -->
            <div id="proiezioni-grid" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Proiezioni verranno caricate qui -->
            </div>

            <!-- Error -->
            <div id="error" class="hidden text-center py-20">
                <span class="material-symbols-outlined text-4xl text-red-400 mb-4">error</span>
                <p id="error-text" class="text-on-surface-variant"></p>
                <button onclick="loadProiezioni()" class="mt-4 px-4 py-2 bg-[#e50914] hover:bg-[#c0000c] text-white rounded-lg text-sm transition-colors">
                    Riprova
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-surface-container border-t border-outline-variant/20 py-6 px-4">
        <div class="max-w-7xl mx-auto text-center">
            <p class="text-sm text-on-surface-variant">
                2026 FilmAPI. Tutti i diritti riservati.
            </p>
        </div>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/api-client.js"></script>
    <script>
        // Carica proiezioni
        async function loadProiezioni() {
            try {
                showLoading(true);
                
                // Carica proiezioni con dettagli
                const [proiezioni, films, cinemas] = await Promise.all([
                    ApiClient.get('/proiezioni'),
                    ApiClient.get('/films'),
                    ApiClient.get('/cinemas')
                ]);
                
                const filmsMap = new Map(films.map(f => [f.id, f]));
                const cinemasMap = new Map(cinemas.map(c => [c.id, c]));
                
                // Filtra solo proiezioni future
                const oggi = new Date();
                oggi.setHours(0, 0, 0, 0);
                
                const proiezioniFuture = proiezioni.filter(p => {
                    const dataProiezione = new Date(p.data);
                    return dataProiezione >= oggi;
                }).sort((a, b) => new Date(a.data) - new Date(b.data));
                
                showLoading(false);
                renderProiezioni(proiezioniFuture, filmsMap, cinemasMap);
            } catch (error) {
                showLoading(false);
                showError(error.message);
            }
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('hidden', !show);
            document.getElementById('proiezioni-grid').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
        }

        function showError(message) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('proiezioni-grid').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('error-text').textContent = message;
        }

        function renderProiezioni(proiezioni, filmsMap, cinemasMap) {
            const grid = document.getElementById('proiezioni-grid');
            
            if (proiezioni.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <span class="material-symbols-outlined text-4xl text-on-surface-variant/50 mb-4">event_busy</span>
                        <p class="text-on-surface-variant">Nessuna proiezione disponibile al momento</p>
                    </div>
                `;
                grid.classList.remove('hidden');
                return;
            }
            
            grid.innerHTML = proiezioni.map(p => {
                const film = filmsMap.get(p.filmId);
                const cinema = cinemasMap.get(p.cinemaId);
                const data = new Date(p.data);
                const dataFormattata = data.toLocaleDateString('it-IT', { 
                    weekday: 'long', 
                    day: 'numeric', 
                    month: 'long' 
                });
                
                return `
                    <div class="bg-surface-container rounded-2xl overflow-hidden border border-outline-variant/20 hover:border-outline-variant/40 transition-all duration-300 hover:transform hover:scale-[1.02]">
                        <div class="h-48 bg-gradient-to-br from-[#e50914]/30 to-[#c0000c]/30 flex items-center justify-center">
                            <span class="material-symbols-outlined text-6xl text-white/50">movie</span>
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-bold text-white mb-2">${film?.titolo || 'Film'}</h3>
                            <div class="space-y-2 text-sm text-on-surface-variant">
                                <p class="flex items-center gap-2">
                                    <span class="material-symbols-outlined text-[#e50914]">theaters</span>
                                    ${cinema?.nome || 'Cinema'}
                                </p>
                                <p class="flex items-center gap-2">
                                    <span class="material-symbols-outlined text-[#e50914]">location_on</span>
                                    ${cinema?.citta || 'Città'}
                                </p>
                                <p class="flex items-center gap-2">
                                    <span class="material-symbols-outlined text-[#e50914]">calendar_today</span>
                                    ${dataFormattata}
                                </p>
                                <p class="flex items-center gap-2">
                                    <span class="material-symbols-outlined text-[#e50914]">schedule</span>
                                    ${p.ora.substring(0, 5)}
                                </p>
                            </div>
                            <button onclick="salvaProiezione(${p.id})" 
                                class="w-full mt-6 py-3 bg-[#e50914] hover:bg-[#c0000c] text-white rounded-xl font-medium transition-colors flex items-center justify-center gap-2">
                                <span class="material-symbols-outlined">bookmark_add</span>
                                Salva proiezione
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            
            grid.classList.remove('hidden');
        }

        async function salvaProiezione(id) {
            // Se non autenticato, reindirizza al login
            if (!Auth.isAuthenticated()) {
                window.location.href = `/login.html?redirect=${encodeURIComponent(window.location.pathname)}`;
                return;
            }
            
            try {
                await ApiClient.post('/user/proiezioni-salvate', { proiezioneId: id });
                
                if (typeof Utils !== 'undefined') {
                    Utils.showNotification('Proiezione salvata con successo!', 'success');
                } else {
                    alert('Proiezione salvata con successo!');
                }
            } catch (error) {
                if (error.message.includes('già salvata')) {
                    if (typeof Utils !== 'undefined') {
                        Utils.showNotification('Proiezione già salvata', 'info');
                    } else {
                        alert('Proiezione già salvata');
                    }
                } else {
                    if (typeof Utils !== 'undefined') {
                        Utils.showNotification('Errore: ' + error.message, 'error');
                    } else {
                        alert('Errore: ' + error.message);
                    }
                }
            }
        }

        // Carica all'avvio
        loadProiezioni();
    </script>
</body>
</html>
