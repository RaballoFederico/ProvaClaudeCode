<header class="flex justify-between items-center w-full px-4 md:px-8 py-4 bg-[#1C1B1B] sticky top-0 z-50">
    <div class="flex items-center gap-4">
        <button id="mobile-menu-toggle" class="md:hidden p-2 text-on-surface-variant hover:bg-[#2A2A2A] rounded-lg">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <span class="text-xl md:text-2xl font-black text-[#E50914] tracking-tighter uppercase font-['Manrope']">The Cinematic Director's Suite</span>
    </div>
    <div class="flex items-center gap-4 md:gap-6">
        <div class="hidden lg:flex items-center bg-[#2A2A2A] rounded-full px-4 py-1.5 gap-3">
            <span class="material-symbols-outlined text-on-surface-variant text-sm">search</span>
            <input class="bg-transparent border-none focus:ring-0 text-sm text-on-surface w-48 placeholder:text-on-surface-variant/50" placeholder="Search..." type="text"/>
        </div>
        <div class="flex items-center gap-2 md:gap-4">
            <button class="p-2 text-on-surface-variant hover:bg-[#2A2A2A] rounded-full transition-all duration-300">
                <span class="material-symbols-outlined">notifications</span>
            </button>
            <button class="p-2 text-on-surface-variant hover:bg-[#2A2A2A] rounded-full transition-all duration-300">
                <span class="material-symbols-outlined">settings</span>
            </button>
            <div class="w-8 h-8 md:w-10 md:h-10 rounded-full overflow-hidden border-2 border-outline-variant/30">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop" alt="User avatar" class="w-full h-full object-cover"/>
            </div>
        </div>
    </div>
</header>
