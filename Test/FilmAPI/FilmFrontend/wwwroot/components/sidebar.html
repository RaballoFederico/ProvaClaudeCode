<script>
    // Mostra/nascondi link admin in base ai ruoli
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof Auth !== 'undefined' && Auth.isAuthenticated()) {
            const user = Auth.getUser();
            if (user && user.ruoli) {
                const isPowerUser = user.ruoli.includes('Admin') || user.ruoli.includes('PowerUser');
                const adminLinks = document.getElementById('admin-links');
                if (adminLinks && isPowerUser) {
                    adminLinks.classList.remove('hidden');
                }
            }
        }
        
        // Highlight link attivo
        const currentPath = window.location.pathname;
        document.querySelectorAll('.nav-link').forEach(link => {
            if (link.getAttribute('href') === currentPath.split('/').pop()) {
                link.classList.add('text-[#E50914]', 'bg-[#2A2A2A]/50');
            }
        });
    });
</script>
