<!DOCTYPE html>
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Miei Biglietti | FilmAPI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
    <div id="navbar-container"></div>
    <div class="flex flex-1">
        <div id="sidebar-container"></div>
        <main class="flex-1 p-4 md:p-8 lg:p-10 pb-20 md:pb-6">
            <section class="mb-6">
                <h1 class="font-headline text-3xl md:text-4xl font-bold">I Miei Biglietti</h1>
                <p class="text-on-surface-variant mt-2">Storico biglietti acquistati e codici QR di validazione.</p>
            </section>

            <section id="tickets-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></section>
            <div id="empty" class="hidden text-on-surface-variant">Nessun biglietto disponibile.</div>
        </main>
    </div>
    <div id="footer-container"></div>

    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/route-guard.js"></script>
    <script src="/js/template-loader.js"></script>
    <script src="/js/api-client.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllComponents();
            await loadTickets();
        });

        async function loadTickets() {
            try {
                Utils.showLoading();
                const tickets = await ApiClient.get('/user/biglietti');
                const grid = document.getElementById('tickets-grid');
                const empty = document.getElementById('empty');

                if (!tickets.length) {
                    grid.innerHTML = '';
                    empty.classList.remove('hidden');
                    return;
                }

                empty.classList.add('hidden');
                grid.innerHTML = tickets.map(t => `
                    <article class="bg-surface-container rounded-xl border border-outline-variant/20 p-4">
                        <div class="flex items-center justify-between mb-2">
                            <div class="font-semibold">Biglietto #${t.id}</div>
                            <div class="text-xs ${t.validato ? 'text-emerald-400' : 'text-amber-300'}">${t.validato ? 'Validato' : 'Da validare'}</div>
                        </div>
                        <div class="text-sm text-on-surface-variant">Acquisto: ${t.acquistoId}</div>
                        <div class="text-sm text-on-surface-variant">Posto: ${escapeHtml(t.posto)}</div>
                        <div class="text-sm text-on-surface-variant">Sala: ${t.salaNumero} (${escapeHtml(t.tipologiaSala)})</div>
                        <div class="text-sm text-on-surface-variant">Prezzo: ${Number(t.prezzo).toFixed(2)} EUR</div>
                        <div class="text-xs font-mono mt-2 break-all text-on-surface-variant">${escapeHtml(t.codiceHash)}</div>
                        <a href="${escapeHtml(t.qRCodeUrl || t.qrcodeUrl || '#')}" target="_blank" class="mt-3 inline-block px-3 py-2 bg-primary-container text-white rounded-lg text-sm">Apri QR URL</a>
                    </article>
                `).join('');
            } catch (e) {
                Utils.showNotification(e.message || 'Errore caricamento biglietti', 'error');
            } finally {
                Utils.hideLoading();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
</body>
</html>
