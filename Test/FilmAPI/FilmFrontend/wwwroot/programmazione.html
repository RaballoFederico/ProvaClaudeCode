<!DOCTYPE html>
<html class="dark" lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programmazione | FilmAPI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/styles.css">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#e50914",
                        "secondary": "#e9c176",
                        "background": "#131313",
                        "surface": "#131313",
                        "surface-container": "#201f1f",
                        "surface-container-low": "#1c1b1b",
                        "surface-container-high": "#2a2a2a",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#e9bcb6",
                        "outline-variant": "#5e3f3b"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
    <div id="navbar-container"></div>
    <div class="flex flex-1">
        <div id="sidebar-container"></div>
        <main class="flex-1 p-4 md:p-8 lg:p-12 pb-20 md:pb-0">
            <section class="mb-8">
                <h1 class="font-headline text-3xl md:text-5xl font-bold text-white">Programmazione</h1>
                <p class="text-on-surface-variant mt-2">Filtra per citta, data e categoria e prenota in un click.</p>
            </section>

            <section class="bg-surface-container-low rounded-xl p-4 md:p-6 border border-outline-variant/20 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <select id="filter-citta" class="bg-surface-container-high border-none rounded-lg text-sm">
                        <option value="">Tutte le citta</option>
                    </select>
                    <input id="filter-data" type="date" class="bg-surface-container-high border-none rounded-lg text-sm" />
                    <select id="filter-categoria" class="bg-surface-container-high border-none rounded-lg text-sm">
                        <option value="">Tutte le categorie</option>
                    </select>
                    <button id="clear-filters" class="bg-surface-container-high hover:bg-[#3a3a3a] rounded-lg text-sm font-semibold">Azzera filtri</button>
                </div>
            </section>

            <section>
                <div id="programmazione-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
                <div id="programmazione-empty" class="hidden bg-surface-container-low rounded-xl p-10 text-center border border-outline-variant/20">
                    <span class="material-symbols-outlined text-5xl text-on-surface-variant/50">event_busy</span>
                    <p class="mt-3 text-on-surface-variant">Nessuna proiezione trovata con i filtri selezionati.</p>
                </div>
            </section>
        </main>
    </div>
    <div id="footer-container"></div>

    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/route-guard.js"></script>
    <script src="/js/template-loader.js"></script>
    <script src="/js/api-client.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        let films = [];
        let proiezioni = [];
        let cinemas = [];
        let categorie = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllComponents();
            await loadData();
            bindFilters();
            applyFilters();
        });

        async function loadData() {
            [films, proiezioni, cinemas, categorie] = await Promise.all([
                ApiClient.get('/films'),
                ApiClient.get('/proiezioni'),
                ApiClient.get('/cinemas'),
                ApiClient.get('/categorie')
            ]);

            const cittaSet = [...new Set(cinemas.map(c => c.citta))].sort();
            const cittaSelect = document.getElementById('filter-citta');
            cittaSet.forEach(citta => {
                const option = document.createElement('option');
                option.value = citta;
                option.textContent = citta;
                cittaSelect.appendChild(option);
            });

            const categoriaSelect = document.getElementById('filter-categoria');
            categorie.forEach(cat => {
                const option = document.createElement('option');
                option.value = String(cat.id);
                option.textContent = cat.nome;
                categoriaSelect.appendChild(option);
            });
        }

        function bindFilters() {
            document.getElementById('filter-citta').addEventListener('change', applyFilters);
            document.getElementById('filter-data').addEventListener('change', applyFilters);
            document.getElementById('filter-categoria').addEventListener('change', applyFilters);
            document.getElementById('clear-filters').addEventListener('click', () => {
                document.getElementById('filter-citta').value = '';
                document.getElementById('filter-data').value = '';
                document.getElementById('filter-categoria').value = '';
                applyFilters();
            });
        }

        function applyFilters() {
            const citta = document.getElementById('filter-citta').value;
            const data = document.getElementById('filter-data').value;
            const categoriaId = document.getElementById('filter-categoria').value;

            const filtered = proiezioni.filter(p => {
                const cinema = cinemas.find(c => c.id === p.cinemaId);
                const film = films.find(f => f.id === p.filmId);
                const matchCitta = !citta || (cinema && cinema.citta === citta);
                const matchData = !data || (p.data && p.data.startsWith(data));
                const matchCategoria = !categoriaId || (film && Array.isArray(film.categorieIds) && film.categorieIds.includes(parseInt(categoriaId)));
                return matchCitta && matchData && matchCategoria;
            });

            render(filtered);
        }

        function render(items) {
            const grid = document.getElementById('programmazione-grid');
            const empty = document.getElementById('programmazione-empty');

            if (!items.length) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.innerHTML = items.map(p => {
                const cinema = cinemas.find(c => c.id === p.cinemaId);
                const film = films.find(f => f.id === p.filmId);
                const cats = (film?.categorie || []).map(c => `<span class="px-2 py-0.5 rounded-full text-[10px] bg-surface-container-high text-secondary">${escapeHtml(c.nome)}</span>`).join('');
                return `
                    <article class="bg-surface-container-low rounded-xl p-4 border border-outline-variant/20">
                        <h3 class="text-lg font-bold text-white">${escapeHtml(film?.titolo || 'Film')}</h3>
                        <p class="text-sm text-on-surface-variant mt-1">${escapeHtml(cinema?.nome || 'Cinema')} - ${escapeHtml(cinema?.citta || '')}</p>
                        <p class="text-sm text-on-surface-variant">${Utils.formatDateShort(p.data)} alle ${Utils.formatTime(p.ora)}</p>
                        <div class="flex flex-wrap gap-1 mt-2">${cats}</div>
                        <div class="mt-4">
                            <button onclick="prenota(${p.id})" class="w-full py-2 bg-primary-container hover:bg-[#c0000c] rounded-lg text-sm font-semibold text-white">Prenota</button>
                        </div>
                    </article>
                `;
            }).join('');
        }

        async function prenota(proiezioneId) {
            if (!Auth.isAuthenticated()) {
                window.location.href = `/login.html?redirect=${encodeURIComponent('/profilo.html?prenota=' + proiezioneId)}`;
                return;
            }

            try {
                await ApiClient.post('/user/proiezioni-salvate', { proiezioneId });
            } catch {
                // gia salvata: si procede comunque verso profilo
            }

            window.location.href = `/profilo.html?prenota=${proiezioneId}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
</body>
</html>
