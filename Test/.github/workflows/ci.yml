name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend
        run: dotnet restore backend/FilmAPI.csproj

      - name: Build backend
        run: dotnet build backend/FilmAPI.csproj --configuration Release --no-restore

      - name: Restore frontend
        run: dotnet restore frontend/FilmFrontend.csproj

      - name: Build frontend
        run: dotnet build frontend/FilmFrontend.csproj --configuration Release --no-restore

      - name: Restore backend tests
        run: dotnet restore backend/tests/FilmAPI.Tests.csproj

      - name: Run backend tests
        run: dotnet test backend/tests/FilmAPI.Tests.csproj --configuration Release --no-build
