<!DOCTYPE html>
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Nostri Cinema | FilmAPI</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-light-32.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-dark-32.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-dark-32.png">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon-light.ico" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon-dark.ico" media="(prefers-color-scheme: dark)">
    <link rel="shortcut icon" type="image/x-icon" href="/assets/icons/favicon-dark.ico">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/styles.css">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#de3a1f",
                        "background": "#121415",
                        "surface-container": "#1b1f20",
                        "surface-container-high": "#252b2d",
                        "on-surface": "#f3f1eb",
                        "on-surface-variant": "#b9b8ad",
                        "outline-variant": "#384043"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Outfit"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
    <div id="navbar-container"></div>
    <div class="flex flex-1">
        <div id="sidebar-container"></div>
        <main class="page-shell flex-1 p-4 md:p-8 lg:p-10 pb-20 md:pb-6">
            <section class="hero-banner p-6 md:p-8 mb-6 reveal-up">
                <span class="section-eyebrow mb-3 inline-flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">location_city</span>
                    Le nostre strutture
                </span>
                <h1 class="font-headline text-3xl md:text-5xl font-semibold">I Nostri Cinema</h1>
                <p class="text-on-surface-variant mt-2">Scegli una struttura e apri la pagina dedicata con catalogo completo, locandine e dettagli film.</p>
                <div class="mt-4 flex flex-wrap gap-2 text-xs">
                    <span id="cinema-count-chip" class="app-chip">
                        <span class="material-symbols-outlined text-sm">theaters</span>
                        0 cinema disponibili
                    </span>
                    <span id="preferred-cinema-chip" class="app-chip">
                        <span class="material-symbols-outlined text-sm">favorite</span>
                        Nessun preferito
                    </span>
                </div>
                <div class="mt-4">
                    <a href="/profilo.html#prenotazioni" class="app-btn app-btn-secondary hover-lift">
                        <span class="material-symbols-outlined text-sm">movie</span>
                        Vedi le mie proiezioni
                    </a>
                </div>
            </section>

            <section class="app-card p-4 mb-6 reveal-up delay-1">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <div class="md:col-span-2">
                        <label for="cinema-search" class="text-xs text-on-surface-variant uppercase tracking-[0.16em]">Cerca cinema</label>
                        <input id="cinema-search" type="text" placeholder="Nome o citta..." class="mt-1 w-full rounded-xl border border-outline-variant/30 bg-surface-container-high px-3 py-2.5 text-sm">
                    </div>
                    <div>
                        <label for="cinema-sort" class="text-xs text-on-surface-variant uppercase tracking-[0.16em]">Ordina</label>
                        <select id="cinema-sort" class="mt-1 w-full rounded-xl border border-outline-variant/30 bg-surface-container-high px-3 py-2.5 text-sm">
                            <option value="name">Nome A-Z</option>
                            <option value="city">Citta A-Z</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 mb-6 reveal-up delay-2" id="cinemas-grid"></section>
        </main>
    </div>
    <div id="footer-container"></div>

    <script src="/js/theme.js"></script>
    <script src="/js/api-config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/route-guard.js"></script>
    <script src="/js/template-loader.js"></script>
    <script src="/js/api-client.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        let cinemas = [];
        let cinemaSearchQuery = '';
        let cinemaSortMode = 'name';
        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllComponents();
            bindFilters();
            await loadCinemas();
        });

        window.addEventListener('pageshow', async (event) => {
            if (event.persisted) {
                await loadCinemas();
            }
        });

        async function loadCinemas() {
            try {
                Utils.showLoading();
                cinemas = await ApiClient.get('/cinemas');
                renderCinemas();
            } catch (e) {
                Utils.showNotification(e.message || 'Errore caricamento cinema', 'error');
            } finally {
                Utils.hideLoading();
            }
        }

        function bindFilters() {
            const searchInput = document.getElementById('cinema-search');
            const sortSelect = document.getElementById('cinema-sort');

            if (searchInput) {
                searchInput.addEventListener('input', () => {
                    cinemaSearchQuery = String(searchInput.value || '').trim().toLowerCase();
                    renderCinemas();
                });
            }

            if (sortSelect) {
                sortSelect.addEventListener('change', () => {
                    cinemaSortMode = sortSelect.value === 'city' ? 'city' : 'name';
                    renderCinemas();
                });
            }
        }

        function renderCinemas() {
            const grid = document.getElementById('cinemas-grid');
            const selectedCinemaId = parseInt(localStorage.getItem('selectedCinema') || '0');
            const preferred = cinemas.find((x) => x.id === selectedCinemaId) || null;
            document.getElementById('cinema-count-chip').innerHTML = `<span class="material-symbols-outlined text-sm">theaters</span>${cinemas.length} cinema disponibili`;
            document.getElementById('preferred-cinema-chip').innerHTML = `<span class="material-symbols-outlined text-sm">favorite</span>${preferred ? `${escapeHtml(preferred.nome)} (${escapeHtml(preferred.citta)})` : 'Nessun preferito'}`;

            let filtered = [...cinemas];
            if (cinemaSearchQuery) {
                filtered = filtered.filter((c) => {
                    const hay = `${c.nome || ''} ${c.citta || ''}`.toLowerCase();
                    return hay.includes(cinemaSearchQuery);
                });
            }

            filtered.sort((a, b) => {
                if (cinemaSortMode === 'city') {
                    const cmp = String(a.citta || '').localeCompare(String(b.citta || ''), 'it');
                    if (cmp !== 0) return cmp;
                }
                return String(a.nome || '').localeCompare(String(b.nome || ''), 'it');
            });

            if (!filtered.length) {
                grid.innerHTML = `<div class="col-span-full text-sm text-on-surface-variant">Nessun cinema trovato con i filtri attivi.</div>`;
                return;
            }

            grid.innerHTML = filtered.map((c, index) => `
                <article class="app-card border ${selectedCinemaId === c.id ? 'border-primary-container/60' : 'border-outline-variant/20'} overflow-hidden hover-lift reveal-up" style="animation-delay:${(index % 8) * 0.04}s">
                    <div class="h-28 relative overflow-hidden">
                        <img
                            src="${getCinemaImageUrl(c)}"
                            alt="Cinema ${escapeHtml(c.nome)}"
                            loading="lazy"
                            class="absolute inset-0 w-full h-full object-cover opacity-75"
                            onerror="this.style.display='none'; this.parentElement.classList.add('bg-gradient-to-r','from-primary-container/30','via-surface-container-high','to-transparent')"
                        >
                        <div class="absolute inset-0 bg-gradient-to-r from-black/30 via-transparent to-black/10"></div>
                    </div>
                    <div class="p-4 -mt-6">
                        <div class="app-chip text-[11px] ${selectedCinemaId === c.id ? 'border-primary-container/40 text-primary-container bg-primary-container/10' : ''}">${selectedCinemaId === c.id ? 'Cinema attivo' : 'Disponibile'}</div>
                        <h3 class="font-headline text-lg font-bold mt-2">${escapeHtml(c.nome)}</h3>
                        <p class="text-sm text-on-surface-variant mt-1">${escapeHtml(c.citta)} - ${escapeHtml(c.indirizzo)}</p>
                        <div class="mt-3 text-xs text-on-surface-variant">Codice locale: ${escapeHtml(c.codiceLocale || 'N/D')}</div>
                    </div>
                    <div class="px-4 pb-4 mt-2 flex flex-wrap gap-2">
                        <button type="button" data-action="open-programmazione" data-cinema-id="${c.id}" class="app-btn app-btn-primary hover-lift">Vedi Programmazione</button>
                        <button type="button" data-action="set-preferred" data-cinema-id="${c.id}" class="app-btn app-btn-secondary hover-lift">Imposta Preferito</button>
                    </div>
                </article>
            `).join('');

            bindCinemaActions();
        }

        function bindCinemaActions() {
            const grid = document.getElementById('cinemas-grid');

            grid.querySelectorAll('[data-action="open-programmazione"]').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.getAttribute('data-cinema-id') || '0');
                    if (!id) return;
                    persistCinemaSelection(id);
                    window.location.assign(`/programmazione.html?cinemaId=${id}`);
                });
            });

            grid.querySelectorAll('[data-action="set-preferred"]').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const id = parseInt(btn.getAttribute('data-cinema-id') || '0');
                    if (!id) return;
                    await setPreferredCinema(id);
                });
            });
        }

        function persistCinemaSelection(id) {
            localStorage.setItem('selectedCinema', String(id));
            if (Auth.isAuthenticated()) {
                ApiClient.put(`/user/cinema-preferito?cinemaId=${id}`).catch(() => {});
            }
        }

        async function setPreferredCinema(id) {
            localStorage.setItem('selectedCinema', String(id));
            if (Auth.isAuthenticated()) {
                try {
                    await ApiClient.put(`/user/cinema-preferito?cinemaId=${id}`);
                    Utils.showNotification('Cinema preferito aggiornato', 'success');
                } catch {
                    Utils.showNotification('Preferenza salvata solo in locale', 'warning');
                }
                return;
            }
            Utils.showNotification('Accedi per salvare il cinema preferito sul profilo', 'info');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        function getCinemaImageUrl(cinema) {
            const explicitImageUrl = (cinema?.imageUrl || '').trim();
            if (explicitImageUrl) {
                return explicitImageUrl;
            }

            const seedBase = `${cinema?.nome || 'cinema'}-${cinema?.citta || 'italia'}`.toLowerCase();
            const safeSeed = seedBase.replace(/[^a-z0-9-]/g, '-');
            return `https://picsum.photos/seed/${safeSeed}/1200/800`;
        }
    </script>
</body>
</html>
