<!DOCTYPE html>
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Nostri Cinema | FilmAPI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/styles.css">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#de3a1f",
                        "background": "#121415",
                        "surface-container": "#1b1f20",
                        "surface-container-high": "#252b2d",
                        "on-surface": "#f3f1eb",
                        "on-surface-variant": "#b9b8ad",
                        "outline-variant": "#384043"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Outfit"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
    <div id="navbar-container"></div>
    <div class="flex flex-1">
        <div id="sidebar-container"></div>
        <main class="flex-1 p-4 md:p-8 lg:p-10 pb-20 md:pb-6">
            <section class="hero-banner p-6 md:p-8 mb-6 reveal-up">
                <span class="badge-soft mb-3">
                    <span class="material-symbols-outlined text-sm">location_city</span>
                    Le nostre strutture
                </span>
                <h1 class="font-headline text-3xl md:text-5xl font-semibold">I Nostri Cinema</h1>
                <p class="text-on-surface-variant mt-2">Scegli una struttura e consulta la programmazione del giorno.</p>
            </section>

            <section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 mb-6 reveal-up delay-1" id="cinemas-grid"></section>

            <section id="cinema-program-section" class="hidden bg-surface-container rounded-2xl border border-outline-variant/20 p-5 reveal-up delay-2">
                <div class="flex items-center justify-between mb-4">
                    <h2 id="cinema-program-title" class="font-headline text-xl font-bold">Programmazione cinema</h2>
                    <div class="flex items-center gap-2">
                        <button id="prev-date" class="p-2 rounded-lg bg-surface-container-high"><span class="material-symbols-outlined">chevron_left</span></button>
                        <button id="next-date" class="p-2 rounded-lg bg-surface-container-high"><span class="material-symbols-outlined">chevron_right</span></button>
                    </div>
                </div>
                <div id="date-label" class="text-sm text-on-surface-variant mb-4"></div>
                <div id="cinema-program-list" class="space-y-4"></div>
            </section>
        </main>
    </div>
    <div id="footer-container"></div>

    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/route-guard.js"></script>
    <script src="/js/template-loader.js"></script>
    <script src="/js/api-client.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        let cinemas = [];
        let selectedCinemaId = null;
        let selectedDate = new Date();

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllComponents();
            bindDateNav();
            await loadCinemas();

            const qp = new URLSearchParams(window.location.search);
            const cinemaId = qp.get('IdCinema');
            if (cinemaId) selectCinema(parseInt(cinemaId));
        });

        async function loadCinemas() {
            try {
                Utils.showLoading();
                cinemas = await ApiClient.get('/cinemas');
                renderCinemas();
            } catch (e) {
                Utils.showNotification(e.message || 'Errore caricamento cinema', 'error');
            } finally {
                Utils.hideLoading();
            }
        }

        function renderCinemas() {
            const grid = document.getElementById('cinemas-grid');
            grid.innerHTML = cinemas.map((c, index) => `
                <article class="bg-surface-container rounded-xl border border-outline-variant/20 p-4 hover-lift reveal-up" style="animation-delay:${(index % 8) * 0.04}s">
                    <h3 class="font-headline text-lg font-bold">${escapeHtml(c.nome)}</h3>
                    <p class="text-sm text-on-surface-variant mt-1">${escapeHtml(c.citta)} - ${escapeHtml(c.indirizzo)}</p>
                    <div class="mt-3 text-xs text-on-surface-variant">Codice locale: ${escapeHtml(c.codiceLocale || 'N/D')}</div>
                    <button onclick="selectCinema(${c.id})" class="mt-4 px-4 py-2 bg-primary-container text-white rounded-lg text-sm hover-lift">Vedi Programmazione</button>
                </article>
            `).join('');
        }

        function bindDateNav() {
            document.getElementById('prev-date').addEventListener('click', () => {
                selectedDate = new Date(selectedDate.getTime() - 24 * 60 * 60 * 1000);
                if (selectedCinemaId) loadCinemaProgrammazione();
            });
            document.getElementById('next-date').addEventListener('click', () => {
                selectedDate = new Date(selectedDate.getTime() + 24 * 60 * 60 * 1000);
                if (selectedCinemaId) loadCinemaProgrammazione();
            });
        }

        async function selectCinema(id) {
            selectedCinemaId = id;
            history.replaceState({}, '', `/my-cinemas.html?IdCinema=${id}`);

            localStorage.setItem('selectedCinema', String(id));
            if (Auth.isAuthenticated()) {
                try {
                    await ApiClient.put(`/user/cinema-preferito?cinemaId=${id}`);
                } catch {
                }
            }

            await loadCinemaProgrammazione();
        }

        async function loadCinemaProgrammazione() {
            const sec = document.getElementById('cinema-program-section');
            const list = document.getElementById('cinema-program-list');
            const label = document.getElementById('date-label');
            const title = document.getElementById('cinema-program-title');

            const cinema = cinemas.find(c => c.id === selectedCinemaId);
            title.textContent = cinema ? `Programmazione ${cinema.nome}` : 'Programmazione cinema';

            const dateStr = selectedDate.toISOString().slice(0, 10);
            label.textContent = selectedDate.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

            const items = await ApiClient.get(`/cinema/${selectedCinemaId}/programmazione?data=${dateStr}`);
            sec.classList.remove('hidden');

            if (!items.length) {
                list.innerHTML = `<div class="text-on-surface-variant">Nessuno show per questa data.</div>`;
                return;
            }

            const groupedFilm = {};
            items.forEach(s => {
                if (!groupedFilm[s.filmId]) groupedFilm[s.filmId] = { titolo: s.filmTitolo, slots: [] };
                groupedFilm[s.filmId].slots.push(s);
            });

            list.innerHTML = Object.keys(groupedFilm).map(fid => {
                const block = groupedFilm[fid];
                const byTipo = {};
                block.slots.forEach(x => {
                    const key = x.tipologiaSala || 'ALTRO';
                    if (!byTipo[key]) byTipo[key] = [];
                    byTipo[key].push(x);
                });

                return `
                    <article class="bg-surface-container-high rounded-xl p-4">
                        <h3 class="font-headline text-lg font-bold mb-2">${escapeHtml(block.titolo)}</h3>
                        ${Object.keys(byTipo).map(t => `
                            <div class="mb-2">
                                <div class="text-sm text-on-surface-variant mb-1">${escapeHtml(t)}</div>
                                <div class="flex flex-wrap gap-2">
                                    ${byTipo[t].map(s => `
                                        <button onclick="goBuy(${s.id}, ${s.filmId}, ${s.salaId})" class="px-3 py-2 rounded-full bg-primary-container/80 hover:bg-primary-container text-white text-sm">${(s.oraInizio || '').substring(0, 5)}</button>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </article>
                `;
            }).join('');
        }

        function goBuy(showId, filmId, salaId) {
            const url = `/acquista.html?IdCinema=${selectedCinemaId}&IdFilm=${filmId}&IdSala=${salaId}&IdShow=${showId}`;
            if (!Auth.isAuthenticated()) {
                window.location.href = `/login.html?redirect=${encodeURIComponent(url)}`;
                return;
            }
            window.location.href = url;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
</body>
</html>
