<!-- DOC: Pagina UI 'proiezioni': definisce struttura, sezioni e hook JS per il flusso utente. -->
<html class="dark" lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proiezioni | FilmAPI</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-light-32.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-dark-32.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-dark-32.png">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon-light.ico" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon-dark.ico" media="(prefers-color-scheme: dark)">
    <link rel="shortcut icon" type="image/x-icon" href="/assets/icons/favicon-dark.ico">
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- DOC-BLOCK: Script inline pagina: gestisce eventi UI, stato locale e integrazione con ApiClient. -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#e50914",
                        "secondary": "#e9c176",
                        "background": "#131313",
                        "surface": "#131313",
                        "surface-container": "#201f1f",
                        "surface-container-low": "#1c1b1b",
                        "surface-container-high": "#2a2a2a",
                        "surface-container-highest": "#353534",
                        "surface-container-lowest": "#0e0e0e",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#e9bcb6",
                        "outline-variant": "#5e3f3b",
                        "tertiary-container": "#0076c5",
                        "tertiary": "#9ecaff",
                        "error-container": "#93000a",
                        "error": "#ffb4ab",
                        "secondary-container": "#604403",
                        "on-secondary-container": "#dab36a",
                        "on-primary-container": "#fff7f6",
                        "on-tertiary-container": "#f8f9ff",
                        "inverse-primary": "#c0000c"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                    }
                },
            },
        }
    </script>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
    <div id="navbar-container"></div>
    
    <div class="flex flex-1">
        <div id="sidebar-container"></div>
        
        <!-- DOC-BLOCK: Sezione principale: contiene il flusso operativo della pagina. -->
        <main class="page-shell flex-1 p-4 md:p-8 lg:p-12 overflow-x-hidden pb-20 md:pb-0">
            <!-- DOC-BLOCK: Blocco funzionale UI: raggruppa contenuti/azioni omogenee della pagina. -->
            <section class="hero-banner p-6 md:p-8 mb-8 md:mb-10 reveal-up">
                <span class="badge-soft mb-3">
                    <span class="material-symbols-outlined text-sm">schedule_send</span>
                    Planner proiezioni
                </span>
                <h2 class="text-3xl md:text-5xl font-semibold font-headline tracking-tight text-on-surface">Controllo Operazioni</h2>
                <p class="text-on-surface-variant tracking-wide text-sm mt-2">Calendario operativo per monitorare show in corso, futuri e conclusi.</p>
            </section>

            <!-- DOC-BLOCK: Blocco funzionale UI: raggruppa contenuti/azioni omogenee della pagina. -->
            <section class="space-y-6 reveal-up delay-1">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                    <div class="space-y-1">
                        <h3 class="text-xl md:text-2xl font-headline text-on-surface">Proiezioni Attive</h3>
                        <p class="text-on-surface-variant text-sm font-body">Timeline delle proiezioni cinematografiche programmate.</p>
                    </div>
                    <button id="new-proiezione-btn" onclick="openCreateModal()" class="bg-primary-container text-on-primary-container px-4 md:px-6 py-2 md:py-3 rounded-xl font-headline font-bold text-sm flex items-center gap-2 hover:scale-95 transition-all duration-150 shadow-lg shadow-primary-container/20 hover-lift">
                        <span class="material-symbols-outlined">schedule_send</span>
                        Nuova Proiezione
                    </button>
                </div>

                <div id="projections-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 reveal-up delay-2">
                </div>
                <div id="empty-state" class="hidden bg-surface-container-low rounded-xl p-12 text-center">
                    <span class="material-symbols-outlined text-5xl text-on-surface-variant opacity-50">event_busy</span>
                    <p class="mt-4 text-on-surface-variant text-lg">Nessuna proiezione programmata</p>
                    <p class="text-on-surface-variant/60 text-sm mt-1">Crea la tua prima proiezione.</p>
                </div>
            </section>
        </main>
    </div>

    <div id="footer-container"></div>

    <div id="modal-container"></div>

    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/theme.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/api-config.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/auth.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/route-guard.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/template-loader.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/api-client.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/utils.js"></script>
    <!-- DOC-BLOCK: Script inline pagina: gestisce eventi UI, stato locale e integrazione con ApiClient. -->
    <script>
        let currentProiezioni = [];
        let allFilms = [];
        let allCinemas = [];
        const isManager = () => typeof Auth !== 'undefined' && Auth.canManageCatalog();

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllComponents();
            applyRoleUI();
            await loadData();

            const params = new URLSearchParams(window.location.search);
            if (params.get('action') === 'create') {
                openCreateModal();
            }
        });

        async function loadData() {
            try {
                Utils.showLoading();
                const projectionWindow = getDefaultProjectionWindow();
                [currentProiezioni, allFilms, allCinemas] = await Promise.all([
                    ApiClient.get(`/proiezioni?fromDate=${projectionWindow.fromDate}&toDate=${projectionWindow.toDate}&take=1200`),
                    ApiClient.get('/films?summary=true&limit=500'),
                    ApiClient.get('/cinemas')
                ]);
                renderProjections();
            } catch (error) {
                console.error('Error loading data:', error);
                Utils.showNotification('Errore nel caricamento dei dati', 'error');
            } finally {
                Utils.hideLoading();
            }
        }

        function getDefaultProjectionWindow() {
            const now = new Date();
            const from = new Date(now);
            from.setDate(from.getDate() - 7);
            const to = new Date(now);
            to.setDate(to.getDate() + 60);

            return {
                fromDate: formatDateToIso(from),
                toDate: formatDateToIso(to)
            };
        }

        function formatDateToIso(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function applyRoleUI() {
            const canManage = isManager();
            const newProiezioneBtn = document.getElementById('new-proiezione-btn');
            if (newProiezioneBtn) newProiezioneBtn.classList.toggle('hidden', !canManage);
        }

        function getStatusBadge(proiezione) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const projDate = new Date(proiezione.data);
            projDate.setHours(0, 0, 0, 0);

            if (projDate.getTime() === today.getTime()) {
                return { text: 'Now Showing', class: 'bg-primary-container/10 text-primary-container' };
            } else if (projDate < today) {
                return { text: 'Ended', class: 'bg-surface-variant/20 text-on-surface-variant' };
            } else {
                return { text: 'Scheduled', class: 'bg-secondary-container/20 text-secondary' };
            }
        }

        function renderProjections() {
            const grid = document.getElementById('projections-grid');
            const emptyState = document.getElementById('empty-state');

            if (currentProiezioni.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            
            grid.innerHTML = currentProiezioni.map((proiezione, index) => {
                const film = allFilms.find(f => f.id === proiezione.filmId);
                const cinema = allCinemas.find(c => c.id === proiezione.cinemaId);
                const status = getStatusBadge(proiezione);

                return `
                    <div class="group relative bg-surface-container-low rounded-xl overflow-hidden p-4 md:p-6 border border-outline-variant/10 hover:border-primary-container/40 transition-all duration-500 hover-lift reveal-up"
                         style="animation-delay:${(index % 8) * 0.04}s">
                        <div class="flex justify-between items-start mb-4 md:mb-6">
                            <span class="text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded ${status.class}">${status.text}</span>
                            <span class="text-xs font-mono text-on-surface-variant opacity-50">PRJ-${String(proiezione.id).padStart(4, '0')}</span>
                        </div>
                        <div class="space-y-3 md:space-y-4">
                            <div>
                                <p class="text-[10px] md:text-xs text-on-surface-variant uppercase tracking-tighter mb-1">Selezione Film</p>
                                <h4 class="text-lg md:text-xl font-headline font-bold text-white group-hover:text-primary transition-colors truncate">${film?.titolo || 'Sconosciuto'}</h4>
                            </div>
                            <div class="grid grid-cols-2 gap-3 md:gap-4">
                                <div>
                                    <p class="text-[10px] text-on-surface-variant uppercase tracking-widest opacity-60">Sala Cinema</p>
                                    <p class="text-sm text-secondary font-medium truncate">${cinema?.nome || 'Sconosciuto'}</p>
                                </div>
                                <div>
                                    <p class="text-[10px] text-on-surface-variant uppercase tracking-widest opacity-60">Orario Sala</p>
                                    <p class="text-sm text-white truncate">${cinema?.citta || '-'}</p>
                                </div>
                            </div>
                            <div class="pt-3 md:pt-4 border-t border-outline-variant/10 flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    <span class="material-symbols-outlined text-primary-container text-base md:text-lg">calendar_today</span>
                                    <span class="text-sm font-body">${Utils.formatDateShort(proiezione.data)}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="material-symbols-outlined text-primary-container text-base md:text-lg">schedule</span>
                                    <span class="text-sm font-body">${Utils.formatTime(proiezione.ora)}</span>
                                </div>
                            </div>
                            <div class="flex justify-end gap-2 pt-2 opacity-0 group-hover:opacity-100 transition-opacity ${isManager() ? '' : 'hidden'}">
                                <button onclick="openEditModal(${proiezione.id})" class="p-2 hover:bg-surface-container-highest rounded-lg transition-colors">
                                    <span class="material-symbols-outlined text-secondary">edit</span>
                                </button>
                                <button onclick="deleteProiezione(${proiezione.id})" class="p-2 hover:bg-error-container/20 rounded-lg transition-colors">
                                    <span class="material-symbols-outlined text-error">delete</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openCreateModal() {
            if (!isManager()) {
                Utils.showNotification('Non hai i permessi per creare proiezioni', 'error');
                return;
            }
            showModal('Nuova Proiezione', `
                <!-- DOC-BLOCK: Form utente: raccoglie input, valida lato client e invia dati ai servizi API. -->
                <form id="proiezione-form" onsubmit="handleSubmit(event)">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Film *</label>
                            <select name="filmId" required class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary appearance-none">
                                <option value="">Seleziona un film</option>
                                ${allFilms.map(f => `<option value="${f.id}">${escapeHtml(f.titolo)}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Cinema *</label>
                            <select name="cinemaId" required class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary appearance-none">
                                <option value="">Seleziona un cinema</option>
                                ${allCinemas.map(c => `<option value="${c.id}">${escapeHtml(c.nome)} - ${escapeHtml(c.citta)}</option>`).join('')}
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Data *</label>
                                <input type="date" name="data" required class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Ora *</label>
                                <input type="time" name="ora" required class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary">
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-end gap-3 mt-6">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-colors">Annulla</button>
                        <button type="submit" class="bg-primary-container text-on-primary-container px-6 py-2 rounded-lg font-bold hover:opacity-90 transition-opacity">Crea</button>
                    </div>
                </form>
            `);
        }

        function openEditModal(id) {
            if (!isManager()) {
                Utils.showNotification('Non hai i permessi per modificare proiezioni', 'error');
                return;
            }
            const proiezione = currentProiezioni.find(p => p.id === id);
            if (!proiezione) return;

            const data = proiezione.data ? proiezione.data.split('T')[0] : '';

            showModal('Modifica Proiezione', `
                <!-- DOC-BLOCK: Form utente: raccoglie input, valida lato client e invia dati ai servizi API. -->
                <form id="proiezione-form" onsubmit="handleSubmit(event)">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Film *</label>
                            <select name="filmId" required class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary appearance-none">
                                ${allFilms.map(f => `<option value="${f.id}" ${f.id === proiezione.filmId ? 'selected' : ''}>${escapeHtml(f.titolo)}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Cinema *</label>
                            <select name="cinemaId" required class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary appearance-none">
                                ${allCinemas.map(c => `<option value="${c.id}" ${c.id === proiezione.cinemaId ? 'selected' : ''}>${escapeHtml(c.nome)} - ${escapeHtml(c.citta)}</option>`).join('')}
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Data *</label>
                                <input type="date" name="data" value="${data}" required class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Ora *</label>
                                <input type="time" name="ora" value="${Utils.formatTime(proiezione.ora)}" required class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary">
                            </div>
                        </div>
                    </div>
                    <input type="hidden" name="id" value="${id}">
                    <div class="flex justify-end gap-3 mt-6">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-colors">Annulla</button>
                        <button type="submit" class="bg-primary-container text-on-primary-container px-6 py-2 rounded-lg font-bold hover:opacity-90 transition-opacity">Salva</button>
                    </div>
                </form>
            `);
        }

        async function handleSubmit(event) {
            event.preventDefault();
            if (!isManager()) {
                Utils.showNotification('Non hai i permessi per salvare proiezioni', 'error');
                return;
            }
            const form = event.target;
            const id = form.id?.value;
            const data = {
                filmId: parseInt(form.filmId.value),
                cinemaId: parseInt(form.cinemaId.value),
                data: form.data.value,
                ora: form.ora.value
            };

            try {
                Utils.showLoading();
                if (id) {
                    await ApiClient.put(`/proiezioni/${id}`, data);
                    Utils.showNotification('Proiezione aggiornata con successo', 'success');
                } else {
                    await ApiClient.post('/proiezioni', data);
                    Utils.showNotification('Proiezione creata con successo', 'success');
                }
                closeModal();
                await loadData();
            } catch (error) {
                if (error.message && error.message.includes('409')) {
                    Utils.showNotification('Esiste gia una proiezione con lo stesso film, cinema, data e ora.', 'error');
                } else {
                    Utils.showNotification(error.message || 'Errore durante il salvataggio', 'error');
                }
            } finally {
                Utils.hideLoading();
            }
        }

        async function deleteProiezione(id) {
            if (!isManager()) {
                Utils.showNotification('Non hai i permessi per eliminare proiezioni', 'error');
                return;
            }
            if (!Utils.confirmDialog('Sei sicuro di voler eliminare questa proiezione?')) return;

            try {
                Utils.showLoading();
                await ApiClient.delete(`/proiezioni/${id}`);
                Utils.showNotification('Proiezione eliminata con successo', 'success');
                await loadData();
            } catch (error) {
                Utils.showNotification(error.message || 'Errore durante l\'eliminazione', 'error');
            } finally {
                Utils.hideLoading();
            }
        }

        function showModal(title, content) {
            const container = document.getElementById('modal-container');
            container.innerHTML = `
                <div class="modal-backdrop" onclick="if(event.target === this) closeModal()">
                    <div class="modal-content">
                        <h3 class="font-headline text-xl font-bold mb-6">${title}</h3>
                        ${content}
                    </div>
                </div>
            `;
        }

        function closeModal() {
            document.getElementById('modal-container').innerHTML = '';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
