    <!-- DOC-BLOCK: Script inline pagina: gestisce eventi UI, stato locale e integrazione con ApiClient. -->
    <script>
        // Stato principale della pagina (id film, data selezionata, cinema selezionato e cache dati).
        let filmId = null;
        let selectedDate = new Date();
        let selectedCinemaId = null;
        let currentFilm = null;
        let latestShows = [];
        let availableDates = [];
        let cinemaShows = [];
        let tmdbCast = [];
        let tmdbMeta = null;
        let ratingSummary = null;
        let savingRating = false;

        // Bootstrap pagina: carica componenti comuni, collega eventi UI e avvia il caricamento dati.
        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllComponents();
            bindDateNav();
            bindStickyActions();
            bindCinemaChanges();
            await initPage();
        });

        // Inizializzazione: legge querystring, recupera film e preferenze cinema, poi popola UI.
        async function initPage() {
            const params = new URLSearchParams(window.location.search);
            filmId = parseInt(params.get('id') || '0');
            if (!filmId) {
                window.location.href = '/programmazione.html';
                return;
            }

            try {
                Utils.showLoading();
                currentFilm = await ApiClient.get(`/films/${filmId}`);

                const localCinema = localStorage.getItem('selectedCinema');
                selectedCinemaId = localCinema ? parseInt(localCinema) : null;
                const queryCinema = parseInt(params.get('cinemaId') || '0');
                if (queryCinema) selectedCinemaId = queryCinema;
                if (!selectedCinemaId && Auth.isAuthenticated()) {
                    try {
                        const pref = await ApiClient.get('/user/cinema-preferito');
                        selectedCinemaId = pref?.cinemaId || null;
                    } catch {
                    }
                }

                renderHeader();
                await loadTmdbCast();
                await loadTmdbMeta();
                await loadRatingsSummary();
                // Rerender dopo TMDB per mostrare il cast arricchito senza perdere la scheda film.
                renderHeader();
                await loadAvailableDates();
                renderDates();
                await loadShows();
            } catch (e) {
                Utils.showNotification(e.message || 'Errore caricamento film', 'error');
            } finally {
                Utils.hideLoading();
            }
        }

        // Render hero della scheda film con metadati principali e blocco cast/attori.
        function renderHeader() {
            const h = document.getElementById('film-header');
            if (!h) return;
            if (!currentFilm) {
                h.innerHTML = `
                    <div class="app-card p-5">
                        <h1 class="font-headline text-2xl font-bold">Scheda film non disponibile</h1>
                        <p class="text-on-surface-variant mt-2">Impossibile caricare i dettagli del film.</p>
                    </div>
                `;
                return;
            }
            const cover = currentFilm.copertinaPath || '';
            h.innerHTML = `
                <div class="relative min-h-[230px] md:min-h-[280px]">
                    <div class="absolute inset-0 bg-cover bg-center" style="background-image:url('${escapeHtml(cover)}')"></div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-black/30"></div>
                    <div class="relative p-4 md:p-6 flex flex-col justify-end min-h-[230px] md:min-h-[280px]">
                        <span class="section-eyebrow w-fit mb-2 inline-flex items-center gap-2">Scheda film</span>
                        <h1 class="font-headline text-2xl md:text-4xl font-extrabold">${escapeHtml(currentFilm.titolo)}</h1>
                        <div class="mt-2 text-xs md:text-sm text-white/80">Durata: ${currentFilm.durata || '-'} min${currentFilm.genere ? ' | Genere: ' + escapeHtml(currentFilm.genere) : ''}${currentFilm.dataRilascio ? ' | Data rilascio: ' + new Date(currentFilm.dataRilascio).toLocaleDateString('it-IT') : ''}</div>
                        <p class="mt-3 max-w-3xl text-xs md:text-sm text-white/90">${escapeHtml(getFilmDescription())}</p>
                        <div class="mt-2 text-xs md:text-sm text-white/80">Regista: ${escapeHtml(getDirectorName())}</div>
                        <div class="mt-3 rounded-lg bg-black/25 border border-white/10 px-3 py-2.5">
                            <div class="flex flex-wrap items-center gap-3">
                                <div class="text-sm text-white/90">Rating medio: <span class="font-semibold">${formatRatingAverage(ratingSummary?.average)}</span></div>
                                <div class="text-xs text-white/70">(${Number(ratingSummary?.count || 0)} voti)</div>
                            </div>
                            <div class="mt-2 flex items-center gap-1">
                                ${renderRatingStars()}
                            </div>
                            <div class="mt-2 space-y-1 max-w-sm">
                                ${renderRatingDistribution()}
                            </div>
                            <div class="mt-1 text-[11px] text-white/65">${getRatingHintText()}</div>
                            ${ratingSummary?.currentUserRating ? '<button id="rating-delete-btn" type="button" class="mt-2 text-[11px] text-white/70 hover:text-white underline">Rimuovi la mia valutazione</button>' : ''}
                        </div>
                        <details class="mt-2 rounded-lg bg-black/20 border border-white/10 px-2.5 py-2">
                            <summary class="cursor-pointer select-none text-xs uppercase tracking-widest text-white/80 flex items-center justify-between">
                                <span>Attori e Cast TMDB</span>
                                <span class="text-[10px] text-white/60">Apri/Chiudi</span>
                            </summary>
                            <div class="mt-2">
                                <div class="text-[11px] uppercase tracking-widest text-white/70 mb-1">Attori</div>
                                <div class="flex flex-wrap gap-1.5">${renderCastBadges(getCastText())}</div>
                            </div>
                            <div class="mt-2">
                                <div class="text-[11px] uppercase tracking-widest text-white/70 mb-1">Cast TMDB (compact v3)</div>
                                <div id="tmdb-cast-grid" class="tmdb-cast-grid">
                                    ${renderTmdbCastCards()}
                                </div>
                            </div>
                        </details>
                        <div class="mt-3 flex flex-wrap gap-2">
                            <button id="header-showtimes-btn" class="app-btn app-btn-secondary hover-lift">Vedi orari disponibili</button>
                            <button id="header-book-btn" class="app-btn app-btn-primary hover-lift" ${latestShows.length ? '' : 'disabled'}>Prenota questo film</button>
                        </div>
                    </div>
                </div>
            `;

            const showtimesBtn = document.getElementById('header-showtimes-btn');
            if (showtimesBtn) {
                showtimesBtn.addEventListener('click', () => {
                    document.getElementById('shows-container')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            }
            const bookBtn = document.getElementById('header-book-btn');
            if (bookBtn) {
                bookBtn.addEventListener('click', () => {
                    if (!latestShows.length) return;
                    const first = latestShows[0];
                    goToAcquisto(first.id, first.salaId);
                });
            }
            bindRatingStars();
            bindRatingDelete();
        }

        async function loadRatingsSummary() {
            try {
                ratingSummary = await ApiClient.request(`/films/${filmId}/ratings/summary`, {
                    method: 'GET',
                    bypassCache: true
                });
            } catch {
                ratingSummary = null;
            }
        }

        function formatRatingAverage(value) {
            const num = Number(value || 0);
            if (!num) return 'N/D';
            return `${num.toFixed(1)} / 5`;
        }

        function getRatingHintText() {
            if (!Auth.isAuthenticated()) {
                return 'Effettua il login per votare questo film.';
            }

            if (!ratingSummary?.canRate) {
                return 'Puoi votare solo dopo aver acquistato un biglietto per questo film.';
            }

            if (savingRating) {
                return 'Salvataggio valutazione in corso...';
            }

            if (ratingSummary?.currentUserRating) {
                return `La tua valutazione attuale: ${ratingSummary.currentUserRating} stelle.`;
            }

            return 'Clicca sulle stelle per dare una valutazione da 1 a 5.';
        }

        function renderRatingStars() {
            const current = Number(ratingSummary?.currentUserRating || 0);
            const disabled = !Auth.isAuthenticated() || savingRating || !ratingSummary?.canRate;
            const stars = [];
            for (let i = 1; i <= 5; i++) {
                stars.push(`
                    <button type="button"
                        class="rating-star ${i <= current ? 'active' : ''}"
                        data-rating="${i}"
                        ${disabled ? 'disabled' : ''}>
                        ★
                    </button>
                `);
            }
            return stars.join('');
        }

        function renderRatingDistribution() {
            const total = Number(ratingSummary?.count || 0);
            const rows = Array.isArray(ratingSummary?.distribution) ? ratingSummary.distribution : [];
            if (!total || rows.length === 0) {
                return '<div class="text-[11px] text-white/55">Ancora nessuna distribuzione disponibile.</div>';
            }

            return rows.map((row) => {
                const count = Number(row.count || 0);
                const width = Math.round((count / total) * 100);
                return `
                    <div class="grid grid-cols-[34px_1fr_24px] items-center gap-2 text-[11px] text-white/70">
                        <span>${Number(row.stars || 0)}★</span>
                        <span class="h-1.5 rounded-full bg-white/15 overflow-hidden">
                            <span class="block h-full bg-secondary" style="width:${width}%"></span>
                        </span>
                        <span class="text-right">${count}</span>
                    </div>
                `;
            }).join('');
        }

        function bindRatingStars() {
            document.querySelectorAll('.rating-star[data-rating]').forEach((button) => {
                button.addEventListener('click', async () => {
                    if (!Auth.isAuthenticated()) {
                        Utils.showNotification('Effettua il login per votare il film.', 'warning');
                        return;
                    }
                    if (savingRating) return;

                    const value = Number(button.getAttribute('data-rating') || 0);
                    if (value < 1 || value > 5) return;

                    savingRating = true;
                    renderHeader();
                    try {
                        await ApiClient.post(`/films/${filmId}/ratings`, { valutazione: value });
                        await loadRatingsSummary();
                        Utils.showNotification('Valutazione salvata', 'success');
                    } catch (error) {
                        Utils.showNotification(error?.message || 'Errore durante il salvataggio della valutazione', 'error');
                    } finally {
                        savingRating = false;
                        renderHeader();
                    }
                });
            });
        }

        function bindRatingDelete() {
            const button = document.getElementById('rating-delete-btn');
            if (!button) return;
            button.addEventListener('click', async () => {
                if (savingRating) return;
                savingRating = true;
                try {
                    await ApiClient.delete(`/films/${filmId}/ratings`);
                    await loadRatingsSummary();
                    Utils.showNotification('Valutazione rimossa', 'success');
                } catch (error) {
                    Utils.showNotification(error?.message || 'Errore durante rimozione valutazione', 'error');
                } finally {
                    savingRating = false;
                    renderHeader();
                }
            });
        }

        // Carica cast da TMDB (non blocca la pagina in caso di errore: fallback a lista vuota).
        async function loadTmdbCast() {
            try {
                tmdbCast = await ApiClient.get(`/films/${filmId}/cast-tmdb`);
                if (!Array.isArray(tmdbCast)) {
                    tmdbCast = [];
                }
            } catch {
                tmdbCast = [];
            }
        }

        // Carica metadati TMDB (descrizione/regista/cast extra) usati come fallback.
        async function loadTmdbMeta() {
            try {
                tmdbMeta = await ApiClient.get(`/films/${filmId}/meta-tmdb`);
            } catch {
                tmdbMeta = null;
            }
        }

        // Navigazione strip date (precedente/successivo) con ricarica spettacoli.
        function bindDateNav() {
            document.getElementById('prev-days').addEventListener('click', () => {
                if (!availableDates.length) return;
                const idx = availableDates.findIndex(d => sameDay(d, selectedDate));
                if (idx > 0) selectedDate = new Date(availableDates[idx - 1].getTime());
                renderDates();
                loadShows();
            });

            document.getElementById('next-days').addEventListener('click', () => {
                if (!availableDates.length) return;
                const idx = availableDates.findIndex(d => sameDay(d, selectedDate));
                if (idx >= 0 && idx < availableDates.length - 1) selectedDate = new Date(availableDates[idx + 1].getTime());
                renderDates();
                loadShows();
            });
        }

        // Azioni rapide sticky: salto alla sezione orari e prenotazione primo show disponibile.
        function bindStickyActions() {
            const jumpBtn = document.getElementById('jump-shows-btn');
            const quickBtn = document.getElementById('quick-book-btn');
            if (jumpBtn) {
                jumpBtn.addEventListener('click', () => {
                    document.getElementById('shows-container')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            }
            if (quickBtn) {
                quickBtn.addEventListener('click', () => {
                    if (!latestShows.length) return;
                    const first = latestShows[0];
                    goToAcquisto(first.id, first.salaId);
                });
            }
        }

        // Reagisce al cambio cinema globale e ricalcola date + programmazione per quel cinema.
        function bindCinemaChanges() {
            window.addEventListener('cinema:changed', async (event) => {
                const cinemaId = parseInt(event?.detail?.cinemaId || '0');
                if (!cinemaId) return;
                selectedCinemaId = cinemaId;
                localStorage.setItem('selectedCinema', String(cinemaId));
                await loadAvailableDates();
                renderDates();
                await loadShows();
            });
        }

        // Render pulsanti delle date disponibili e gestione stato selezionato/disabilitato.
        function renderDates() {
            const strip = document.getElementById('dates-strip');
            const prevBtn = document.getElementById('prev-days');
            const nextBtn = document.getElementById('next-days');
            strip.innerHTML = '';

            if (!availableDates.length) {
                strip.innerHTML = `<div class="text-sm text-on-surface-variant px-2 py-1">Nessuna data disponibile per questo film nel cinema selezionato.</div>`;
                if (prevBtn) prevBtn.disabled = true;
                if (nextBtn) nextBtn.disabled = true;
                return;
            }

            const currentIndex = availableDates.findIndex(d => sameDay(d, selectedDate));
            if (prevBtn) prevBtn.disabled = currentIndex <= 0;
            if (nextBtn) nextBtn.disabled = currentIndex < 0 || currentIndex >= availableDates.length - 1;

            for (let i = 0; i < availableDates.length; i++) {
                const d = availableDates[i];
                const isSelected = sameDay(d, selectedDate);
                const btn = document.createElement('button');
                btn.className = `px-3 py-2 rounded-lg text-sm whitespace-nowrap ${isSelected ? 'bg-primary-container text-white' : 'bg-surface-container-high'}`;
                btn.textContent = sameDay(d, new Date()) ? 'Oggi' : d.toLocaleDateString('it-IT', { weekday: 'short', day: '2-digit' });
                btn.addEventListener('click', () => {
                    selectedDate = d;
                    renderDates();
                    loadShows();
                });
                strip.appendChild(btn);
            }
        }

        // Carica show del cinema selezionato, filtra date future e prepara la timeline locale.
        async function loadAvailableDates() {
            availableDates = [];
            cinemaShows = [];
            if (!selectedCinemaId) return;

            const shows = await ApiClient.get(`/film/${filmId}/shows?cinemaId=${selectedCinemaId}`);
            cinemaShows = normalizeShows(shows).filter(s => Number(s.cinemaId) === Number(selectedCinemaId));
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const uniqueDates = [...new Set(cinemaShows.map(s => (s.data || '').slice(0, 10)).filter(Boolean))]
                .map(d => new Date(`${d}T00:00:00`))
                .filter(d => !Number.isNaN(d.getTime()) && d >= today)
                .sort((a, b) => a.getTime() - b.getTime());

            availableDates = uniqueDates;
            if (!availableDates.some(d => sameDay(d, selectedDate)) && availableDates.length) {
                selectedDate = new Date(availableDates[0].getTime());
            }
        }

        // Render degli spettacoli per la data corrente, raggruppati per tipologia sala.
        async function loadShows() {
            const c = document.getElementById('shows-container');
            const stickyBar = document.getElementById('booking-sticky-bar');
            const nextLabel = document.getElementById('next-show-label');
            const quickBtn = document.getElementById('quick-book-btn');
            const headerBookBtn = document.getElementById('header-book-btn');
            if (!selectedCinemaId) {
                c.innerHTML = `<div class="text-on-surface-variant">Seleziona un cinema dalla pagina programmazione.</div>`;
                if (stickyBar) stickyBar.classList.remove('hidden');
                if (nextLabel) nextLabel.textContent = 'Cinema non selezionato';
                if (quickBtn) quickBtn.disabled = true;
                if (headerBookBtn) headerBookBtn.disabled = true;
                return;
            }
            if (!availableDates.length) {
                c.innerHTML = `<div class="text-on-surface-variant">Questo film non e disponibile nel cinema selezionato.</div>`;
                if (stickyBar) stickyBar.classList.remove('hidden');
                if (nextLabel) nextLabel.textContent = 'Non disponibile';
                if (quickBtn) quickBtn.disabled = true;
                if (headerBookBtn) headerBookBtn.disabled = true;
                return;
            }

            const d = toLocalDateKey(selectedDate);
            const shows = (cinemaShows || []).filter(s => (s.data || '').slice(0, 10) === d);
            latestShows = shows || [];
            if (stickyBar) stickyBar.classList.remove('hidden');

            if (!shows.length) {
                c.innerHTML = `<div class="text-on-surface-variant py-1">Non disponibile nel tuo cinema per questa data.</div>`;
                if (nextLabel) nextLabel.textContent = 'Nessuno show per la data selezionata';
                if (quickBtn) quickBtn.disabled = true;
                if (headerBookBtn) headerBookBtn.disabled = true;
                return;
            }

            if (nextLabel) {
                nextLabel.textContent = `${new Date(shows[0].data).toLocaleDateString('it-IT', { day: 'numeric', month: 'short' })} - ${(shows[0].oraInizio || '').substring(0, 5)}`;
            }
            if (quickBtn) quickBtn.disabled = false;
            if (headerBookBtn) headerBookBtn.disabled = false;

            const grouped = {};
            shows.forEach(s => {
                const key = s.tipologiaSala || 'ALTRO';
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(s);
            });

            c.innerHTML = Object.keys(grouped).map(tip => `
                <div class="bg-surface-container-high rounded-xl p-4">
                    <div class="font-semibold mb-2">${escapeHtml(tip)}</div>
                    <div class="flex flex-wrap gap-2">
                        ${grouped[tip].map(s => `
                            <button onclick="goToAcquisto(${s.id}, ${s.salaId})" class="px-3 py-2 rounded-full bg-primary-container/80 hover:bg-primary-container text-white text-sm">
                                ${(s.oraInizio || '').substring(0, 5)}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Navigazione verso acquisto: se non autenticato, passa da login con redirect preservato.
        function goToAcquisto(showId, salaId) {
            if (!Auth.isAuthenticated()) {
                window.location.href = `/login.html?redirect=${encodeURIComponent(`/acquista.html?IdCinema=${selectedCinemaId}&IdFilm=${filmId}&IdSala=${salaId}&IdShow=${showId}`)}`;
                return;
            }
            window.location.href = `/acquista.html?IdCinema=${selectedCinemaId}&IdFilm=${filmId}&IdSala=${salaId}&IdShow=${showId}`;
        }

        function sameDay(a, b) {
            return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
        }

        function toLocalDateKey(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // Normalizza payload show (camelCase/PascalCase) in un formato unico lato frontend.
        function normalizeShows(rawShows) {
            if (!Array.isArray(rawShows)) return [];
            return rawShows
                .map(s => ({
                    id: Number(s?.id ?? s?.Id ?? 0),
                    filmId: Number(s?.filmId ?? s?.FilmId ?? 0),
                    salaId: Number(s?.salaId ?? s?.SalaId ?? 0),
                    cinemaId: Number(s?.cinemaId ?? s?.CinemaId ?? 0),
                    cinemaNome: s?.cinemaNome ?? s?.CinemaNome ?? '',
                    tipologiaSala: s?.tipologiaSala ?? s?.TipologiaSala ?? '',
                    data: (s?.data ?? s?.Data ?? '').toString(),
                    oraInizio: (s?.oraInizio ?? s?.OraInizio ?? '').toString(),
                    oraFine: (s?.oraFine ?? s?.OraFine ?? '').toString(),
                    prezzoBase: Number(s?.prezzoBase ?? s?.PrezzoBase ?? 0)
                }))
                .filter(s => s.id > 0 && s.salaId > 0 && s.cinemaId > 0 && s.data);
        }

        // Escape HTML base per evitare injection quando stampiamo testo dinamico nel template.
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        // Render tag cast (badge) deduplicati.
        function renderCastBadges(cast) {
            const seen = new Set();
            const names = (cast || '')
                .split(',')
                .map(name => name.trim())
                .filter(Boolean)
                .filter(name => {
                    const key = normalizeTextKey(name);
                    if (!key || seen.has(key)) return false;
                    seen.add(key);
                    return true;
                })
                .slice(0, 10);

            if (!names.length) {
                return '<span class="text-sm text-white/70">Non specificati</span>';
            }

            return names
                .map(name => `<span class="px-2 py-0.5 rounded-full text-xs bg-white/15 text-white/90">${escapeHtml(name)}</span>`)
                .join('');
        }

        // Seleziona descrizione con priorita: dato locale -> alias locale -> TMDB -> fallback.
        function getFilmDescription() {
            const direct = (currentFilm?.descrizione || '').trim();
            if (direct) return direct;
            const alt = (currentFilm?.Descrizione || '').trim();
            if (alt) return alt;
            const tmdb = (tmdbMeta?.descrizione || tmdbMeta?.Descrizione || '').trim();
            if (tmdb) return tmdb;
            return 'Descrizione non disponibile';
        }

        // Costruisce testo cast usando prima i dati locali e poi fallback TMDB deduplicato.
        function getCastText() {
            const direct = (currentFilm?.cast || '').trim();
            if (direct) return normalizeCastText(direct);
            const alt = (currentFilm?.Cast || '').trim();
            if (alt) return normalizeCastText(alt);
            if (Array.isArray(tmdbCast) && tmdbCast.length) {
                return uniqueByTextKey(tmdbCast
                    .map(a => a?.nome || a?.Nome || '')
                    .filter(Boolean))
                    .slice(0, 10)
                    .join(', ');
            }
            if (Array.isArray(tmdbMeta?.cast) && tmdbMeta.cast.length) {
                return uniqueByTextKey(tmdbMeta.cast.filter(Boolean))
                    .slice(0, 10)
                    .join(', ');
            }
            return '';
        }

        // Crea una chiave di confronto robusta (minuscole, senza accenti/punteggiatura).
        function normalizeTextKey(value) {
            return String(value || '')
                .normalize('NFKD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^\w\s]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim()
                .toLowerCase();
        }

        // Rimuove duplicati testuali usando la chiave normalizzata.
        function uniqueByTextKey(values) {
            const seen = new Set();
            return values.filter(value => {
                const key = normalizeTextKey(value);
                if (!key || seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        // Normalizza stringa cast CSV in una lista pulita e senza duplicati.
        function normalizeCastText(cast) {
            return uniqueByTextKey(
                String(cast || '')
                    .split(',')
                    .map(name => name.trim())
                    .filter(Boolean)
            ).join(', ');
        }

        // Recupera regista con fallback locale/TMDB.
        function getDirectorName() {
            const direct = (currentFilm?.registaNome || '').trim();
            if (direct) return direct;
            const alt = (currentFilm?.RegistaNome || '').trim();
            if (alt) return alt;
            const tmdb = (tmdbMeta?.regista || tmdbMeta?.Regista || '').trim();
            if (tmdb) return tmdb;
            return 'N/D';
        }

        // Render card compatte del cast TMDB (foto, nome, ruolo) con apertura modal su click.
        function renderTmdbCastCards() {
            if (!tmdbCast.length) {
                return '<div class="col-span-full text-xs text-white/70">Foto cast non disponibili</div>';
            }

            return tmdbCast.map(actor => `
                <button type="button" onclick="openActorModal(${actor.id})" class="tmdb-cast-card">
                    <div class="tmdb-cast-thumb">
                        ${actor.profile
                            ? `<img src="${escapeHtml(actor.profile)}" alt="${escapeHtml(actor.nome || 'Attore')}" class="w-full h-full object-cover" loading="lazy" decoding="async" referrerpolicy="no-referrer">`
                            : `<div class="w-full h-full flex items-center justify-center text-white/50 text-[9px]">No photo</div>`}
                    </div>
                    <div class="tmdb-cast-name">${escapeHtml(actor.nome || 'N/D')}</div>
                    <div class="tmdb-cast-role">${escapeHtml(actor.personaggio || '')}</div>
                </button>
            `).join('');
        }

        // Apre modal dettaglio attore con bio e filmografia.
        async function openActorModal(actorId) {
            try {
                Utils.showLoading();
                const actor = await ApiClient.get(`/films/actors/${actorId}/tmdb`);
                const container = document.getElementById('actor-modal-container');
                if (!container) return;

                container.innerHTML = `
                    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[80] p-4 flex items-center justify-center" onclick="if(event.target===this) closeActorModal()">
                        <div class="w-full max-w-2xl bg-surface-container border border-outline-variant/30 rounded-2xl overflow-hidden">
                            <div class="p-4 md:p-5 flex items-start justify-between border-b border-outline-variant/20">
                                <h3 class="font-headline text-xl font-bold">${escapeHtml(actor.nome || 'Attore')}</h3>
                                <button type="button" onclick="closeActorModal()" class="p-2 rounded-lg hover:bg-surface-container-high">
                                    <span class="material-symbols-outlined">close</span>
                                </button>
                            </div>
                            <div class="p-4 md:p-5 grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div class="md:col-span-1">
                                    <div class="aspect-[3/4] rounded-xl overflow-hidden bg-surface-container-high">
                                        ${actor.profile
                                            ? `<img src="${escapeHtml(actor.profile)}" alt="${escapeHtml(actor.nome || 'Attore')}" class="w-full h-full object-cover">`
                                            : `<div class="w-full h-full flex items-center justify-center text-on-surface-variant">No photo</div>`}
                                    </div>
                                </div>
                                <div class="md:col-span-2 space-y-3">
                                    <div class="text-sm text-on-surface-variant">Nascita: <span class="text-on-surface">${escapeHtml(actor.compleanno || 'N/D')}</span></div>
                                    <div class="text-sm text-on-surface-variant">Luogo: <span class="text-on-surface">${escapeHtml(actor.luogoNascita || 'N/D')}</span></div>
                                <div class="text-sm text-on-surface-variant">Popolarita TMDB: <span class="text-on-surface">${typeof actor.popolarita === 'number' ? actor.popolarita.toFixed(1) : 'N/D'}</span></div>
                                    <div>
                                        <p class="text-xs uppercase tracking-widest text-on-surface-variant mb-2">Biografia</p>
                                        <p class="text-sm leading-relaxed text-on-surface/90 max-h-56 overflow-y-auto pr-1">${escapeHtml(actor.biography || 'Biografia non disponibile')}</p>
                                    </div>
                                </div>
                            </div>
                            <div class="px-4 md:px-5 pb-4 md:pb-5">
                                <p class="text-xs uppercase tracking-widest text-on-surface-variant mb-2">Altri film</p>
                                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2 max-h-72 overflow-y-auto pr-1">
                                    ${renderActorFilmografia(actor.filmografia)}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                Utils.showNotification('Errore caricamento scheda attore', 'error');
            } finally {
                Utils.hideLoading();
            }
        }

        // Chiude il modal attore svuotando il container overlay.
        function closeActorModal() {
            const container = document.getElementById('actor-modal-container');
            if (container) container.innerHTML = '';
        }

        // Render filmografia attore deduplicata; se presente localFilmId abilita link interno.
        function renderActorFilmografia(filmografia) {
            if (!Array.isArray(filmografia) || filmografia.length === 0) {
                return '<div class="text-sm text-on-surface-variant">Filmografia non disponibile</div>';
            }

            const uniqueFilmografia = [];
            const seen = new Set();
            for (const movie of filmografia) {
                const key = movie?.id || normalizeTextKey(`${movie?.titolo || ''} ${String(movie?.dataRilascio || '').slice(0, 4)} ${movie?.personaggio || ''}`);
                if (!key || seen.has(key)) continue;
                seen.add(key);
                uniqueFilmografia.push(movie);
            }

            return uniqueFilmografia.map(movie => {
                const year = movie.dataRilascio ? String(movie.dataRilascio).slice(0, 4) : 'N/D';
                const openAction = movie.localFilmId
                    ? `onclick="openLocalFilmFromActor(${movie.localFilmId})"`
                    : '';
                const clickableClass = movie.localFilmId
                    ? 'cursor-pointer hover:bg-surface-container-highest/70'
                    : '';

                return `
                    <div class="bg-surface-container-high rounded-lg p-2 border border-outline-variant/20 ${clickableClass}" ${openAction}>
                        <div class="flex gap-2">
                            <div class="w-12 h-16 rounded-md overflow-hidden bg-surface-container">
                                ${movie.poster
                                    ? `<img src="${escapeHtml(movie.poster)}" alt="${escapeHtml(movie.titolo || 'Film')}" class="w-full h-full object-cover">`
                                    : `<div class="w-full h-full flex items-center justify-center text-[10px] text-on-surface-variant">No cover</div>`}
                            </div>
                            <div class="min-w-0 flex-1">
                                <div class="text-xs font-semibold text-on-surface truncate">${escapeHtml(movie.titolo || 'N/D')}</div>
                                <div class="text-[11px] text-on-surface-variant">${escapeHtml(year)}</div>
                                <div class="text-[11px] text-on-surface-variant truncate">${escapeHtml(movie.personaggio || '')}</div>
                                ${movie.localFilmId ? '<div class="text-[10px] text-primary-container mt-1">Apri film nel sito</div>' : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Shortcut: dalla filmografia attore apre direttamente la scheda film interna al sito.
        function openLocalFilmFromActor(localFilmId) {
            closeActorModal();
            window.location.href = `/scheda-film.html?id=${localFilmId}`;
        }
    </script>
</body>
