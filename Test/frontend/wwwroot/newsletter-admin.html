<!DOCTYPE html>
<!-- DOC: Pagina UI 'newsletter-admin': definisce struttura, sezioni e hook JS per il flusso utente. -->
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Admin | FilmHub</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-light-32.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-dark-32.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-dark-32.png">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon-light.ico" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon-dark.ico" media="(prefers-color-scheme: dark)">
    <link rel="shortcut icon" type="image/x-icon" href="/assets/icons/favicon-dark.ico">
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
    <div id="navbar-container"></div>
    <div class="flex flex-1">
        <div id="sidebar-container"></div>
        <!-- DOC-BLOCK: Sezione principale: contiene il flusso operativo della pagina. -->
        <main class="page-shell flex-1 p-4 md:p-8 lg:p-10">
            <!-- DOC-BLOCK: Blocco funzionale UI: raggruppa contenuti/azioni omogenee della pagina. -->
            <section class="hero-banner p-6 md:p-8 mb-6">
                <h1 class="font-headline text-3xl md:text-5xl font-semibold">Newsletter Admin</h1>
                <p class="text-on-surface-variant mt-2">Invia campagne email agli utenti iscritti e consulta lo storico invii.</p>
            </section>

            <!-- DOC-BLOCK: Blocco funzionale UI: raggruppa contenuti/azioni omogenee della pagina. -->
            <section class="app-card p-4 mb-6">
                <h2 class="font-headline text-xl font-semibold mb-3">Nuova campagna</h2>
                <!-- DOC-BLOCK: Form utente: raccoglie input, valida lato client e invia dati ai servizi API. -->
                <form id="campaign-form" class="space-y-3">
                    <input id="campaign-subject" type="text" required placeholder="Oggetto newsletter" class="w-full rounded-lg border border-outline-variant/30 bg-surface-container-high px-3 py-2 text-sm">
                    <textarea id="campaign-html" required rows="8" placeholder="<h2>Novita FilmHub</h2><p>Contenuto campagna...</p>" class="w-full rounded-lg border border-outline-variant/30 bg-surface-container-high px-3 py-2 text-sm"></textarea>
                    <button type="submit" class="app-btn app-btn-primary">Invia campagna</button>
                </form>
            </section>

            <!-- DOC-BLOCK: Blocco funzionale UI: raggruppa contenuti/azioni omogenee della pagina. -->
            <section class="app-card p-4">
                <div class="flex items-center justify-between gap-3 mb-3">
                    <h2 class="font-headline text-xl font-semibold">Storico campagne</h2>
                    <button id="refresh-campaigns-btn" class="app-btn app-btn-secondary">Aggiorna</button>
                </div>
                <div class="mb-3">
                    <input id="campaign-search" type="text" placeholder="Cerca per oggetto..." class="w-full rounded-lg border border-outline-variant/30 bg-surface-container-high px-3 py-2 text-sm">
                </div>
                <div id="campaigns-list" class="space-y-2 text-sm text-on-surface-variant">Caricamento...</div>
            </section>
        </main>
    </div>
    <div id="footer-container"></div>

    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/theme.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/api-config.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/auth.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/route-guard.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/template-loader.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/api-client.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/utils.js"></script>
    <!-- DOC-BLOCK: Script inline pagina: gestisce eventi UI, stato locale e integrazione con ApiClient. -->
    <script>
        let allCampaigns = [];
        const LOCAL_CAMPAIGNS_KEY = 'newsletter_admin_local_campaigns_v1';

        function getLocalCampaigns() {
            try {
                const raw = localStorage.getItem(LOCAL_CAMPAIGNS_KEY);
                const parsed = raw ? JSON.parse(raw) : [];
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function saveLocalCampaign(campaign) {
            const current = getLocalCampaigns();
            const next = [campaign, ...current].slice(0, 50);
            localStorage.setItem(LOCAL_CAMPAIGNS_KEY, JSON.stringify(next));
        }

        async function loadCampaigns() {
            const box = document.getElementById('campaigns-list');
            try {
                const list = await ApiClient.get('/admin/newsletter/campagne');
                const remote = Array.isArray(list) ? list : [];
                const local = getLocalCampaigns();
                allCampaigns = [...local, ...remote];
                renderCampaigns();
            } catch (error) {
                allCampaigns = getLocalCampaigns();
                if (allCampaigns.length > 0) {
                    renderCampaigns();
                    return;
                }
                const msg = String(error?.message || '');
                if (msg.includes('HTTP 500') || msg.includes('HTTP 503') || msg.includes('HTTP 404')) {
                    box.innerHTML = `
                        <div class="rounded-xl border border-outline-variant/20 bg-surface-container-high p-3">
                            Lo storico e vuoto.
                        </div>
                    `;
                    return;
                }
                box.innerHTML = `
                    <div class="rounded-xl border border-outline-variant/20 bg-surface-container-high p-3">
                        Lo storico non e disponibile al momento.
                    </div>
                `;
            }
        }

        function renderCampaigns() {
            const box = document.getElementById('campaigns-list');
            const q = String(document.getElementById('campaign-search')?.value || '').trim().toLowerCase();
            const rows = !q
                ? [...allCampaigns]
                : allCampaigns.filter((c) => String(c.oggetto || '').toLowerCase().includes(q));

            if (!rows.length) {
                box.innerHTML = q ? 'Nessuna campagna trovata con questa ricerca.' : 'Nessuna campagna inviata.';
                return;
            }
            box.innerHTML = rows.map((c) => `
                <div class="rounded-xl border border-outline-variant/20 bg-surface-container-high p-3">
                    <div class="font-medium text-on-surface">${c.oggetto}</div>
                    <div class="text-xs mt-1">Data invio: ${new Date(c.dataInvio).toLocaleString('it-IT')}</div>
                    <div class="text-xs">Destinatari: ${c.destinatariCount}</div>
                </div>
            `).join('');
        }

        async function sendCampaign(event) {
            event.preventDefault();
            const subject = document.getElementById('campaign-subject').value.trim();
            const htmlBody = document.getElementById('campaign-html').value.trim();
            if (!subject || !htmlBody) return;

            if (!confirm('Confermi invio newsletter agli utenti iscritti?')) return;

            try {
                const res = await ApiClient.post('/admin/newsletter/campagne/invia', { oggetto: subject, htmlBody });
                const sentCount = Number(res?.destinatari || 0);
                if (sentCount <= 0) {
                    Utils.showNotification('Nessun destinatario raggiunto: verifica iscrizioni newsletter e backend SMTP', 'error');
                    return;
                }
                Utils.showNotification(`${res.message || 'Campagna inviata'} (${sentCount} destinatari)`, 'success');
                event.target.reset();
                await loadCampaigns();
            } catch (error) {
                Utils.showNotification(error.message || 'Errore invio campagna', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllComponents();
            document.getElementById('campaign-form')?.addEventListener('submit', sendCampaign);
            document.getElementById('refresh-campaigns-btn')?.addEventListener('click', loadCampaigns);
            document.getElementById('campaign-search')?.addEventListener('input', () => renderCampaigns());
            await loadCampaigns();
        });
    </script>
</body>
</html>
