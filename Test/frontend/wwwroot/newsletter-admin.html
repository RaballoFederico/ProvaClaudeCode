<!-- DOC: newsletter-admin - file del progetto; contiene logica specifica della feature/modulo. -->
<!-- DOC: Pagina UI 'newsletter-admin': definisce struttura, sezioni e hook JS per il flusso utente. -->
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Admin | FilmHub</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-light-32.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-dark-32.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-dark-32.png">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon-light.ico" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon-dark.ico" media="(prefers-color-scheme: dark)">
    <link rel="shortcut icon" type="image/x-icon" href="/assets/icons/favicon-dark.ico">
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
    <div id="navbar-container"></div>
    <div class="flex flex-1">
        <div id="sidebar-container"></div>
        <!-- DOC-BLOCK: Sezione principale: contiene il flusso operativo della pagina. -->
        <main class="page-shell flex-1 p-4 md:p-8 lg:p-10">
            <!-- DOC-BLOCK: Blocco funzionale UI: raggruppa contenuti/azioni omogenee della pagina. -->
            <section class="hero-banner p-6 md:p-8 mb-6">
                <h1 class="font-headline text-3xl md:text-5xl font-semibold">Newsletter Admin</h1>
                <p class="text-on-surface-variant mt-2">Invia campagne email agli utenti iscritti e consulta lo storico invii.</p>
            </section>

            <!-- DOC-BLOCK: Blocco funzionale UI: raggruppa contenuti/azioni omogenee della pagina. -->
            <section class="app-card p-4 mb-6">
                <div class="flex flex-col gap-1 mb-3">
                    <h2 class="font-headline text-xl font-semibold">Nuova campagna</h2>
                    <p id="newsletter-recipient-count" class="text-sm text-on-surface-variant">Destinatari iscritti: ...</p>
                </div>
                <!-- DOC-BLOCK: Form utente: raccoglie input, valida lato client e invia dati ai servizi API. -->
                <form id="campaign-form" class="space-y-3">
                    <input id="campaign-subject" type="text" required placeholder="Oggetto newsletter" class="w-full rounded-lg border border-outline-variant/30 bg-surface-container-high px-3 py-2 text-sm">
                    <textarea id="campaign-html" required rows="8" placeholder="<h2>Novita FilmHub</h2><p>Contenuto campagna...</p>" class="w-full rounded-lg border border-outline-variant/30 bg-surface-container-high px-3 py-2 text-sm"></textarea>
                    <div class="grid gap-2 md:grid-cols-[1fr_auto_auto]">
                        <input id="campaign-test-email" type="email" placeholder="Email test" class="w-full rounded-lg border border-outline-variant/30 bg-surface-container-high px-3 py-2 text-sm">
                        <button id="send-test-campaign-btn" type="button" class="app-btn app-btn-secondary">Invia test</button>
                        <button type="submit" class="app-btn app-btn-primary">Invia campagna</button>
                    </div>
                </form>
            </section>

            <!-- DOC-BLOCK: Blocco funzionale UI: raggruppa contenuti/azioni omogenee della pagina. -->
            <section class="app-card p-4">
                <div class="flex items-center justify-between gap-3 mb-3">
                    <h2 class="font-headline text-xl font-semibold">Storico campagne</h2>
                    <button id="refresh-campaigns-btn" class="app-btn app-btn-secondary">Aggiorna</button>
                </div>
                <div class="mb-3">
                    <input id="campaign-search" type="text" placeholder="Cerca per oggetto..." class="w-full rounded-lg border border-outline-variant/30 bg-surface-container-high px-3 py-2 text-sm">
                </div>
                <div id="campaigns-list" class="space-y-2 text-sm text-on-surface-variant">Caricamento...</div>
            </section>
        </main>
    </div>
    <div id="footer-container"></div>

    <div id="newsletter-confirm-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-surface-container rounded-2xl p-6 w-full max-w-md border border-outline-variant/20">
            <h3 class="text-xl font-bold text-on-surface">Conferma invio</h3>
            <p id="newsletter-confirm-message" class="mt-3 text-sm text-on-surface-variant"></p>
            <div class="mt-5 flex gap-3">
                <button id="newsletter-confirm-cancel" type="button" class="flex-1 rounded-lg border border-outline-variant/30 px-4 py-2 text-sm hover:bg-surface-container-high">Annulla</button>
                <button id="newsletter-confirm-ok" type="button" class="flex-1 rounded-lg bg-primary-container px-4 py-2 text-sm text-white">Conferma</button>
            </div>
        </div>
    </div>

    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/theme.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/api-config.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/auth.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/route-guard.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/template-loader.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/api-client.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/utils.js"></script>
    <!-- DOC-BLOCK: Script inline pagina: gestisce eventi UI, stato locale e integrazione con ApiClient. -->
    <script>
        let allCampaigns = [];
        const LOCAL_CAMPAIGNS_KEY = 'newsletter_admin_local_campaigns_v1';
        let newsletterConfirmResolver = null;

        async function showNewsletterConfirm(message) {
            const modal = document.getElementById('newsletter-confirm-modal');
            const msg = document.getElementById('newsletter-confirm-message');
            if (!modal || !msg) return await Utils.confirmDialog(message);
            msg.textContent = message;
            modal.classList.remove('hidden');
            return await new Promise((resolve) => {
                newsletterConfirmResolver = resolve;
            });
        }

        function closeNewsletterConfirm(result) {
            const modal = document.getElementById('newsletter-confirm-modal');
            if (modal) modal.classList.add('hidden');
            const resolver = newsletterConfirmResolver;
            newsletterConfirmResolver = null;
            if (resolver) resolver(result);
        }

        function getLocalCampaigns() {
            try {
                const raw = localStorage.getItem(LOCAL_CAMPAIGNS_KEY);
                const parsed = raw ? JSON.parse(raw) : [];
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function saveLocalCampaign(campaign) {
            const current = getLocalCampaigns();
            const next = [campaign, ...current].slice(0, 50);
            localStorage.setItem(LOCAL_CAMPAIGNS_KEY, JSON.stringify(next));
        }

        async function loadRecipientCount() {
            const label = document.getElementById('newsletter-recipient-count');
            if (!label) return;
            try {
                const res = await ApiClient.get('/admin/newsletter/destinatari/count');
                const count = Number(res?.destinatari || 0);
                label.textContent = `Destinatari iscritti: ${count}`;
                label.className = count > 0 ? 'text-sm text-green-400' : 'text-sm text-amber-300';
            } catch {
                label.textContent = 'Destinatari iscritti: non disponibili';
                label.className = 'text-sm text-on-surface-variant';
            }
        }

        async function loadCampaigns() {
            const box = document.getElementById('campaigns-list');
            try {
                const list = await ApiClient.get('/admin/newsletter/campagne');
                const remote = Array.isArray(list) ? list : [];
                const local = getLocalCampaigns();
                allCampaigns = [...local, ...remote];
                renderCampaigns();
            } catch (error) {
                allCampaigns = getLocalCampaigns();
                if (allCampaigns.length > 0) {
                    renderCampaigns();
                    return;
                }
                const msg = String(error?.message || '');
                if (msg.includes('HTTP 500') || msg.includes('HTTP 503') || msg.includes('HTTP 404')) {
                    box.innerHTML = `
                        <div class="rounded-xl border border-outline-variant/20 bg-surface-container-high p-3">
                            Lo storico e vuoto.
                        </div>
                    `;
                    return;
                }
                box.innerHTML = `
                    <div class="rounded-xl border border-outline-variant/20 bg-surface-container-high p-3">
                        Lo storico non e disponibile al momento.
                    </div>
                `;
            }
        }

        function renderCampaigns() {
            const box = document.getElementById('campaigns-list');
            const q = String(document.getElementById('campaign-search')?.value || '').trim().toLowerCase();
            const rows = !q
                ? [...allCampaigns]
                : allCampaigns.filter((c) => String(c.oggetto || '').toLowerCase().includes(q));

            if (!rows.length) {
                box.innerHTML = q ? 'Nessuna campagna trovata con questa ricerca.' : 'Nessuna campagna inviata.';
                return;
            }
            box.innerHTML = rows.map((c) => `
                <div class="rounded-xl border border-outline-variant/20 bg-surface-container-high p-3">
                    <div class="font-medium text-on-surface">${c.oggetto}</div>
                    <div class="text-xs mt-1">Data invio: ${new Date(c.dataInvio).toLocaleString('it-IT')}</div>
                    <div class="text-xs">Destinatari: ${c.destinatariCount}</div>
                </div>
            `).join('');
        }

        async function sendCampaign(event) {
            event.preventDefault();
            const subject = document.getElementById('campaign-subject').value.trim();
            const htmlBody = document.getElementById('campaign-html').value.trim();
            if (!subject || !htmlBody) return;

            const ok = await showNewsletterConfirm('Confermi invio newsletter agli utenti iscritti?');
            if (!ok) return;

            try {
                const res = await ApiClient.post('/admin/newsletter/campagne/invia', { oggetto: subject, htmlBody });
                const sentCount = Number(res?.destinatari || 0);
                if (sentCount <= 0) {
                    Utils.showNotification('Nessun destinatario raggiunto: verifica iscrizioni newsletter e backend SMTP', 'error');
                    return;
                }
                const failedCount = Number(res?.falliti || 0);
                const statusType = failedCount > 0 ? 'warning' : 'success';
                const suffix = failedCount > 0
                    ? `${sentCount} inviate, ${failedCount} fallite`
                    : `${sentCount} destinatari`;
                Utils.showNotification(`${res.message || 'Campagna inviata'} (${suffix})`, statusType);
                event.target.reset();
                await loadCampaigns();
                await loadRecipientCount();
            } catch (error) {
                const msg = error.message || 'Errore invio campagna';
                if (msg.includes('Nessun destinatario')) {
                    Utils.showNotification('Nessun iscritto alla newsletter: usa "Invia test" oppure attiva il consenso dal profilo di un utente.', 'warning');
                    await loadRecipientCount();
                    return;
                }
                Utils.showNotification(msg, 'error');
            }
        }

        async function sendTestCampaign() {
            const subject = document.getElementById('campaign-subject').value.trim();
            const htmlBody = document.getElementById('campaign-html').value.trim();
            const email = document.getElementById('campaign-test-email').value.trim();
            if (!subject || !htmlBody) {
                Utils.showNotification('Compila oggetto e contenuto prima del test', 'error');
                return;
            }
            if (!email) {
                Utils.showNotification('Inserisci una email per il test', 'error');
                return;
            }

            try {
                const res = await ApiClient.post('/admin/newsletter/campagne/test', { oggetto: subject, htmlBody, email });
                Utils.showNotification(res?.message || 'Email di test inviata', 'success');
            } catch (error) {
                Utils.showNotification(error.message || 'Errore invio test newsletter', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllComponents();
            const user = typeof Auth !== 'undefined' ? Auth.getUser?.() : null;
            if (user?.email) {
                const testEmail = document.getElementById('campaign-test-email');
                if (testEmail) testEmail.value = user.email;
            }
            document.getElementById('campaign-form')?.addEventListener('submit', sendCampaign);
            document.getElementById('send-test-campaign-btn')?.addEventListener('click', sendTestCampaign);
            document.getElementById('refresh-campaigns-btn')?.addEventListener('click', loadCampaigns);
            document.getElementById('campaign-search')?.addEventListener('input', () => renderCampaigns());
            document.getElementById('newsletter-confirm-cancel')?.addEventListener('click', () => closeNewsletterConfirm(false));
            document.getElementById('newsletter-confirm-ok')?.addEventListener('click', () => closeNewsletterConfirm(true));
            await loadRecipientCount();
            await loadCampaigns();
        });
    </script>
</body>
</html>
