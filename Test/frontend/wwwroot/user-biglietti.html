<!DOCTYPE html>
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Miei Biglietti | FilmAPI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
    <div id="navbar-container"></div>
    <div class="flex flex-1">
        <div id="sidebar-container"></div>
        <main class="flex-1 p-4 md:p-8 lg:p-10 pb-20 md:pb-6">
            <section class="hero-banner p-6 md:p-8 mb-6 reveal-up">
                <span class="badge-soft mb-3">
                    <span class="material-symbols-outlined text-sm">confirmation_number</span>
                    Ticket wallet
                </span>
                <h1 class="font-headline text-3xl md:text-5xl font-semibold">I Miei Biglietti</h1>
                <p class="text-on-surface-variant mt-2">Storico acquisti, stato validazione e accesso rapido ai QR.</p>
            </section>

            <section id="tickets-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 reveal-up delay-1"></section>
            <div id="empty" class="hidden text-on-surface-variant">Nessun biglietto disponibile.</div>
        </main>
    </div>
    <div id="footer-container"></div>

    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/route-guard.js"></script>
    <script src="/js/template-loader.js"></script>
    <script src="/js/api-client.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllComponents();
            await loadTickets();
        });

        async function loadTickets() {
            try {
                Utils.showLoading();
                const tickets = await ApiClient.get('/user/biglietti');
                const grid = document.getElementById('tickets-grid');
                const empty = document.getElementById('empty');
                const targetShowId = parseInt(new URLSearchParams(window.location.search).get('showId') || '0');

                const sorted = [...tickets].sort((a, b) => {
                    if (!targetShowId) return 0;
                    if (a.showId === targetShowId && b.showId !== targetShowId) return -1;
                    if (a.showId !== targetShowId && b.showId === targetShowId) return 1;
                    return 0;
                });

                if (!sorted.length) {
                    grid.innerHTML = '';
                    empty.classList.remove('hidden');
                    return;
                }

                empty.classList.add('hidden');
                grid.innerHTML = sorted.map((t, index) => {
                    const qrValue = getQrValue(t);
                    const highlighted = targetShowId && t.showId === targetShowId;
                    const canValidate = Auth.hasRole('Admin') || Auth.hasRole('PowerUser');
                    const checkinUrl = `/check-in.html?codice=${encodeURIComponent(t.codiceHash)}&cinemaId=${t.cinemaId}`;
                    return `
                    <article class="bg-surface-container rounded-xl border ${highlighted ? 'border-emerald-500/50' : 'border-outline-variant/20'} p-4 hover-lift reveal-up" style="animation-delay:${(index % 8) * 0.04}s">
                        <div class="flex items-center justify-between mb-2">
                            <div class="font-semibold">Biglietto #${t.id}</div>
                            <div class="text-xs ${t.validato ? 'text-emerald-400' : 'text-amber-300'}">${t.validato ? 'Validato' : 'Da validare'}</div>
                        </div>
                        <div class="text-sm text-on-surface-variant">Acquisto: ${t.acquistoId}</div>
                        <div class="text-sm text-on-surface-variant">Show: ${t.showId}</div>
                        <div class="text-sm text-on-surface-variant">Posto: ${escapeHtml(t.posto)}</div>
                        <div class="text-sm text-on-surface-variant">Sala: ${t.salaNumero} (${escapeHtml(t.tipologiaSala)})</div>
                        <div class="text-sm text-on-surface-variant">Prezzo: ${Number(t.prezzo).toFixed(2)} EUR</div>
                        <div class="text-xs font-mono mt-2 break-all text-on-surface-variant">${escapeHtml(t.codiceHash)}</div>
                        <div class="mt-3 flex items-center gap-2">
                            <button onclick="toggleQr(${t.id})" class="px-3 py-2 bg-primary-container text-white rounded-lg text-sm hover-lift">Mostra QR</button>
                            ${qrValue ? `<a href="${escapeHtml(qrValue)}" target="_blank" class="px-3 py-2 bg-surface-container-high border border-outline-variant/40 text-on-surface rounded-lg text-sm hover-lift">Apri URL</a>` : ''}
                            <a href="${checkinUrl}" class="px-3 py-2 bg-surface-container-high border border-outline-variant/40 text-on-surface rounded-lg text-sm hover-lift">Controlla ticket</a>
                            ${canValidate ? `<a href="/validazione.html?codice=${encodeURIComponent(t.codiceHash)}&cinemaId=${t.cinemaId}" class="px-3 py-2 bg-surface-container-high border border-outline-variant/40 text-on-surface rounded-lg text-sm hover-lift">Vai a validazione</a>` : ''}
                        </div>
                        <div id="qr-wrap-${t.id}" class="hidden mt-3 p-3 rounded-lg bg-surface-container-high border border-outline-variant/30">
                            <div id="qr-${t.id}" class="inline-block" data-qr="${encodeURIComponent(qrValue || t.codiceHash)}"></div>
                            <div class="text-xs text-on-surface-variant mt-2 break-all">${escapeHtml(qrValue || t.codiceHash)}</div>
                        </div>
                    </article>
                `;
                }).join('');
            } catch (e) {
                Utils.showNotification(e.message || 'Errore caricamento biglietti', 'error');
            } finally {
                Utils.hideLoading();
            }
        }

        function getQrValue(ticket) {
            const raw = ticket.qRCodeUrl || ticket.qrcodeUrl || ticket.qrCodeUrl;
            if (raw && raw !== 'https://filmapi.com/validazione/qr/pending') return raw;
            return `${window.location.origin}/check-in.html?codice=${encodeURIComponent(ticket.codiceHash)}&cinemaId=${ticket.cinemaId}`;
        }

        function toggleQr(ticketId) {
            const wrap = document.getElementById(`qr-wrap-${ticketId}`);
            const qrContainer = document.getElementById(`qr-${ticketId}`);
            if (!wrap || !qrContainer) return;

            const isHidden = wrap.classList.contains('hidden');
            wrap.classList.toggle('hidden', !isHidden);
            if (!isHidden) return;

            if (qrContainer.childElementCount > 0) return;

            const qrText = decodeURIComponent(qrContainer.dataset.qr || '');

            new QRCode(qrContainer, {
                text: qrText,
                width: 180,
                height: 180,
                colorDark: '#f3f1eb',
                colorLight: '#252b2d',
                correctLevel: QRCode.CorrectLevel.M
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
</body>
</html>
