<head>

<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">

    <div class="flex flex-1">

        <!-- DOC-BLOCK: Sezione principale: contiene il flusso operativo della pagina. -->
        <main class="page-shell flex-1 p-4 md:p-8 lg:p-10 pb-20 md:pb-6">
            <!-- DOC-BLOCK: Blocco funzionale UI: raggruppa contenuti/azioni omogenee della pagina. -->
            <section class="hero-banner p-6 md:p-8 mb-6 reveal-up">

            <!-- DOC-BLOCK: Blocco funzionale UI: raggruppa contenuti/azioni omogenee della pagina. -->
            <section class="mb-6 reveal-up delay-1">
                <div class="app-card p-4">
                    <div class="flex items-center justify-between gap-3 mb-3">
                        <h2 class="font-headline text-lg">Storico Acquisti</h2>

                    <div id="acquisti-empty" class="hidden text-sm text-on-surface-variant">Nessun acquisto registrato.</div>

            <!-- DOC-BLOCK: Blocco funzionale UI: raggruppa contenuti/azioni omogenee della pagina. -->
            <section class="mb-6 reveal-up delay-2">

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">

                            <input id="ticket-search" type="text" placeholder="ID ticket, show, posto..." class="mt-1 w-full rounded-xl border border-outline-variant/30 bg-surface-container-high px-3 py-2.5 text-sm">

                        <div>
                            <label for="ticket-state-filter" class="text-xs text-on-surface-variant uppercase tracking-[0.16em]">Stato</label>

                                <option value="all">Tutti</option>
                                <option value="active">Attivi</option>

                                <option value="refunded">Rimborsati</option>

            <!-- DOC-BLOCK: Blocco funzionale UI: raggruppa contenuti/azioni omogenee della pagina. -->

    <div id="refund-modal" class="hidden fixed inset-0 z-[9999]">
        <div id="refund-modal-backdrop" class="absolute inset-0 bg-black/70"></div>
        <div class="relative h-full w-full flex items-center justify-center p-4">

                    <button id="refund-modal-close" type="button" class="rounded-lg border border-outline-variant/30 px-2 py-1 text-xs text-on-surface-variant hover:text-on-surface">Chiudi</button>

    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/theme.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/api-config.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/auth.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/route-guard.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/template-loader.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/api-client.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/utils.js"></script>
    <!-- DOC-BLOCK: Script inline pagina: gestisce eventi UI, stato locale e integrazione con ApiClient. -->
    <script>
        let allTickets = [];
        let ticketSearch = '';
        let ticketState = 'all';

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllComponents();
            bindTicketFilters();
            renderSuccessBanner();
            await loadAcquisti();
            await loadTickets();
        });

        function bindTicketFilters() {
            const searchInput = document.getElementById('ticket-search');
            const stateSelect = document.getElementById('ticket-state-filter');
            if (searchInput) {
                searchInput.addEventListener('input', () => {
                    ticketSearch = String(searchInput.value || '').trim().toLowerCase();
                    renderTickets();
                });
            }
            if (stateSelect) {
                stateSelect.addEventListener('change', () => {
                    ticketState = stateSelect.value || 'all';
                    renderTickets();
                });
            }
        }

        function renderSuccessBanner() {
            const params = new URLSearchParams(window.location.search);
            const acquistoId = parseInt(params.get('acquistoId') || '0');
            if (!acquistoId) return;

            const banner = document.getElementById('purchase-success-banner');
            if (!banner) return;
            banner.classList.remove('hidden');
            banner.innerHTML = `
                <div class="flex items-start justify-between gap-3">
                    <div>
                        <div class="font-semibold text-emerald-100">Acquisto #${acquistoId} completato</div>
                        <div class="text-emerald-100/90 text-xs mt-0.5">QR e PDF disponibili qui sotto. Ti abbiamo inviato anche una email di conferma.</div>
                    </div>
                    <button id="dismiss-success" class="px-2 py-1 rounded-lg border border-emerald-300/40 text-emerald-100 text-xs">Chiudi</button>
                </div>
            `;

            const dismiss = document.getElementById('dismiss-success');
            if (dismiss) {
                dismiss.addEventListener('click', () => {
                    banner.classList.add('hidden');
                });
            }
        }

        async function loadAcquisti() {
            try {
                const acquisti = await ApiClient.get('/user/acquisti');
                const container = document.getElementById('acquisti-list');
                const empty = document.getElementById('acquisti-empty');

                if (!Array.isArray(acquisti) || acquisti.length === 0) {
                    container.innerHTML = '';
                    empty.classList.remove('hidden');
                    return;
                }

                empty.classList.add('hidden');
                container.innerHTML = acquisti.slice(0, 8).map((a) => {
                    const methodLabel = a.metodoPagamentoEtichetta || a.metodoPagamento || 'N/D';
                    const creditoUsato = Number(a.creditoUsato || 0);
                    const importoTotale = Number(a.importoTotale || 0);
                    const cartaUsata = Math.max(0, importoTotale - creditoUsato);
                    const pagamentoMisto = creditoUsato > 0 && cartaUsata > 0;
                    const canRefund = String(a.stato || '').toUpperCase() === 'PAGATO';
                    return `
                        <div class="rounded-xl border border-outline-variant/20 bg-surface-container-high p-3 text-sm flex flex-col md:flex-row md:items-center md:justify-between gap-2">
                            <div class="text-on-surface-variant">Acquisto #${a.id} - ${new Date(a.dataAcquisto).toLocaleDateString('it-IT')}</div>
                            <div class="text-on-surface">${importoTotale.toFixed(2)} EUR</div>
                            <div class="text-on-surface-variant">Metodo: <span class="text-on-surface">${escapeHtml(methodLabel)}</span></div>
                            <div class="text-on-surface-variant">Stato: <span class="text-on-surface">${escapeHtml(a.stato || 'N/D')}</span></div>
                            <div class="text-on-surface-variant">${pagamentoMisto ? `Misto: credito ${creditoUsato.toFixed(2)} EUR + carta ${cartaUsata.toFixed(2)} EUR` : (creditoUsato > 0 ? `Pagato con credito: ${creditoUsato.toFixed(2)} EUR` : `Pagato con carta: ${cartaUsata.toFixed(2)} EUR`)}</div>
                            <div class="flex items-center gap-2">
                                <button type="button" onclick="downloadAcquistoPdf(${a.id})" class="px-3 py-2 bg-surface-container border border-outline-variant/40 text-on-surface rounded-lg text-xs hover-lift">Scarica PDF</button>
                                ${canRefund ? `<button type="button" onclick="richiediRimborso(${a.id})" class="px-3 py-2 bg-amber-500/20 border border-amber-400/40 text-amber-200 rounded-lg text-xs hover-lift">Richiedi rimborso</button>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch {
                const empty = document.getElementById('acquisti-empty');
                empty.textContent = 'Impossibile caricare lo storico acquisti.';
                empty.classList.remove('hidden');
            }
        }

        async function loadTickets() {
            try {
                Utils.showLoading();
                const tickets = await ApiClient.get('/user/biglietti');
                const targetShowId = parseInt(new URLSearchParams(window.location.search).get('showId') || '0');
                allTickets = [...(Array.isArray(tickets) ? tickets : [])].sort((a, b) => {
                    if (!targetShowId) return 0;
                    if (a.showId === targetShowId && b.showId !== targetShowId) return -1;
                    if (a.showId !== targetShowId && b.showId === targetShowId) return 1;
                    return 0;
                });
                renderTickets();
            } catch (e) {
                Utils.showNotification(e.message || 'Errore caricamento biglietti', 'error');
            } finally {
                Utils.hideLoading();
            }
        }

        function renderTickets() {
            const grid = document.getElementById('tickets-grid');
            const empty = document.getElementById('empty');
            const targetShowId = parseInt(new URLSearchParams(window.location.search).get('showId') || '0');
            let filtered = [...allTickets];

            if (ticketState === 'active') filtered = filtered.filter((x) => !x.validato && !x.rimborsato);
            if (ticketState === 'validated') filtered = filtered.filter((x) => !!x.validato);
            if (ticketState === 'refunded') filtered = filtered.filter((x) => !!x.rimborsato);

            if (ticketSearch) {
                filtered = filtered.filter((x) => {
                    const hay = `${x.id} ${x.showId} ${x.posto || ''} ${x.codiceHash || ''}`.toLowerCase();
                    return hay.includes(ticketSearch);
                });
            }

            if (!filtered.length) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.innerHTML = filtered.map((t, index) => {
                    const qrValue = getQrValue(t);
                    const highlighted = targetShowId && t.showId === targetShowId;
                    const canValidate = Auth.hasRole('Admin') || Auth.hasRole('PowerUser');
                    const checkinUrl = `/check-in.html?codice=${encodeURIComponent(t.codiceHash)}&cinemaId=${t.cinemaId}`;
                    return `
                    <article class="app-card border ${highlighted ? 'border-emerald-500/50' : 'border-outline-variant/20'} p-4 hover-lift reveal-up relative overflow-hidden" style="animation-delay:${(index % 8) * 0.04}s">
                        <div class="absolute top-0 right-0 px-2 py-1 text-[10px] ${t.rimborsato ? 'bg-sky-500/20 text-sky-300' : (t.validato ? 'bg-emerald-500/20 text-emerald-300' : 'bg-amber-500/20 text-amber-200')} rounded-bl-lg border-l border-b border-outline-variant/20">${t.rimborsato ? 'RIMBORSATO' : (t.validato ? 'VALIDATO' : 'ATTIVO')}</div>
                        <div class="flex items-center justify-between mb-2">
                            <div class="font-semibold">Biglietto #${t.id}</div>
                            <div class="text-xs ${t.rimborsato ? 'text-sky-300' : (t.validato ? 'text-emerald-400' : 'text-amber-300')}">${t.rimborsato ? 'Rimborsato' : (t.validato ? 'Validato' : 'Da validare')}</div>
                        </div>
                        <div class="text-sm text-on-surface-variant">Acquisto: ${t.acquistoId}</div>
                        <div class="text-sm text-on-surface-variant">Show: ${t.showId}</div>
                        <div class="text-sm text-on-surface-variant">Posto: ${escapeHtml(t.posto)}</div>
                        <div class="text-sm text-on-surface-variant">Sala: ${t.salaNumero} (${escapeHtml(t.tipologiaSala)})</div>
                        <div class="text-sm text-on-surface-variant">Prezzo: ${Number(t.prezzo).toFixed(2)} EUR</div>
                        <div class="text-xs font-mono mt-2 break-all text-on-surface-variant">${escapeHtml(t.codiceHash)}</div>
                        <div class="mt-3 flex items-center gap-2">
                            <button onclick="toggleQr(${t.id})" class="app-btn app-btn-primary hover-lift">Mostra QR</button>
                            <a href="${checkinUrl}" class="app-btn app-btn-secondary hover-lift">Controlla ticket</a>
                            ${t.rimborsoDisponibile ? `<button type="button" onclick="richiediRimborsoBiglietto(${t.id})" class="app-btn app-btn-secondary hover-lift">Rimborsa ticket</button>` : ''}
                            ${canValidate ? `<a href="/validazione.html?codice=${encodeURIComponent(t.codiceHash)}&cinemaId=${t.cinemaId}" class="app-btn app-btn-secondary hover-lift">Vai a validazione</a>` : ''}
                        </div>
                        <div id="qr-wrap-${t.id}" class="hidden mt-3 p-3 rounded-lg bg-surface-container-high border border-outline-variant/30">
                            <div id="qr-${t.id}" class="inline-block" data-qr="${encodeURIComponent(qrValue || t.codiceHash)}"></div>
                            <div class="text-xs text-on-surface-variant mt-2 break-all">${escapeHtml(qrValue || t.codiceHash)}</div>
                        </div>
                    </article>
                `;
            }).join('');

            const pending = filtered.filter((x) => !x.validato).length;
                const totalChip = document.getElementById('wallet-total-chip');
                const pendingChip = document.getElementById('wallet-pending-chip');
            if (totalChip) totalChip.innerHTML = `<span class="material-symbols-outlined text-sm">local_activity</span>${filtered.length} ticket`;
                if (pendingChip) pendingChip.innerHTML = `<span class="material-symbols-outlined text-sm">schedule</span>${pending} da validare`;
        }

        function getQrValue(ticket) {
            const raw = ticket.qRCodeUrl || ticket.qrcodeUrl || ticket.qrCodeUrl;
            if (raw && raw !== 'https://filmapi.com/validazione/qr/pending') {
                try {
                    const parsed = new URL(raw, window.location.origin);
                    const marker = '/validazione/qr/';
                    const idx = parsed.pathname.indexOf(marker);
                    if (idx >= 0) {
                        const hash = parsed.pathname.slice(idx + marker.length).split('/')[0];
                        if (hash) {
                            return `${window.location.origin}/check-in.html?codice=${encodeURIComponent(hash)}&cinemaId=${ticket.cinemaId}`;
                        }
                    }

                    if (parsed.pathname.endsWith('/check-in.html')) {
                        return parsed.toString();
                    }
                } catch {
                }
            }
            return `${window.location.origin}/check-in.html?codice=${encodeURIComponent(ticket.codiceHash)}&cinemaId=${ticket.cinemaId}`;
        }

        async function downloadAcquistoPdf(acquistoId) {
            try {
                Utils.showLoading();
                const headers = {};
                if (Auth.accessToken) {
                    headers.Authorization = `Bearer ${Auth.accessToken}`;
                }

                const response = await fetch(`${ApiClient.baseUrl}/acquisto/${acquistoId}/pdf`, {
                    method: 'GET',
                    headers
                });

                if (!response.ok) {
                    throw new Error('Impossibile scaricare il PDF');
                }

                const blob = await response.blob();
                const objectUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = objectUrl;
                a.download = `biglietti-${acquistoId}.pdf`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(objectUrl);
            } catch (error) {
                Utils.showNotification(error.message || 'Errore download PDF', 'error');
            } finally {
                Utils.hideLoading();
            }
        }

        async function richiediRimborso(acquistoId) {
            const ok = await showRefundConfirmModal(`Confermare rimborso per acquisto #${acquistoId}? L'importo verra accreditato sul credito sito.`);
            if (!ok) return;

            try {
                Utils.showLoading();
                const res = await ApiClient.post(`/acquisto/${acquistoId}/rimborso`, {});
                Utils.showNotification(res?.message || 'Rimborso completato', 'success');
                await loadAcquisti();
                await loadTickets();
            } catch (error) {
                Utils.showNotification(error.message || 'Rimborso non disponibile', 'error');
            } finally {
                Utils.hideLoading();
            }
        }

        async function richiediRimborsoBiglietto(ticketId) {
            const ok = await showRefundConfirmModal(`Confermare rimborso del biglietto #${ticketId}? L'importo verra accreditato sul credito sito.`);
            if (!ok) return;

            try {
                Utils.showLoading();
                const res = await ApiClient.post(`/acquisto/biglietti/${ticketId}/rimborso`, {});
                Utils.showNotification(res?.message || 'Rimborso ticket completato', 'success');
                await loadAcquisti();
                await loadTickets();
            } catch (error) {
                Utils.showNotification(error.message || 'Rimborso ticket non disponibile', 'error');
            } finally {
                Utils.hideLoading();
            }
        }

        function toggleQr(ticketId) {
            const wrap = document.getElementById(`qr-wrap-${ticketId}`);
            const qrContainer = document.getElementById(`qr-${ticketId}`);
            if (!wrap || !qrContainer) return;

            const isHidden = wrap.classList.contains('hidden');
            wrap.classList.toggle('hidden', !isHidden);
            if (!isHidden) return;

            if (qrContainer.childElementCount > 0) return;

            const qrText = decodeURIComponent(qrContainer.dataset.qr || '');

            new QRCode(qrContainer, {
                text: qrText,
                width: 180,
                height: 180,
                colorDark: '#f3f1eb',
                colorLight: '#252b2d',
                correctLevel: QRCode.CorrectLevel.M
            });
        }

        function showRefundConfirmModal(message) {
            return new Promise((resolve) => {
                const modal = document.getElementById('refund-modal');
                const messageNode = document.getElementById('refund-modal-message');
                const confirmBtn = document.getElementById('refund-modal-confirm');
                const cancelBtn = document.getElementById('refund-modal-cancel');
                const closeBtn = document.getElementById('refund-modal-close');
                const backdrop = document.getElementById('refund-modal-backdrop');

                if (!modal || !messageNode || !confirmBtn || !cancelBtn || !closeBtn || !backdrop) {
                    Utils.confirmDialog(message).then(resolve);
                    return;
                }

                messageNode.textContent = message;
                modal.classList.remove('hidden');

                const cleanup = (value) => {
                    modal.classList.add('hidden');
                    confirmBtn.removeEventListener('click', onConfirm);
                    cancelBtn.removeEventListener('click', onCancel);
                    closeBtn.removeEventListener('click', onCancel);
                    backdrop.removeEventListener('click', onCancel);
                    document.removeEventListener('keydown', onEsc);
                    resolve(value);
                };

                const onConfirm = () => cleanup(true);
                const onCancel = () => cleanup(false);
                const onEsc = (event) => {
                    if (event.key === 'Escape') onCancel();
                };

                confirmBtn.addEventListener('click', onConfirm);
                cancelBtn.addEventListener('click', onCancel);
                closeBtn.addEventListener('click', onCancel);
                backdrop.addEventListener('click', onCancel);
                document.addEventListener('keydown', onEsc);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
</body>
