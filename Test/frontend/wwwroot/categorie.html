<!-- DOC: Pagina UI 'categorie': definisce struttura, sezioni e hook JS per il flusso utente. -->
<html class="dark" lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorie | FilmAPI</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-light-32.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-dark-32.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-dark-32.png">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon-light.ico" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon-dark.ico" media="(prefers-color-scheme: dark)">
    <link rel="shortcut icon" type="image/x-icon" href="/assets/icons/favicon-dark.ico">
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <link rel="stylesheet" href="/css/tailwind.local.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
    <div id="navbar-container"></div>
    <div class="flex flex-1">
        <div id="sidebar-container"></div>
        <!-- DOC-BLOCK: Sezione principale: contiene il flusso operativo della pagina. -->
        <main class="page-shell flex-1 p-4 md:p-8 lg:p-12 pb-20 md:pb-0">
            <div class="hero-banner p-6 md:p-8 mb-6 reveal-up">
                <div class="flex items-end justify-between gap-4 flex-col md:flex-row">
                    <div>
                        <span class="badge-soft mb-3">
                            <span class="material-symbols-outlined text-sm">category</span>
                            Solo admin
                        </span>
                        <h1 class="font-headline text-3xl md:text-5xl font-semibold text-on-surface">Categorie</h1>
                        <p class="text-on-surface-variant mt-2">Gestisci tassonomia film e metadati di classificazione.</p>
                    </div>
                    <button onclick="openCreate()" class="px-5 py-3 rounded-xl bg-primary-container text-white font-bold hover-lift">Nuova Categoria</button>
                </div>
            </div>

            <div id="categorie-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 reveal-up delay-1"></div>
        </main>
    </div>
    <div id="footer-container"></div>
    <div id="modal-container"></div>

    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/theme.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/api-config.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/auth.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/route-guard.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/template-loader.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/api-client.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/utils.js"></script>
    <!-- DOC-BLOCK: Script inline pagina: gestisce eventi UI, stato locale e integrazione con ApiClient. -->
    <script>
        let categorie = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllComponents();
            if (!Auth.isAdmin()) {
                window.location.href = '/programmazione.html';
                return;
            }
            await loadCategorie();
        });

        async function loadCategorie() {
            categorie = await ApiClient.get('/categorie');
            render();
        }

        function render() {
            const grid = document.getElementById('categorie-grid');
            grid.innerHTML = categorie.map((c, index) => `
                <article class="bg-surface-container-low border border-outline-variant/20 rounded-xl p-4 hover-lift reveal-up" style="animation-delay:${(index % 8) * 0.04}s">
                    <h3 class="text-lg font-bold text-white">${escapeHtml(c.nome)}</h3>
                    <p class="text-sm text-on-surface-variant mt-1 min-h-10">${escapeHtml(c.descrizione || 'Nessuna descrizione')}</p>
                    <div class="mt-4 flex gap-2 justify-end">
                        <button onclick="openEdit(${c.id})" class="px-3 py-2 rounded-lg bg-surface-container-high text-sm hover-lift">Modifica</button>
                        <button onclick="removeCategoria(${c.id})" class="px-3 py-2 rounded-lg bg-error-container/30 text-error text-sm hover-lift">Elimina</button>
                    </div>
                </article>
            `).join('');
        }

        function openCreate() {
            showForm('Nuova Categoria', { nome: '', descrizione: '' }, async data => {
                await ApiClient.post('/categorie', data);
                await loadCategorie();
            });
        }

        function openEdit(id) {
            const categoria = categorie.find(c => c.id === id);
            if (!categoria) return;
            showForm('Modifica Categoria', categoria, async data => {
                await ApiClient.put(`/categorie/${id}`, data);
                await loadCategorie();
            });
        }

        async function removeCategoria(id) {
            if (!await Utils.confirmDialog('Eliminare la categoria?')) return;
            await ApiClient.delete(`/categorie/${id}`);
            await loadCategorie();
        }

        function showForm(title, initial, onSave) {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="modal-backdrop" onclick="if(event.target===this) closeModal()">
                    <div class="modal-content max-w-lg">
                        <h3 class="text-xl font-bold mb-4">${title}</h3>
                        <!-- DOC-BLOCK: Form utente: raccoglie input, valida lato client e invia dati ai servizi API. -->
                        <form id="cat-form" class="space-y-3">
                            <input id="cat-nome" value="${escapeHtml(initial.nome || '')}" placeholder="Nome" class="w-full bg-surface-container-high border-none rounded-lg" required>
                            <textarea id="cat-desc" placeholder="Descrizione" class="w-full bg-surface-container-high border-none rounded-lg">${escapeHtml(initial.descrizione || '')}</textarea>
                            <div class="flex justify-end gap-2 mt-4">
                                <button type="button" onclick="closeModal()" class="px-4 py-2 rounded-lg bg-surface-container-high">Annulla</button>
                                <button type="submit" class="px-4 py-2 rounded-lg bg-primary-container text-white">Salva</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;

            document.getElementById('cat-form').addEventListener('submit', async e => {
                e.preventDefault();
                const data = {
                    nome: document.getElementById('cat-nome').value.trim(),
                    descrizione: document.getElementById('cat-desc').value.trim()
                };
                await onSave(data);
                closeModal();
            });
        }

        function closeModal() {
            document.getElementById('modal-container').innerHTML = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
</body>
</html>
