<!DOCTYPE html>
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricarica Credito | FilmAPI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
    <div id="navbar-container"></div>
    <div class="flex flex-1">
        <div id="sidebar-container"></div>
        <main class="flex-1 p-4 md:p-8 lg:p-10 pb-20 md:pb-6">
            <section class="hero-banner p-6 md:p-8 mb-5 reveal-up">
                <span class="badge-soft mb-3">
                    <span class="material-symbols-outlined text-sm">account_balance_wallet</span>
                    Operazioni credito
                </span>
                <h1 id="page-title" class="font-headline text-3xl md:text-5xl font-semibold mb-4">Ricarica Credito</h1>

                <div id="admin-controls" class="hidden grid grid-cols-1 md:grid-cols-3 gap-3">
                    <input id="search-user" type="text" placeholder="Email o username" class="bg-surface-container-high rounded-lg border-none" />
                    <button id="search-btn" class="px-4 py-2 bg-surface-container-high rounded-lg hover-lift">Cerca</button>
                    <select id="cinema-select" class="bg-surface-container-high rounded-lg border-none"></select>
                </div>
            </section>

            <section id="self-box" class="hidden bg-surface-container rounded-2xl border border-outline-variant/20 p-5 mb-5 reveal-up delay-1">
                <h2 class="font-headline text-lg font-bold mb-3">Il tuo saldo</h2>
                <div class="text-2xl font-bold mb-1"><span id="self-saldo">0.00</span> EUR</div>
                <p class="text-sm text-on-surface-variant">Ricarica il credito del tuo account per usarlo nei pagamenti.</p>
            </section>

            <section id="self-recharge-box" class="hidden bg-surface-container rounded-2xl border border-outline-variant/20 p-5 reveal-up delay-2">
                <h2 class="font-headline text-lg font-bold mb-3">Nuova ricarica personale</h2>
                <p class="text-sm text-on-surface-variant mb-3">Il pagamento con carta avviene su Stripe Checkout in pagina sicura.</p>
                <form id="self-recharge-form" class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <input name="importo" type="number" step="0.01" min="0.01" placeholder="Importo EUR" class="bg-surface-container-high rounded-lg border-none" required />
                    <input name="descrizione" type="text" placeholder="Note (opzionale)" class="bg-surface-container-high rounded-lg border-none" />
                    <button type="submit" class="px-4 py-2 bg-primary-container text-white rounded-lg hover-lift">Ricarica con carta</button>
                </form>
                <div id="self-tx-result" class="mt-4"></div>
            </section>

            <section id="user-box" class="hidden bg-surface-container rounded-2xl border border-outline-variant/20 p-5 mb-5 reveal-up delay-1"></section>

            <section id="recharge-box" class="hidden bg-surface-container rounded-2xl border border-outline-variant/20 p-5 reveal-up delay-2">
                <h2 class="font-headline text-lg font-bold mb-3">Nuova ricarica</h2>
                <form id="recharge-form" class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <input name="importo" type="number" step="0.01" min="0.01" placeholder="Importo EUR" class="bg-surface-container-high rounded-lg border-none" required />
                    <input name="descrizione" type="text" placeholder="Note" class="bg-surface-container-high rounded-lg border-none" />
                    <button type="submit" class="px-4 py-2 bg-primary-container text-white rounded-lg hover-lift">Conferma Ricarica</button>
                </form>
                <div id="tx-result" class="mt-4"></div>
            </section>
        </main>
    </div>
    <div id="footer-container"></div>

    <script src="/js/theme.js"></script>
    <script src="/js/api-config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/route-guard.js"></script>
    <script src="/js/template-loader.js"></script>
    <script src="/js/api-client.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        let cinemas = [];
        let selectedUser = null;
        let isManagerMode = false;
        const SELF_CHECKOUT_DRAFT_KEY = 'filmapi_credito_checkout_draft';

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllComponents();
            
            const user = (typeof Auth !== 'undefined') ? Auth.getUser() : null;
            const roles = user?.ruoli || [];
            const isManager = roles.includes('Admin') || roles.includes('PowerUser');
            
            if (!isManager) {
                window.location.href = '/ricarica-credito-utente.html';
                return;
            }
            
            bindEvents();
            await initData();
        });

        function bindEvents() {
            const searchBtn = document.getElementById('search-btn');
            const adminForm = document.getElementById('recharge-form');
            const selfForm = document.getElementById('self-recharge-form');
            if (searchBtn) searchBtn.addEventListener('click', searchUser);
            if (adminForm) adminForm.addEventListener('submit', onRechargeAdmin);
            if (selfForm) selfForm.addEventListener('submit', onRechargeSelf);
        }

        async function initData() {
            isManagerMode = true;
            document.getElementById('admin-controls').classList.toggle('hidden', !isManagerMode);
            document.getElementById('user-box').classList.toggle('hidden', !isManagerMode);
            document.getElementById('recharge-box').classList.toggle('hidden', !isManagerMode);
            document.getElementById('self-box').classList.toggle('hidden', isManagerMode);
            document.getElementById('self-recharge-box').classList.toggle('hidden', isManagerMode);
            document.getElementById('page-title').textContent = isManagerMode
                ? 'Ricarica Credito Utente'
                : 'Ricarica il tuo credito';

            if (isManagerMode) {
                cinemas = await ApiClient.get('/cinemas');
                const sel = document.getElementById('cinema-select');
                sel.innerHTML = cinemas.map(c => `<option value="${c.id}">${escapeHtml(c.nome)} - ${escapeHtml(c.citta)}</option>`).join('');
                document.getElementById('user-box').classList.add('hidden');
                document.getElementById('recharge-box').classList.add('hidden');
                return;
            }

            await refreshSelfSaldo();
            await resumeSelfCheckoutIfNeeded();
        }

        async function searchUser() {
            if (!isManagerMode) return;
            const q = document.getElementById('search-user').value.trim();
            if (!q) return;

            try {
                const users = await ApiClient.get(`/admin/credito/ricerca-utente?query=${encodeURIComponent(q)}`);
                if (!users.length) {
                    Utils.showNotification('Nessun utente trovato', 'info');
                    return;
                }

                selectedUser = users[0];
                const saldo = await ApiClient.get(`/admin/credito/storico/${selectedUser.id}`);
                const saldoCurrent = saldo.length ? Number(saldo[0].saldoSuccessivo || 0) : 0;

                document.getElementById('recharge-box').classList.remove('hidden');
                document.getElementById('user-box').innerHTML = `
                    <h2 class="font-headline text-lg font-bold mb-2">Utente trovato</h2>
                    <div class="text-sm">Nome: <strong>${escapeHtml((selectedUser.nome || '') + ' ' + (selectedUser.cognome || ''))}</strong></div>
                    <div class="text-sm">Email: <strong>${escapeHtml(selectedUser.email || '')}</strong></div>
                    <div class="text-sm">Username: <strong>${escapeHtml(selectedUser.username || '')}</strong></div>
                    <div class="text-sm mt-2">Saldo attuale: <strong>${saldoCurrent.toFixed(2)} EUR</strong></div>
                `;
            } catch (e) {
                Utils.showNotification(e.message || 'Errore ricerca utente', 'error');
            }
        }

        async function onRechargeAdmin(e) {
            e.preventDefault();
            if (!isManagerMode) return;
            if (!selectedUser) {
                Utils.showNotification('Seleziona prima un utente', 'error');
                return;
            }

            const cinemaId = parseInt(document.getElementById('cinema-select').value);
            const f = e.target;
            const payload = {
                utenteId: selectedUser.id,
                importo: parseFloat(f.importo.value),
                descrizione: f.descrizione.value || null,
                cinemaId
            };

            try {
                const tx = await ApiClient.post('/admin/credito/ricarica', payload);
                document.getElementById('tx-result').innerHTML = `
                    <div class="p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/30 text-sm">
                        <div>Transazione registrata</div>
                        <div>Importo: <strong>${Number(tx.importo).toFixed(2)} EUR</strong></div>
                        <div>Saldo precedente: <strong>${Number(tx.saldoPrecedente).toFixed(2)} EUR</strong></div>
                        <div>Nuovo saldo: <strong>${Number(tx.saldoSuccessivo).toFixed(2)} EUR</strong></div>
                        <div>Data: <strong>${new Date(tx.dataTransazione).toLocaleString('it-IT')}</strong></div>
                    </div>
                `;
                f.reset();
                Utils.showNotification('Ricarica completata', 'success');
            } catch (e) {
                Utils.showNotification(e.message || 'Errore ricarica', 'error');
            }
        }

        async function refreshSelfSaldo() {
            const saldoRes = await ApiClient.get('/user/credito');
            const saldo = Number(saldoRes?.saldo || 0);
            document.getElementById('self-saldo').textContent = saldo.toFixed(2);
        }

        async function onRechargeSelf(e) {
            e.preventDefault();
            if (isManagerMode) return;

            const f = e.target;
            const importo = parseFloat(f.importo.value);
            const descrizione = f.descrizione.value || null;
            if (!Number.isFinite(importo) || importo <= 0) {
                Utils.showNotification('Importo non valido', 'error');
                return;
            }

            try {
                const currentUrl = new URL(window.location.href);
                currentUrl.searchParams.set('checkout', 'success');
                currentUrl.searchParams.set('session_id', '{CHECKOUT_SESSION_ID}');
                const successUrl = currentUrl.toString();

                const cancelUrlObj = new URL(window.location.href);
                cancelUrlObj.searchParams.set('checkout', 'cancel');
                cancelUrlObj.searchParams.delete('session_id');
                const cancelUrl = cancelUrlObj.toString();

                saveCheckoutDraft({ importo, descrizione });

                const session = await ApiClient.post('/credito/checkout-session', {
                    importo,
                    successUrl,
                    cancelUrl
                });

                if (!session?.url) {
                    throw new Error('Checkout Stripe non disponibile');
                }

                window.location.href = session.url;
            } catch (e) {
                Utils.showNotification(e.message || 'Errore ricarica', 'error');
            }
        }

        async function resumeSelfCheckoutIfNeeded() {
            const params = new URLSearchParams(window.location.search);
            const checkoutStatus = params.get('checkout');
            const sessionId = params.get('session_id');

            if (!checkoutStatus) return;

            if (checkoutStatus === 'cancel') {
                clearCheckoutDraft();
                Utils.showNotification('Pagamento annullato su Stripe Checkout', 'info');
                params.delete('checkout');
                params.delete('session_id');
                const query = params.toString();
                window.history.replaceState({}, document.title, query ? `${window.location.pathname}?${query}` : window.location.pathname);
                return;
            }

            if (checkoutStatus !== 'success' || !sessionId) return;

            const draft = readCheckoutDraft();
            if (!draft || !Number.isFinite(Number(draft.importo)) || Number(draft.importo) <= 0) {
                Utils.showNotification('Ricarica non completabile: dati checkout mancanti', 'error');
                params.delete('checkout');
                params.delete('session_id');
                const query = params.toString();
                window.history.replaceState({}, document.title, query ? `${window.location.pathname}?${query}` : window.location.pathname);
                return;
            }

            try {
                const tx = await ApiClient.post('/credito/conferma-checkout', {
                    checkoutSessionId: sessionId,
                    importo: Number(draft.importo),
                    descrizione: draft.descrizione || null
                });

                document.getElementById('self-tx-result').innerHTML = `
                    <div class="p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/30 text-sm">
                        <div>Ricarica completata</div>
                        <div>Importo: <strong>${Number(tx.importo).toFixed(2)} EUR</strong></div>
                        <div>Saldo precedente: <strong>${Number(tx.saldoPrecedente).toFixed(2)} EUR</strong></div>
                        <div>Nuovo saldo: <strong>${Number(tx.saldoSuccessivo).toFixed(2)} EUR</strong></div>
                        <div>Data: <strong>${new Date(tx.dataTransazione).toLocaleString('it-IT')}</strong></div>
                    </div>
                `;

                clearCheckoutDraft();
                await refreshSelfSaldo();
                Utils.showNotification('Credito aggiornato con successo', 'success');
            } catch (e) {
                const message = e?.message || 'Errore conferma ricarica';
                if (String(message).toLowerCase().includes('gia stata elaborata')) {
                    clearCheckoutDraft();
                    await refreshSelfSaldo();
                    Utils.showNotification('Ricarica gia registrata', 'info');
                } else {
                    Utils.showNotification(message, 'error');
                }
            } finally {
                params.delete('checkout');
                params.delete('session_id');
                const query = params.toString();
                window.history.replaceState({}, document.title, query ? `${window.location.pathname}?${query}` : window.location.pathname);
            }
        }

        function saveCheckoutDraft(draft) {
            localStorage.setItem(SELF_CHECKOUT_DRAFT_KEY, JSON.stringify(draft));
        }

        function readCheckoutDraft() {
            const raw = localStorage.getItem(SELF_CHECKOUT_DRAFT_KEY);
            if (!raw) return null;
            try {
                return JSON.parse(raw);
            } catch {
                return null;
            }
        }

        function clearCheckoutDraft() {
            localStorage.removeItem(SELF_CHECKOUT_DRAFT_KEY);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
</body>
</html>
