<!-- DOC: footer - file del progetto; contiene logica specifica della feature/modulo. -->
<!-- DOC: Pagina UI 'footer': definisce struttura, sezioni e hook JS per il flusso utente. -->
<footer class="mt-10 md:mt-14 px-4 md:px-8 lg:px-12 pb-24 md:pb-8">
    <div class="max-w-[1500px] mx-auto rounded-2xl bg-surface-container border border-outline-variant/20 px-4 md:px-7 py-5 md:py-6 flex flex-col gap-4 footer-shell">
        <div>
            <p class="text-xs uppercase tracking-[0.2em] text-on-surface-variant">FilmHub</p>
            <p class="mt-1 text-sm text-on-surface">Esperienza cinema, progettata per il tuo team.</p>
        </div>

        <div class="w-full grid gap-4 md:grid-cols-[minmax(280px,1fr)_auto] items-start">
            <div class="max-w-xl footer-newsletter">
                <p class="text-[11px] uppercase tracking-[0.18em] text-on-surface-variant">Newsletter</p>
                <!-- DOC-BLOCK: Form utente: raccoglie input, valida lato client e invia dati ai servizi API. -->
                <form id="footer-newsletter-form" class="mt-2 flex flex-col sm:flex-row gap-2">
                    <input id="footer-newsletter-email" type="email" required placeholder="La tua email" class="flex-1 rounded-lg border border-outline-variant/30 bg-surface-container-high px-3 py-2 text-sm text-on-surface">
                    <button type="submit" class="app-btn app-btn-primary whitespace-nowrap">Iscriviti</button>
                </form>
                <p id="footer-newsletter-guest-message" class="mt-2 text-xs text-on-surface-variant hidden">
                    Per iscriverti alla newsletter devi aver effettuato login o registrazione.
                </p>
                <p id="footer-newsletter-feedback" class="mt-2 text-xs text-on-surface-variant hidden"></p>
            </div>

            <div class="grid gap-3 text-[11px] uppercase tracking-[0.18em] text-on-surface-variant md:justify-items-end">
                <div class="flex flex-wrap items-center gap-4">
                    <a class="hover:text-on-surface transition-colors" href="/supporto.html">Supporto</a>
                    <a class="hover:text-on-surface transition-colors" href="/termini.html">Termini</a>
                    <a class="hover:text-on-surface transition-colors" href="/condizioni.html">Condizioni</a>
                    <a class="hover:text-on-surface transition-colors" href="/privacy.html">Privacy</a>
                    <span class="text-on-surface-variant/70">&copy; 2026</span>
                </div>
            </div>
        </div>
    </div>
</footer>

<!-- DOC-BLOCK: Script inline pagina: gestisce eventi UI, stato locale e integrazione con ApiClient. -->
<script>
    (function initFooterNewsletter() {
        const form = document.getElementById('footer-newsletter-form');
        const emailInput = document.getElementById('footer-newsletter-email');
        const feedback = document.getElementById('footer-newsletter-feedback');
        const guestMessage = document.getElementById('footer-newsletter-guest-message');
        if (!form || !emailInput || !feedback || !guestMessage) return;

        const isAuthenticated = typeof Auth !== 'undefined' && Auth.isAuthenticated();
        if (!isAuthenticated) {
            form.classList.add('hidden');
            guestMessage.classList.remove('hidden');
            return;
        }

        if (isAuthenticated) {
            const user = Auth.getUser();
            if (user?.email) emailInput.value = user.email;
        }

        if (form.dataset.bound === '1') return;
        form.dataset.bound = '1';

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            feedback.classList.add('hidden');
            const email = String(emailInput.value || '').trim();
            if (!email) return;

            try {
                const res = await ApiClient.post('/newsletter/subscribe', { email });
                feedback.textContent = res?.message || 'Iscrizione completata';
                feedback.className = 'mt-2 text-xs text-green-400';
            } catch (error) {
                feedback.textContent = error.message || 'Errore iscrizione newsletter';
                feedback.className = 'mt-2 text-xs text-red-400';
            }
        });
    })();
</script>
