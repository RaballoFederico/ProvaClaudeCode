    function canAccessNavItem(access, user) {
        if (typeof AccessControl !== 'undefined' && typeof AccessControl.canAccessByRule === 'function') {
            return AccessControl.canAccessByRule(access, user);
        }

        if (access === 'public') return true;
        if (access === 'guest') return !user;
        return !!user && access === 'auth';
    }

    function getAccessibleNavItems() {
        const user = (typeof Auth !== 'undefined' && Auth.isAuthenticated()) ? (Auth.getUser() || null) : null;
        return NAV_SEARCH_ITEMS.filter(item => canAccessNavItem(item.access, user));
    }

    function getNavItemSection(item) {
        return (item.access === 'manager' || item.access === 'admin') ? 'Backoffice' : 'Pagine';
    }

    function highlightMatch(text, query) {
        const safeText = escapeHtml(text);
        const normalizedQuery = (query || '').trim();
        if (!normalizedQuery) return safeText;

        const escapedQuery = normalizedQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`(${escapedQuery})`, 'ig');
        return safeText.replace(regex, '<span class="text-primary-container">$1</span>');
    }

    function scoreSearchItem(item, queryLower) {
        const label = item.label.toLowerCase();
        const keywords = item.keywords.map(k => k.toLowerCase());

        if (label === queryLower) return 200;
        if (label.startsWith(queryLower)) return 120;
        if (label.includes(queryLower)) return 80;

        const keywordStarts = keywords.find(k => k.startsWith(queryLower));
        if (keywordStarts) return 60;

        const keywordIncludes = keywords.find(k => k.includes(queryLower));
        if (keywordIncludes) return 40;

        return 0;
    }

    function bindNavbarSearch() {
        const wrapper = document.getElementById('nav-search-wrapper');
        const input = document.getElementById('nav-search-input');
        const results = document.getElementById('nav-search-results');
        const resultsList = document.getElementById('nav-search-results-list');
        if (!wrapper || !input || !results || !resultsList) return;

        if (window.__navSearchBound) {
            window.__navSearchRefresh = renderResults;
            renderResults(input.value);
            return;
        }

        window.__navSearchBound = true;
        let matches = [];
        let activeIndex = -1;

        function closeResults() {
            results.classList.add('hidden');
            activeIndex = -1;
        }

        function openResults() {
            if (matches.length > 0) {
                results.classList.remove('hidden');
            }
        }

        function navigateTo(item) {
            if (!item) return;
            window.location.href = item.href;
        }

        function renderResults(rawQuery = '') {
            const query = (rawQuery || '').trim();
            const queryLower = query.toLowerCase();
            const accessibleItems = getAccessibleNavItems();

            if (!queryLower) {
                matches = [];
                resultsList.innerHTML = '';
                closeResults();
                return;
            }

            matches = accessibleItems
                .map(item => ({ item, score: scoreSearchItem(item, queryLower) }))
                .filter(x => x.score > 0)
                .sort((a, b) => b.score - a.score || a.item.label.localeCompare(b.item.label, 'it'))
                .slice(0, 8)
                .map(x => x.item);

            activeIndex = matches.length > 0 ? 0 : -1;
            if (matches.length === 0) {
                resultsList.innerHTML = `
                    <div class="px-3 py-2 text-xs text-on-surface-variant">
                        Nessuna pagina trovata
                    </div>
                `;
                results.classList.remove('hidden');
                return;
            }

            resultsList.innerHTML = matches.map((item, index) => `
                <button
                    type="button"
                    data-index="${index}"
                    data-href="${item.href}"
                    class="nav-search-option w-full text-left px-3 py-2 rounded-xl transition-colors ${index === activeIndex ? 'bg-surface-container-high' : 'hover:bg-surface-container-high/70'}"
                >
                    <div class="text-sm text-on-surface">${highlightMatch(item.label, query)}</div>
                    <div class="text-[11px] text-on-surface-variant">${getNavItemSection(item)}</div>
                </button>
            `).join('');

            resultsList.querySelectorAll('.nav-search-option').forEach((button) => {
                button.addEventListener('mouseenter', () => {
                    activeIndex = Number(button.getAttribute('data-index'));
                    renderResults(input.value);
                });
                button.addEventListener('mousedown', (event) => {
                    event.preventDefault();
                    const index = Number(button.getAttribute('data-index'));
                    navigateTo(matches[index]);
                });
            });

            openResults();
        }

        function runSearch() {
            if (activeIndex >= 0 && matches[activeIndex]) {
                navigateTo(matches[activeIndex]);
                return;
            }

            if (matches[0]) {
                navigateTo(matches[0]);
                return;
            }

            if (typeof Utils !== 'undefined' && typeof Utils.showNotification === 'function') {
                Utils.showNotification('Nessuna pagina trovata', 'info');
            }
        }

        input.addEventListener('focus', () => renderResults(input.value));
        input.addEventListener('input', () => renderResults(input.value));
        input.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowDown') {
                event.preventDefault();
                if (matches.length === 0) return;
                activeIndex = (activeIndex + 1) % matches.length;
                renderResults(input.value);
                return;
            }

            if (event.key === 'ArrowUp') {
                event.preventDefault();
                if (matches.length === 0) return;
                activeIndex = (activeIndex - 1 + matches.length) % matches.length;
                renderResults(input.value);
                return;
            }

            if (event.key === 'Enter') {
                event.preventDefault();
                runSearch();
                return;
            }

            if (event.key === 'Escape') {
                event.preventDefault();
                closeResults();
            }
        });

        document.addEventListener('click', (event) => {
            if (!wrapper.contains(event.target)) {
                closeResults();
            }
        });

        if (!window.__navSearchShortcutBound) {
            window.__navSearchShortcutBound = true;
            document.addEventListener('keydown', (event) => {
                if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'k') {
                    event.preventDefault();
                    const searchInput = document.getElementById('nav-search-input');
                    if (searchInput) {
                        searchInput.focus();
                        searchInput.select();
                    }
                }
            });
        }

        window.__navSearchRefresh = renderResults;
        closeResults();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text || '';
        return div.innerHTML;
    }

        }

        const userToggle = document.getElementById('nav-user-toggle');
        const userMenu = document.getElementById('nav-user-menu');
        const notifToggle = document.getElementById('nav-notif-toggle');
        const notifMenu = document.getElementById('nav-notif-menu');
        const notifList = document.getElementById('nav-notif-list');
        const notifBadge = document.getElementById('nav-notif-badge');
        const readAllBtn = document.getElementById('nav-notif-read-all');
        const clearAllBtn = document.getElementById('nav-notif-clear-all');
        const notifFilter = document.getElementById('nav-notif-filter');
        let currentFilter = 'all';

        const renderNotifications = () => {
            if (!notifList || typeof Utils === 'undefined') return;

            const items = Utils.listAppNotifications(currentFilter);
            const unread = Utils.getUnreadNotificationCount();

            if (notifBadge) {
                notifBadge.textContent = unread > 99 ? '99+' : String(unread);
                notifBadge.classList.toggle('hidden', unread <= 0);
            }

            if (!items.length) {
                notifList.innerHTML = '<div class="px-4 py-6 text-sm text-on-surface-variant">Nessuna notifica al momento.</div>';
                return;
            }

            notifList.innerHTML = items.map((n) => {
                const icon = n.type === 'payment'
                    ? 'payments'
                    : n.type === 'booking'
                        ? 'event_seat'
                        : n.type === 'new-film'
                            ? 'movie'
                            : 'notifications';
                return `
                    <button data-notif-id="${n.id}" data-notif-url="${escapeHtml(n.url || '')}" class="notif-item w-full text-left px-4 py-3 border-b border-outline-variant/10 hover:bg-surface-container-high/60 transition-colors ${n.read ? 'opacity-75' : ''}">
                        <div class="flex gap-3 items-start">
                            <span class="material-symbols-outlined text-sm mt-0.5 ${n.read ? 'text-on-surface-variant' : 'text-primary-container'}">${icon}</span>
                            <div class="min-w-0">
                                <div class="text-sm ${n.read ? 'text-on-surface-variant' : 'text-on-surface font-medium'}">${escapeHtml(n.title || '')}</div>
                                ${n.message ? `<div class="text-xs text-on-surface-variant mt-1 line-clamp-2">${escapeHtml(n.message)}</div>` : ''}
                                <div class="text-[11px] text-on-surface-variant/80 mt-1">${formatRelativeDate(n.createdAt)}</div>
                            </div>
                        </div>
                    </button>
                `;
            }).join('');

            notifList.querySelectorAll('.notif-item').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const id = btn.getAttribute('data-notif-id');
                    const url = btn.getAttribute('data-notif-url');
                    if (typeof Utils !== 'undefined') Utils.markNotificationRead(id);
                    renderNotifications();
                    if (url) window.location.href = url;
                });
            });
        };

        if (notifToggle && notifMenu) {
            notifToggle.addEventListener('click', (event) => {
                event.stopPropagation();
                notifMenu.classList.toggle('hidden');
                if (!notifMenu.classList.contains('hidden')) {
                    if (userMenu) userMenu.classList.add('hidden');
                    if (typeof Utils !== 'undefined' && Utils.syncNotificationsFromServer) {
                        Utils.syncNotificationsFromServer().finally(renderNotifications);
                    }
                    renderNotifications();
                }
            });
        }

        if (readAllBtn) {
            readAllBtn.addEventListener('click', (event) => {
                event.stopPropagation();
                if (typeof Utils !== 'undefined') Utils.markAllNotificationsRead();
                renderNotifications();
            });
        }

        if (clearAllBtn) {
            clearAllBtn.addEventListener('click', (event) => {
                event.stopPropagation();
                if (typeof Utils !== 'undefined') Utils.clearAllNotifications();
                renderNotifications();
            });
        }

        if (notifFilter) {
            notifFilter.addEventListener('change', () => {
                currentFilter = notifFilter.value || 'all';
                renderNotifications();
            });
        }

        window.addEventListener('notifications:updated', renderNotifications);
        renderNotifications();

        if (userToggle && userMenu) {
            userToggle.addEventListener('click', (event) => {
                event.stopPropagation();
                userMenu.classList.toggle('hidden');
                if (!userMenu.classList.contains('hidden') && notifMenu) {
                    notifMenu.classList.add('hidden');
                }
            });

            document.addEventListener('click', (event) => {
                if (!userMenu.contains(event.target) && !userToggle.contains(event.target)) {
                    userMenu.classList.add('hidden');
                }
                if (notifMenu && notifToggle && !notifMenu.contains(event.target) && !notifToggle.contains(event.target)) {
                    notifMenu.classList.add('hidden');
                }
            });
        }
    }

    function formatRelativeDate(value) {
        const date = new Date(value || Date.now());
        if (Number.isNaN(date.getTime())) return 'adesso';

        const diffSec = Math.max(0, Math.floor((Date.now() - date.getTime()) / 1000));
        if (diffSec < 60) return 'adesso';
        const diffMin = Math.floor(diffSec / 60);
        if (diffMin < 60) return `${diffMin} min fa`;
        const diffHour = Math.floor(diffMin / 60);
        if (diffHour < 24) return `${diffHour} h fa`;
        const diffDay = Math.floor(diffHour / 24);
        if (diffDay < 7) return `${diffDay} g fa`;
        return date.toLocaleDateString('it-IT');
    }

    document.addEventListener('DOMContentLoaded', initNavbar);
    initNavbar();
</script>
