<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-dark-32.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-dark-32.png">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon-light.ico" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon-dark.ico" media="(prefers-color-scheme: dark)">

    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <link rel="stylesheet" href="/css/tailwind.local.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/styles.css">
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="https://unpkg.com/html5-qrcode" defer></script>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
    <div id="navbar-container"></div>
    <div class="flex flex-1">
        <div id="sidebar-container"></div>
        <!-- DOC-BLOCK: Sezione principale: contiene il flusso operativo della pagina. -->
        <main class="page-shell flex-1 p-4 md:p-8 lg:p-10 pb-20 md:pb-6">
            <!-- DOC-BLOCK: Blocco funzionale UI: raggruppa contenuti/azioni omogenee della pagina. -->
            <section class="hero-banner p-6 md:p-8 mb-5 reveal-up">
                <span class="badge-soft mb-3">
                    <span class="material-symbols-outlined text-sm">qr_code_scanner</span>
                    Checkpoint accessi
                </span>
                <h1 class="font-headline text-3xl md:text-5xl font-semibold mb-3">Validazione Biglietti</h1>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <select id="cinema-select" class="bg-surface-container-high rounded-lg border-none"></select>
                    <input id="code-input" type="text" placeholder="Inserisci codice hash" class="bg-surface-container-high rounded-lg border-none" />
                    <button id="verify-btn" class="px-4 py-2 bg-primary-container text-white rounded-lg hover-lift">Verifica</button>
                </div>
            </section>

            <!-- DOC-BLOCK: Blocco funzionale UI: raggruppa contenuti/azioni omogenee della pagina. -->
            <section class="bg-surface-container rounded-2xl border border-outline-variant/20 p-5 mb-5 reveal-up delay-1">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="font-headline text-lg font-bold">Scanner QR</h2>
                    <button id="scan-toggle" class="px-3 py-2 bg-surface-container-high rounded-lg text-sm hover-lift">Avvia scanner</button>
                </div>
                <div id="qr-reader" class="hidden max-w-md"></div>
            </section>

            <!-- DOC-BLOCK: Blocco funzionale UI: raggruppa contenuti/azioni omogenee della pagina. -->
            <section class="bg-surface-container rounded-2xl border border-outline-variant/20 p-5 reveal-up delay-2">
                <h2 class="font-headline text-lg font-bold mb-3">Risultato</h2>
                <div id="result-box" class="text-on-surface-variant">Nessuna verifica eseguita.</div>
            </section>

            <!-- DOC-BLOCK: Blocco funzionale UI: raggruppa contenuti/azioni omogenee della pagina. -->
            <section class="bg-surface-container rounded-2xl border border-outline-variant/20 p-5 mt-5 reveal-up delay-3">
                <div class="flex items-center justify-between gap-3 mb-3">
                    <h2 class="font-headline text-lg font-bold">Ultime verifiche</h2>
                    <button id="clear-history-btn" class="app-btn app-btn-secondary">Svuota</button>
                </div>
                <div id="history-list" class="space-y-2 text-sm text-on-surface-variant">Nessuna verifica recente.</div>
            </section>
        </main>
    </div>
    <div id="footer-container"></div>

    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/theme.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/api-config.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/auth.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/route-guard.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/template-loader.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/api-client.js"></script>
    <!-- DOC-BLOCK: Dipendenza JS esterna/interna: abilita moduli condivisi (tema, auth, routing, utility). -->
    <script src="/js/utils.js"></script>
    <!-- DOC-BLOCK: Script inline pagina: gestisce eventi UI, stato locale e integrazione con ApiClient. -->
    <script>
        let cinemas = [];
        let scanner = null;
        let scannerRunning = false;
        let currentInfo = null;
        const validationHistoryKey = 'validationHistory';

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllComponents();
            bindEvents();
            await initData();
            applyQueryParams();
            renderHistory();
        });

        function bindEvents() {
            document.getElementById('verify-btn').addEventListener('click', verifyManual);
            document.getElementById('scan-toggle').addEventListener('click', toggleScan);
            document.getElementById('clear-history-btn').addEventListener('click', clearHistory);
        }

        async function initData() {
            cinemas = await ApiClient.get('/cinemas');
            const sel = document.getElementById('cinema-select');
            sel.innerHTML = cinemas.map(c => `<option value="${c.id}">${escapeHtml(c.nome)} - ${escapeHtml(c.citta)}</option>`).join('');
        }

        function applyQueryParams() {
            const params = new URLSearchParams(window.location.search);
            const codice = params.get('codice');
            const cinemaId = parseInt(params.get('cinemaId') || '0');

            if (cinemaId) {
                const sel = document.getElementById('cinema-select');
                if ([...sel.options].some(o => parseInt(o.value) === cinemaId)) {
                    sel.value = String(cinemaId);
                }
            }

            if (codice) {
                document.getElementById('code-input').value = codice;
                verifyCode(codice);
            }
        }

        async function verifyManual() {
            const code = document.getElementById('code-input').value.trim();
            if (!code) {
                Utils.showNotification('Inserisci un codice', 'error');
                return;
            }
            await verifyCode(code);
        }

        async function verifyCode(code) {
            try {
                const info = await ApiClient.post('/validazione/verifica?codiceHash=' + encodeURIComponent(code));
                currentInfo = info;
                renderResult(info);
            } catch (e) {
                currentInfo = null;
                document.getElementById('result-box').innerHTML = `<div class="text-rose-400">Biglietto non trovato o non valido.</div>`;
            }
        }

        function renderResult(info) {
            const already = info.giaValidato;
            pushHistoryItem({
                codiceHash: info.codiceHash,
                filmTitolo: info.filmTitolo,
                cinemaNome: info.cinemaNome,
                data: Date.now(),
                esito: already ? 'Gia validato' : 'Valido'
            });
            const box = document.getElementById('result-box');
            box.innerHTML = `
                <div class="p-4 rounded-xl ${already ? 'bg-amber-500/10 border border-amber-500/30' : 'bg-emerald-500/10 border border-emerald-500/30'}">
                    <div class="font-semibold mb-2">${already ? 'Biglietto gia validato' : 'Biglietto valido'}</div>
                    <div class="text-sm">Film: <strong>${escapeHtml(info.filmTitolo)}</strong></div>
                    <div class="text-sm">Cinema: <strong>${escapeHtml(info.cinemaNome)}</strong></div>
                    <div class="text-sm">Sala: <strong>${info.salaNumero} (${escapeHtml(info.tipologiaSala)})</strong></div>
                    <div class="text-sm">Data: <strong>${formatDate(info.data)} ${(info.oraInizio || '').substring(0,5)}</strong></div>
                    <div class="text-sm">Posto: <strong>${escapeHtml(info.posto)}</strong></div>
                    <div class="text-sm">Codice: <span class="font-mono">${escapeHtml(info.codiceHash)}</span></div>
                    ${already ? '' : '<button id="confirm-validation" class="mt-3 px-4 py-2 bg-primary-container text-white rounded-lg text-sm">Valida biglietto</button>'}
                </div>
            `;

            const btn = document.getElementById('confirm-validation');
            if (btn) btn.addEventListener('click', confirmValidation);
        }

        async function confirmValidation() {
            if (!currentInfo) return;
            const cinemaId = parseInt(document.getElementById('cinema-select').value);
            const res = await ApiClient.post(`/validazione/conferma?codiceHash=${encodeURIComponent(currentInfo.codiceHash)}&cinemaId=${cinemaId}`);
            if (res && res.validato) {
                Utils.showNotification('Biglietto validato', 'success');
                await verifyCode(currentInfo.codiceHash);
            } else {
                Utils.showNotification('Validazione non riuscita', 'error');
            }
        }

        async function toggleScan() {
            const reader = document.getElementById('qr-reader');
            const btn = document.getElementById('scan-toggle');
            if (!scannerRunning) {
                reader.classList.remove('hidden');
                btn.textContent = 'Ferma scanner';
                scanner = new Html5Qrcode('qr-reader');
                await scanner.start(
                    { facingMode: 'environment' },
                    { fps: 10, qrbox: 240 },
                    async (decodedText) => {
                        const hash = parseHashFromQr(decodedText);
                        if (hash) {
                            document.getElementById('code-input').value = hash;
                            await verifyCode(hash);
                        }
                    },
                    () => {}
                );
                scannerRunning = true;
            } else {
                if (scanner) {
                    await scanner.stop();
                    await scanner.clear();
                }
                scanner = null;
                scannerRunning = false;
                reader.classList.add('hidden');
                btn.textContent = 'Avvia scanner';
            }
        }

        function parseHashFromQr(value) {
            try {
                if (value.includes('/validazione/qr/')) {
                    return value.split('/validazione/qr/')[1].split('?')[0];
                }
                return value;
            } catch {
                return null;
            }
        }

        function formatDate(iso) {
            if (!iso) return '-';
            return new Date(iso).toLocaleDateString('it-IT');
        }

        function readHistory() {
            try {
                const raw = localStorage.getItem(validationHistoryKey);
                if (!raw) return [];
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function writeHistory(items) {
            localStorage.setItem(validationHistoryKey, JSON.stringify(items.slice(0, 15)));
        }

        function pushHistoryItem(item) {
            const list = readHistory();
            const next = [item, ...list.filter((x) => x.codiceHash !== item.codiceHash)];
            writeHistory(next);
            renderHistory();
        }

        function clearHistory() {
            localStorage.removeItem(validationHistoryKey);
            renderHistory();
        }

        function renderHistory() {
            const box = document.getElementById('history-list');
            const items = readHistory();
            if (!items.length) {
                box.textContent = 'Nessuna verifica recente.';
                return;
            }
            box.innerHTML = items.map((x) => `
                <div class="rounded-xl border border-outline-variant/20 bg-surface-container-high p-3 flex flex-col md:flex-row md:items-center md:justify-between gap-2">
                    <div>
                        <div class="text-on-surface font-medium">${escapeHtml(x.filmTitolo || 'Ticket')}</div>
                        <div class="text-xs">${escapeHtml(x.cinemaNome || '')} - ${new Date(x.data).toLocaleString('it-IT')}</div>
                        <div class="text-xs">Esito: ${escapeHtml(x.esito || '-')}</div>
                    </div>
                    <button class="app-btn app-btn-secondary" onclick="reuseCode('${String(x.codiceHash || '').replace(/'/g, "\\'")}')">Riusa codice</button>
                </div>
            `).join('');
        }

        function reuseCode(code) {
            if (!code) return;
            document.getElementById('code-input').value = code;
            verifyCode(code);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
</body>
</html>
