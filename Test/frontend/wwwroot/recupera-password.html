<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recupera Password - FilmHub</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main style="max-width:560px;margin:40px auto;padding:16px;">
        <h1>Recupera password</h1>
        <p>Inserisci la tua email. Se esiste un account, riceverai le istruzioni.</p>
        <form id="recover-form">
            <label for="email">Email</label>
            <input id="email" type="email" required style="display:block;width:100%;margin:8px 0 12px 0;padding:10px;">
            <button type="submit">Invia link</button>
        </form>
        <p id="message" style="margin-top:12px;"></p>
        <p><a href="login.html">Torna al login</a></p>
    </main>
<script src="/js/api-config.js"></script>
<script src="js/auth.js"></script>
<script src="/js/api-client.js"></script>
<script src="js/pages/recupera-password.js"></script>
</body>
</html>
