    <!-- DOC-BLOCK: Script inline pagina: gestisce eventi UI, stato locale e integrazione con ApiClient. -->
    <script>
        let allFilms = [];
        let allRegisti = [];
        let allCategorie = [];
        let filteredFilms = [];
        const isManager = () => typeof Auth !== 'undefined' && Auth.canManageCatalog();

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllComponents();
            applyRoleUI();
            await loadData();

            const params = new URLSearchParams(window.location.search);
            if (params.get('action') === 'create') {
                openCreateModal();
            }
        });

        async function loadData() {
            try {
                Utils.showLoading();
                [allFilms, allRegisti, allCategorie] = await Promise.all([
                    ApiClient.get('/films'),
                    ApiClient.get('/registi'),
                    ApiClient.get('/categorie')
                ]);
                // Normalizza lista film lato UI per evitare doppioni nel catalogo manager/pubblico.
                allFilms = normalizeUniqueFilms(allFilms);
                populateFilters();
                filterFilms();
            } catch (error) {
                console.error('Error loading data:', error);
                Utils.showNotification('Errore nel caricamento dei dati', 'error');
            } finally {
                Utils.hideLoading();
            }
        }

        function normalizeFilmTitle(value) {
            // Chiave canonica titolo:
            // rimozione accenti/punteggiatura + lowercase + spazi compressi.
            // Serve per confronti stabili tra sorgenti eterogenee.
            return String(value || '')
                .normalize('NFKD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^\w\s]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim()
                .toLowerCase();
        }

        function normalizeUniqueFilms(films) {
            // Deduplica per titolo normalizzato (fallback id/data).
            // Manteniamo il record con data più recente, poi id maggiore.
            const items = Array.isArray(films) ? films : [];
            const byKey = new Map();

            for (const film of items) {
                const id = Number(film?.id || 0);
                const title = normalizeFilmTitle(film?.titolo);
                const release = String(film?.dataProduzione || film?.dataRilascio || '').trim().slice(0, 10);
                const key = title ? `title:${title}` : (id > 0 ? `id:${id}` : `meta:${release}`);
                const prev = byKey.get(key);

                if (!prev) {
                    byKey.set(key, film);
                    continue;
                }

                const prevDate = prev?.dataProduzione ? new Date(prev.dataProduzione).getTime() : 0;
                const currDate = film?.dataProduzione ? new Date(film.dataProduzione).getTime() : 0;
                if (currDate > prevDate || (currDate === prevDate && Number(film?.id || 0) > Number(prev?.id || 0))) {
                    byKey.set(key, film);
                }
            }

            return Array.from(byKey.values());
        }

        function applyRoleUI() {
            const canManage = isManager();
            const newFilmBtn = document.getElementById('new-film-btn');
            const emptyAddFilmBtn = document.getElementById('empty-add-film-btn');
            const title = document.getElementById('films-page-title');
            const subtitle = document.getElementById('films-page-subtitle');

            if (title) {
                title.textContent = canManage ? 'Gestione Film' : 'Film in Programmazione';
            }

            if (subtitle) {
                subtitle.textContent = canManage
                    ? 'Gestisci il tuo catalogo cinematografico. Database di capolavori, film indipendenti e proiezioni.'
                    : 'Sfoglia il catalogo completo. Clicca un film per vedere proiezioni e cinema disponibili.';
            }

            if (newFilmBtn) newFilmBtn.classList.toggle('hidden', !canManage);
            if (emptyAddFilmBtn) emptyAddFilmBtn.classList.toggle('hidden', !canManage);
        }

        function populateFilters() {
            const registaSelect = document.getElementById('filter-regista');
            const yearSelect = document.getElementById('filter-year');
            const categoriaSelect = document.getElementById('filter-categoria');
            const years = new Set();

            allRegisti.forEach(r => {
                const option = document.createElement('option');
                option.value = r.id;
                option.textContent = `${r.nome} ${r.cognome}`;
                registaSelect.appendChild(option);
            });

            allFilms.forEach(f => {
                if (f.dataProduzione) {
                    years.add(new Date(f.dataProduzione).getFullYear());
                }
            });

            Array.from(years).sort((a, b) => b - a).forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearSelect.appendChild(option);
            });

            allCategorie.forEach(c => {
                const option = document.createElement('option');
                option.value = c.id;
                option.textContent = c.nome;
                categoriaSelect.appendChild(option);
            });
        }

        function filterFilms() {
            // Pipeline filtro catalogo:
            // 1) testo (titolo/codice/cast), 2) regista, 3) anno, 4) categoria.
            const search = document.getElementById('search-input').value.toLowerCase();
            const registaId = document.getElementById('filter-regista').value;
            const year = document.getElementById('filter-year').value;
            const categoriaId = document.getElementById('filter-categoria').value;

            filteredFilms = allFilms.filter(film => {
                const matchesSearch = film.titolo.toLowerCase().includes(search) || 
                    `FLM-${String(film.id).padStart(3, '0')}`.toLowerCase().includes(search) ||
                    (film.cast || '').toLowerCase().includes(search);
                const matchesRegista = !registaId || film.registaId === parseInt(registaId);
                const matchesYear = !year || (film.dataProduzione && new Date(film.dataProduzione).getFullYear().toString() === year);
                const matchesCategoria = !categoriaId || (Array.isArray(film.categorieIds) && film.categorieIds.includes(parseInt(categoriaId)));
                return matchesSearch && matchesRegista && matchesYear && matchesCategoria;
            });

            renderFilms();
        }

        function getFilmCategoryLabels(film) {
            if (!film || typeof film !== 'object') return [];

            if (Array.isArray(film.categorie) && film.categorie.length > 0) {
                return film.categorie
                    .map((c) => (typeof c === 'string' ? c : c?.nome || c?.name || ''))
                    .map((v) => String(v || '').trim())
                    .filter(Boolean);
            }

            const fallback = film.genere || film.genre || film.categoria || film.category || '';
            return String(fallback)
                .split(',')
                .map((v) => v.trim())
                .filter(Boolean);
        }

        function renderFilms() {
            // Render della griglia poster basata su filteredFilms già normalizzata e filtrata.
            const grid = document.getElementById('films-grid');
            const emptyState = document.getElementById('empty-state');
            const paginationInfo = document.getElementById('pagination-info');

            if (filteredFilms.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                grid.classList.add('hidden');
                paginationInfo.textContent = '';
                return;
            }

            emptyState.classList.add('hidden');
            grid.classList.remove('hidden');
            paginationInfo.textContent = `${filteredFilms.length} film trovati`;

            grid.innerHTML = filteredFilms.map((film, index) => {
                const regista = allRegisti.find(r => r.id === film.registaId);
                const imageUrl = film.copertinaPath || 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=300&h=450&fit=crop';
                const categoryLabels = getFilmCategoryLabels(film).slice(0, 2);
                return `
                    <div class="group relative reveal-up" style="animation-delay:${(index % 8) * 0.04}s">
                        <div class="relative aspect-[2/3] rounded-lg overflow-hidden bg-surface-container-high cursor-pointer hover-lift"
                             onclick="openDetailModal(${film.id})">
                            <img src="${imageUrl}" 
                                 alt="${escapeHtml(film.titolo)}" 
                                 class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-110"
                                 loading="lazy">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                            <div class="absolute bottom-0 left-0 right-0 p-2">
                                <h4 class="font-headline text-sm font-bold text-white truncate">${escapeHtml(film.titolo)}</h4>
                                <p class="text-[10px] text-white/70 truncate">${regista ? escapeHtml(`${regista.nome} ${regista.cognome}`) : ''}</p>
                                <div class="flex flex-wrap gap-1 mt-1">
                                    ${categoryLabels.map((label) => `<span class="px-1.5 py-0.5 rounded bg-black/60 text-[9px] text-secondary">${escapeHtml(label)}</span>`).join('')}
                                </div>
                            </div>
                            <div class="absolute top-2 left-2">
                                <span class="px-2 py-0.5 bg-black/60 backdrop-blur-sm rounded text-[10px] text-white font-bold">${film.durata || '-'} min</span>
                            </div>
                            <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <div class="w-12 h-12 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center">
                                    <span class="material-symbols-outlined text-white text-2xl">visibility</span>
                                </div>
                            </div>
                        </div>
                        <div class="mt-2 text-center">
                            <p class="text-xs text-on-surface-variant truncate">${film.dataProduzione ? new Date(film.dataProduzione).getFullYear() : '-'}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openDetailModal(id) {
            const film = allFilms.find(f => f.id === id);
            if (!film) return;

            const regista = allRegisti.find(r => r.id === film.registaId);
            const imageUrl = film.copertinaPath || 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=600&h=900&fit=crop';
            const categoryLabels = getFilmCategoryLabels(film);
            const canManage = isManager();

            showModal(`
                <div class="flex flex-col md:flex-row gap-4 md:gap-5">
                    <div class="w-full md:w-1/3 flex-shrink-0">
                        <div class="aspect-[2/3] rounded-xl overflow-hidden bg-surface-container-high shadow-2xl">
                            <img src="${imageUrl}" alt="${escapeHtml(film.titolo)}" class="w-full h-full object-cover">
                        </div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h2 class="font-headline text-xl md:text-2xl font-bold text-white mb-1">${escapeHtml(film.titolo)}</h2>
                        
                        <div class="mt-4 space-y-3">
                            <div class="bg-surface-container-high rounded-xl p-3">
                                <div class="grid grid-cols-2 gap-3">
                                    <div>
                                        <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mb-1">Anno</p>
                                        <p class="text-sm font-semibold text-on-surface">${film.dataProduzione ? new Date(film.dataProduzione).getFullYear() : '-'}</p>
                                    </div>
                                    <div>
                                        <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mb-1">Durata</p>
                                        <p class="text-sm font-semibold text-on-surface">${film.durata ? film.durata + ' minuti' : '-'}</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="bg-surface-container-high rounded-xl p-3">
                                <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mb-2">Regista</p>
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-secondary to-yellow-600 flex items-center justify-center">
                                        <span class="text-white font-bold text-sm">${regista ? regista.nome.charAt(0) + regista.cognome.charAt(0) : '?'}</span>
                                    </div>
                                    <div>
                                        <p class="text-sm font-semibold text-on-surface">${regista ? escapeHtml(`${regista.nome} ${regista.cognome}`) : 'Non specificato'}</p>
                                        <p class="text-xs text-on-surface-variant">${regista ? escapeHtml(regista.nazionalita) : ''}</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="bg-surface-container-high rounded-xl p-3">
                                <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mb-2">Attori</p>
                                <div class="flex flex-wrap gap-1">
                                    ${formatCastBadges(film.cast)}
                                </div>
                            </div>
                            
                            <div class="bg-surface-container-high rounded-xl p-3">
                                <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mb-2">Data Produzione</p>
                                <p class="text-sm font-semibold text-on-surface">${film.dataProduzione ? Utils.formatDate(film.dataProduzione) : 'Non specificata'}</p>
                            </div>
                            <div class="bg-surface-container-high rounded-xl p-3">
                                <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mb-2">Categorie</p>
                                <div class="flex flex-wrap gap-1">
                                    ${categoryLabels.length
                                        ? categoryLabels.map((label) => `<span class=\"px-2 py-0.5 rounded-full text-[10px] bg-surface-container-highest text-secondary\">${escapeHtml(label)}</span>`).join('')
                                        : '<span class="text-xs text-on-surface-variant">Nessuna</span>'}
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex gap-2 mt-4">
                            <a href="proiezioni-pubblico.html?filmId=${film.id}" class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 bg-primary-container hover:bg-[#c0000c] text-white rounded-xl text-sm font-bold transition-colors">
                                <span class="material-symbols-outlined">event</span>
                                Vedi Proiezioni
                            </a>
                            ${canManage ? `
                            <button onclick="closeModal(); openEditModal(${film.id})" class="flex items-center justify-center gap-2 px-4 py-2.5 bg-secondary hover:bg-secondary/80 text-on-secondary rounded-xl font-bold transition-colors">
                                <span class="material-symbols-outlined">edit</span>
                            </button>
                            <button onclick="closeModal(); deleteFilm(${film.id})" class="flex items-center justify-center gap-2 px-4 py-2.5 bg-error-container/20 hover:bg-error-container/40 text-error rounded-xl font-bold transition-colors">
                                <span class="material-symbols-outlined">delete</span>
                            </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `, '');
        }

        function openCreateModal() {
            if (!isManager()) {
                Utils.showNotification('Non hai i permessi per creare film', 'error');
                return;
            }
            showModal('Nuovo Film', `
                <!-- DOC-BLOCK: Form utente: raccoglie input, valida lato client e invia dati ai servizi API. -->
                <form id="film-form" onsubmit="handleSubmit(event)">
                    <div class="space-y-4">
                        <div class="bg-surface-container-high rounded-xl p-3">
                            <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mb-2">Importa da TMDB</p>
                            <div class="flex gap-2">
                                <input type="text" id="tmdb-search-input" placeholder="Cerca titolo su TMDB..." class="flex-1 bg-surface-container-highest border-none rounded-lg px-3 py-2 text-on-surface focus:ring-1 focus:ring-primary text-sm">
                                <button type="button" onclick="searchTmdbInModal()" class="px-3 py-2 bg-surface-container-highest rounded-lg text-sm font-semibold">Cerca</button>
                            </div>
                            <div id="tmdb-results" class="mt-2 space-y-1"></div>
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Titolo *</label>
                            <input type="text" name="titolo" required class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Regista *</label>
                            <select name="registaId" required class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary appearance-none">
                                <option value="">Seleziona un regista</option>
                                ${allRegisti.map(r => `<option value="${r.id}">${escapeHtml(r.nome)} ${escapeHtml(r.cognome)}</option>`).join('')}
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Data Produzione</label>
                                <input type="date" name="dataProduzione" class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Durata (min)</label>
                                <input type="number" name="durata" min="1" class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary">
                            </div>
                        </div>
                        <input type="hidden" name="tmdbId" value="">
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Copertina Path</label>
                            <input type="text" name="copertinaPath" placeholder="/media/defaults/cover.jpg" class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Filmato Path</label>
                            <input type="text" name="filmatoPath" placeholder="/media/videos/film.mp4" class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Attori</label>
                            <textarea name="cast" rows="3" placeholder="Es. Robert Downey Jr., Chris Evans, Scarlett Johansson" class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary resize-y"></textarea>
                            <p class="mt-1 text-[11px] text-on-surface-variant">Separa gli attori con una virgola.</p>
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Categorie</label>
                            <div class="w-full min-h-24 bg-surface-container-highest rounded-lg px-3 py-3 border border-outline-variant/30">
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                    ${allCategorie.map(c => `
                                        <label class="flex items-center gap-2 px-2 py-1.5 rounded-md hover:bg-surface-container-high transition-colors cursor-pointer">
                                            <input type="checkbox" name="categorieIds" value="${c.id}" class="rounded border-outline-variant/40 bg-surface-container-highest text-primary-container focus:ring-primary" />
                                            <span class="text-sm text-on-surface">${escapeHtml(c.nome)}</span>
                                        </label>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-end gap-3 mt-6">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-colors">Annulla</button>
                        <button type="submit" class="noir-gradient px-6 py-2 text-white rounded-lg font-bold hover:opacity-90 transition-opacity">Crea</button>
                    </div>
                </form>
            `);
        }

        function openEditModal(id) {
            if (!isManager()) {
                Utils.showNotification('Non hai i permessi per modificare film', 'error');
                return;
            }
            const film = allFilms.find(f => f.id === id);
            if (!film) return;

            const dataProduzione = film.dataProduzione ? film.dataProduzione.split('T')[0] : '';

            showModal('Modifica Film', `
                <!-- DOC-BLOCK: Form utente: raccoglie input, valida lato client e invia dati ai servizi API. -->
                <form id="film-form" onsubmit="handleSubmit(event)">
                    <div class="space-y-4">
                        <div class="bg-surface-container-high rounded-xl p-3">
                            <div class="flex items-center justify-between gap-2">
                                <p class="text-[10px] text-on-surface-variant uppercase tracking-widest">TMDB</p>
                                <button type="button" onclick="syncCastFromTmdb(${id})" class="px-3 py-1.5 bg-surface-container-highest rounded-lg text-xs font-semibold">Aggiorna attori da TMDB</button>
                            </div>
                            <p class="mt-1 text-[11px] text-on-surface-variant">Sincronizza automaticamente il cast del film.</p>
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Titolo *</label>
                            <input type="text" name="titolo" value="${escapeHtml(film.titolo)}" required class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Regista *</label>
                            <select name="registaId" required class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary appearance-none">
                                ${allRegisti.map(r => `<option value="${r.id}" ${r.id === film.registaId ? 'selected' : ''}>${escapeHtml(r.nome)} ${escapeHtml(r.cognome)}</option>`).join('')}
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Data Produzione</label>
                                <input type="date" name="dataProduzione" value="${dataProduzione}" class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Durata (min)</label>
                                <input type="number" name="durata" value="${film.durata || ''}" min="1" class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Copertina Path</label>
                            <input type="text" name="copertinaPath" value="${escapeHtml(film.copertinaPath || '')}" class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Filmato Path</label>
                            <input type="text" name="filmatoPath" value="${escapeHtml(film.filmatoPath || '')}" class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Attori</label>
                            <textarea name="cast" rows="3" placeholder="Es. Robert Downey Jr., Chris Evans, Scarlett Johansson" class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary resize-y">${escapeHtml(film.cast || '')}</textarea>
                            <p class="mt-1 text-[11px] text-on-surface-variant">Separa gli attori con una virgola.</p>
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-on-surface-variant mb-2">Categorie</label>
                            <div class="w-full min-h-24 bg-surface-container-highest rounded-lg px-3 py-3 border border-outline-variant/30">
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                    ${allCategorie.map(c => `
                                        <label class="flex items-center gap-2 px-2 py-1.5 rounded-md hover:bg-surface-container-high transition-colors cursor-pointer">
                                            <input type="checkbox" name="categorieIds" value="${c.id}" ${(film.categorieIds || []).includes(c.id) ? 'checked' : ''} class="rounded border-outline-variant/40 bg-surface-container-highest text-primary-container focus:ring-primary" />
                                            <span class="text-sm text-on-surface">${escapeHtml(c.nome)}</span>
                                        </label>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" name="id" value="${id}">
                    <input type="hidden" name="tmdbId" value="${film.tmdbId || ''}">
                    <div class="flex justify-end gap-3 mt-6">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-colors">Annulla</button>
                        <button type="submit" class="noir-gradient px-6 py-2 text-white rounded-lg font-bold hover:opacity-90 transition-opacity">Salva</button>
                    </div>
                </form>
            `);
        }

        async function handleSubmit(event) {
            event.preventDefault();
            if (!isManager()) {
                Utils.showNotification('Non hai i permessi per salvare film', 'error');
                return;
            }
            const form = event.target;
            const id = form.id?.value;
            const data = {
                titolo: form.titolo.value,
                registaId: parseInt(form.registaId.value),
                dataProduzione: form.dataProduzione.value || null,
                durata: parseInt(form.durata.value) || null,
                copertinaPath: form.copertinaPath.value || null,
                filmatoPath: form.filmatoPath.value || null,
                cast: form.cast.value?.trim() || null,
                tmdbId: form.tmdbId?.value ? parseInt(form.tmdbId.value, 10) : null,
                categoriaIds: Array.from(form.querySelectorAll('input[name="categorieIds"]:checked')).map(i => parseInt(i.value))
            };

            try {
                Utils.showLoading();
                if (id) {
                    await ApiClient.put(`/films/${id}`, data);
                    Utils.showNotification('Film aggiornato con successo', 'success');
                } else {
                    await ApiClient.post('/films', data);
                    Utils.showNotification('Film creato con successo', 'success');
                }
                closeModal();
                await loadData();
            } catch (error) {
                Utils.showNotification(error.message || 'Errore durante il salvataggio', 'error');
            } finally {
                Utils.hideLoading();
            }
        }

        async function deleteFilm(id) {
            if (!isManager()) {
                Utils.showNotification('Non hai i permessi per eliminare film', 'error');
                return;
            }
            if (!Utils.confirmDialog('Sei sicuro di voler eliminare questo film?')) return;

            try {
                Utils.showLoading();
                await ApiClient.delete(`/films/${id}`);
                Utils.showNotification('Film eliminato con successo', 'success');
                await loadData();
            } catch (error) {
                Utils.showNotification(error.message || 'Errore nell\'eliminazione del film', 'error');
            } finally {
                Utils.hideLoading();
            }
        }

        function showModal(title, content) {
            const container = document.getElementById('modal-container');
            const titleHtml = title ? `<h3 class="font-headline text-xl font-bold mb-6">${title}</h3>` : '';
            container.innerHTML = `
                <div class="modal-backdrop" onclick="if(event.target === this) closeModal()">
                    <div class="modal-content ${title ? 'max-w-lg' : 'max-w-4xl p-5 md:p-6'}">
                        ${titleHtml}
                        ${content}
                    </div>
                </div>
            `;
        }

        function closeModal() {
            document.getElementById('modal-container').innerHTML = '';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatCastBadges(cast) {
            const seen = new Set();
            const names = (cast || '')
                .split(',')
                .map(n => n.trim())
                .filter(Boolean)
                .filter(name => {
                    const key = normalizeFilmTitle(name);
                    if (!key || seen.has(key)) return false;
                    seen.add(key);
                    return true;
                })
                .slice(0, 8);

            if (!names.length) {
                return '<span class="text-xs text-on-surface-variant">Non specificati</span>';
            }

            return names
                .map(name => `<span class="px-2 py-0.5 rounded-full text-[10px] bg-surface-container-highest text-tertiary">${escapeHtml(name)}</span>`)
                .join('');
        }

        async function searchTmdbInModal() {
            const queryEl = document.getElementById('tmdb-search-input');
            const resultsEl = document.getElementById('tmdb-results');
            const form = document.getElementById('film-form');
            const query = queryEl?.value?.trim();
            if (!query || !resultsEl || !form) return;

            try {
                resultsEl.innerHTML = '<p class="text-xs text-on-surface-variant">Ricerca in corso...</p>';
                const results = await ApiClient.get(`/films/tmdb-search?q=${encodeURIComponent(query)}`);
                if (!Array.isArray(results) || results.length === 0) {
                    resultsEl.innerHTML = '<p class="text-xs text-on-surface-variant">Nessun risultato.</p>';
                    return;
                }

                resultsEl.innerHTML = results.map(item => `
                    <button type="button" onclick="importTmdbMovie(${item.id})" class="w-full text-left px-3 py-2 rounded-lg hover:bg-surface-container-highest transition-colors">
                        <div class="text-sm font-semibold text-on-surface">${escapeHtml(item.titolo || 'Senza titolo')}</div>
                        <div class="text-xs text-on-surface-variant">${escapeHtml((item.dataRilascio || '').substring(0, 10))}</div>
                    </button>
                `).join('');
            } catch (error) {
                resultsEl.innerHTML = '<p class="text-xs text-error">Errore ricerca TMDB</p>';
            }
        }

        async function importTmdbMovie(tmdbMovieId) {
            const form = document.getElementById('film-form');
            if (!form) return;

            try {
                Utils.showLoading();
                const result = await ApiClient.post('/films/import-tmdb', { tmdbMovieId });
                if (!result?.filmId) {
                    Utils.showNotification('Import TMDB completato ma ID film non trovato', 'warning');
                    return;
                }

                closeModal();
                await loadData();
                openEditModal(result.filmId);
                Utils.showNotification('Dati TMDB importati, inclusi attori', 'success');
            } catch (error) {
                Utils.showNotification(error.message || 'Errore import TMDB', 'error');
            } finally {
                Utils.hideLoading();
            }
        }

        async function syncCastFromTmdb(filmId) {
            try {
                Utils.showLoading();
                await ApiClient.post(`/films/${filmId}/sync-cast-tmdb`, {});
                Utils.showNotification('Attori aggiornati da TMDB', 'success');
                closeModal();
                await loadData();
                openEditModal(filmId);
            } catch (error) {
                Utils.showNotification(error.message || 'Errore sincronizzazione cast', 'error');
            } finally {
                Utils.hideLoading();
            }
        }
    </script>
</body>
</html>
