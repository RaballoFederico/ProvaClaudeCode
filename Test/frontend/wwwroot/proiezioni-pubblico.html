<!DOCTYPE html>
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proiezioni - FilmAPI</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-light-32.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-dark-32.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-dark-32.png">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon-light.ico" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon-dark.ico" media="(prefers-color-scheme: dark)">
    <link rel="shortcut icon" type="image/x-icon" href="/assets/icons/favicon-dark.ico">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/styles.css">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#e50914",
                        "secondary": "#e9c176",
                        "background": "#131313",
                        "surface": "#131313",
                        "surface-container": "#201f1f",
                        "surface-container-low": "#1c1b1b",
                        "surface-container-high": "#2a2a2a",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#e9bcb6",
                        "outline-variant": "#5e3f3b",
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
    <div id="navbar-container"></div>
    <div class="flex flex-1">
        <div id="sidebar-container"></div>

    <!-- Main Content -->
    <main class="page-shell flex-1 py-8 px-4 md:px-8 lg:px-12 pb-20 md:pb-8">
        <div class="max-w-7xl mx-auto">
            <div class="hero-banner p-6 md:p-8 mb-8 text-center reveal-up">
                <span class="section-eyebrow mb-3 inline-flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">movie</span>
                    Programmazione pubblica
                </span>
                <h1 class="text-3xl md:text-5xl font-semibold text-on-surface font-headline">Proiezioni in Programma</h1>
                <p class="text-on-surface-variant mt-2">Scopri i film in programmazione nelle nostre sale</p>
            </div>

            <section class="app-card p-4 md:p-5 mb-6 reveal-up delay-1">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <div class="md:col-span-2">
                        <label class="text-xs text-on-surface-variant uppercase tracking-[0.16em]" for="film-search">Cerca film</label>
                        <input id="film-search" type="text" placeholder="Titolo o genere..." class="mt-1 w-full rounded-xl border border-outline-variant/30 bg-surface-container-high px-3 py-2.5 text-sm">
                    </div>
                    <div>
                        <label class="text-xs text-on-surface-variant uppercase tracking-[0.16em]" for="film-sort">Ordinamento</label>
                        <select id="film-sort" class="mt-1 w-full rounded-xl border border-outline-variant/30 bg-surface-container-high px-3 py-2.5 text-sm">
                            <option value="recent">Più recenti</option>
                            <option value="title">Titolo A-Z</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Loading -->
            <div id="loading" class="flex items-center justify-center py-20">
                <span class="material-symbols-outlined text-4xl animate-spin text-primary-container">refresh</span>
            </div>

            <!-- Film Poster Grid -->
            <div id="proiezioni-grid" class="hidden grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-6 gap-4 reveal-up delay-1">
            </div>

            <!-- Error -->
            <div id="error" class="hidden text-center py-20">
                <span class="material-symbols-outlined text-4xl text-error mb-4">error</span>
                <p id="error-text" class="text-on-surface-variant"></p>
                <button onclick="loadProiezioni()" class="mt-4 px-4 py-2 bg-primary-container hover:bg-primary text-white rounded-lg text-sm transition-colors hover-lift">
                    Riprova
                </button>
            </div>
        </div>
    </main>
    </div>

    <div id="footer-container"></div>

    <script src="js/theme.js"></script>
    <script src="/js/api-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/route-guard.js"></script>
    <script src="js/template-loader.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/utils.js"></script>
    <script>
        let selectedFilmId = null;
        let allFilms = [];
        let currentSearch = '';
        let currentSort = 'recent';

        // Carica proiezioni
        async function loadProiezioni() {
            try {
                showLoading(true);

                const params = new URLSearchParams(window.location.search);
                selectedFilmId = params.get('filmId') ? parseInt(params.get('filmId')) : null;
                
                const films = await ApiClient.get('/films?summary=true&limit=240');
                allFilms = Array.isArray(films) ? films : [];

                showLoading(false);
                renderProiezioni(allFilms);
            } catch (error) {
                showLoading(false);
                showError(error.message);
            }
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('hidden', !show);
            document.getElementById('proiezioni-grid').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
        }

        function showError(message) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('proiezioni-grid').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('error-text').textContent = message;
        }

        function applyClientFilters(films) {
            let filtered = Array.isArray(films) ? [...films] : [];

            if (currentSearch) {
                const q = currentSearch.toLowerCase();
                filtered = filtered.filter((f) => {
                    const title = String(f?.titolo || '').toLowerCase();
                    const genre = String(f?.genere || '').toLowerCase();
                    return title.includes(q) || genre.includes(q);
                });
            }

            if (currentSort === 'title') {
                filtered.sort((a, b) => String(a?.titolo || '').localeCompare(String(b?.titolo || ''), 'it'));
            } else {
                filtered.sort((a, b) => {
                    const aDate = a?.dataRilascio ? new Date(a.dataRilascio).getTime() : 0;
                    const bDate = b?.dataRilascio ? new Date(b.dataRilascio).getTime() : 0;
                    if (aDate !== bDate) return bDate - aDate;
                    return (b.id || 0) - (a.id || 0);
                });
            }

            return filtered;
        }

        function renderProiezioni(films) {
            const grid = document.getElementById('proiezioni-grid');

            let filmsToRender = films;
            if (selectedFilmId) {
                filmsToRender = films.filter(f => f.id === selectedFilmId);
            } else {
                filmsToRender = applyClientFilters(films);
            }
            
            if (filmsToRender.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <span class="material-symbols-outlined text-4xl text-on-surface-variant/50 mb-4">event_busy</span>
                        <p class="text-on-surface-variant">Nessun film trovato</p>
                        <a href="films.html" class="inline-block mt-3 text-primary-container hover:text-primary text-sm">Vai al catalogo film</a>
                    </div>
                `;
                grid.classList.remove('hidden');
                return;
            }
            
            grid.innerHTML = filmsToRender.map((film, index) => {
                const imageUrl = film.copertinaPath || 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=600&h=900&fit=crop';
                
                return `
                    <article class="rounded-xl overflow-hidden border border-outline-variant/20 hover:border-outline-variant/40 transition cursor-pointer hover-lift reveal-up bg-surface-container" style="animation-delay:${(index % 8) * 0.04}s" onclick="openFilm(${film.id})">
                        <div class="aspect-[2/3] bg-surface-container-high relative">
                            <img src="${imageUrl}" alt="${escapeHtml(film.titolo)}" class="w-full h-full object-cover" loading="lazy" />
                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                            <div class="absolute left-2 right-2 bottom-2">
                                <p class="text-xs text-white font-semibold truncate">${escapeHtml(film.titolo)}</p>
                                <p class="text-[10px] text-white/70 truncate">${escapeHtml(film.genere || '')}</p>
                            </div>
                        </div>
                    </article>
                `;
            }).join('');
            
            grid.classList.remove('hidden');
        }

        function openFilm(id) {
            window.location.href = `/scheda-film.html?id=${id}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllComponents();
            const searchInput = document.getElementById('film-search');
            const sortSelect = document.getElementById('film-sort');
            if (searchInput) {
                searchInput.addEventListener('input', () => {
                    currentSearch = String(searchInput.value || '').trim();
                    renderProiezioni(allFilms);
                });
            }
            if (sortSelect) {
                sortSelect.addEventListener('change', () => {
                    currentSort = sortSelect.value === 'title' ? 'title' : 'recent';
                    renderProiezioni(allFilms);
                });
            }
            loadProiezioni();
        });
    </script>
</body>
</html>
