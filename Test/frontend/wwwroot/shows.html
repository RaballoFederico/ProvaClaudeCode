<!DOCTYPE html>
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Show | FilmAPI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
    <div id="navbar-container"></div>
    <div class="flex flex-1">
        <div id="sidebar-container"></div>
        <main class="flex-1 p-4 md:p-8 lg:p-10 pb-20 md:pb-6">
            <section class="hero-banner p-6 md:p-8 mb-6 reveal-up">
                <div class="flex flex-col gap-4">
                    <div>
                        <span class="badge-soft mb-3">
                            <span class="material-symbols-outlined text-sm">movie_info</span>
                            Gestione show
                        </span>
                        <h1 class="font-headline text-3xl md:text-5xl font-semibold">Gestione Show</h1>
                        <p class="text-on-surface-variant mt-2">Controlla programmazione, prezzi e stato degli show per tutte le sale.</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-3 mt-1">
                        <select id="filter-cinema" class="bg-surface-container-high rounded-lg border-none"><option value="">Cinema</option></select>
                        <select id="filter-sala" class="bg-surface-container-high rounded-lg border-none"><option value="">Sala</option></select>
                        <select id="filter-film" class="bg-surface-container-high rounded-lg border-none"><option value="">Film</option></select>
                        <input id="filter-data" type="date" class="bg-surface-container-high rounded-lg border-none" />
                        <button id="open-create" class="px-4 py-2 bg-primary-container text-white rounded-lg hover-lift">Nuovo Show</button>
                    </div>
                </div>
            </section>

            <section class="bg-surface-container rounded-2xl border border-outline-variant/20 overflow-auto reveal-up delay-1">
                <table class="w-full min-w-[860px]">
                    <thead class="bg-surface-container-high text-left text-xs uppercase text-on-surface-variant">
                        <tr>
                            <th class="p-3">ID</th>
                            <th class="p-3">Film</th>
                            <th class="p-3">Sala</th>
                            <th class="p-3">Data</th>
                            <th class="p-3">Ora</th>
                            <th class="p-3">Prezzo</th>
                            <th class="p-3">Stato</th>
                            <th class="p-3">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="shows-tbody"></tbody>
                </table>
            </section>
        </main>
    </div>
    <div id="footer-container"></div>

    <div id="show-modal" class="hidden fixed inset-0 bg-black/60 z-50 p-4">
        <div class="max-w-2xl mx-auto bg-surface-container rounded-2xl p-5 border border-outline-variant/20 reveal-up">
            <div class="flex items-center justify-between mb-4">
                <h2 id="show-modal-title" class="font-headline text-xl font-bold">Nuovo Show</h2>
                <button onclick="toggleModal(false)" class="p-2 rounded-lg hover:bg-surface-container-high"><span class="material-symbols-outlined">close</span></button>
            </div>
            <form id="show-form" class="space-y-3">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <select name="salaId" id="form-sala" class="bg-surface-container-high rounded-lg border-none" required></select>
                    <select name="filmId" id="form-film" class="bg-surface-container-high rounded-lg border-none" required></select>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <input name="data" type="date" class="bg-surface-container-high rounded-lg border-none" required />
                    <input name="oraInizio" type="time" class="bg-surface-container-high rounded-lg border-none" required />
                    <input name="prezzoBase" type="number" step="0.01" min="0" class="bg-surface-container-high rounded-lg border-none" placeholder="Prezzo" />
                </div>
                <div class="flex justify-end gap-2">
                    <button type="button" onclick="toggleModal(false)" class="px-4 py-2 rounded-lg bg-surface-container-high">Annulla</button>
                    <button type="submit" class="px-4 py-2 rounded-lg bg-primary-container text-white">Salva</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/api-config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/route-guard.js"></script>
    <script src="/js/template-loader.js"></script>
    <script src="/js/api-client.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        let cinemas = [];
        let films = [];
        let sale = [];
        let shows = [];
        let editId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllComponents();
            bindEvents();
            await loadData();
        });

        function bindEvents() {
            document.getElementById('open-create').addEventListener('click', () => openCreate());
            document.getElementById('show-form').addEventListener('submit', onSubmit);

            ['filter-cinema', 'filter-sala', 'filter-film', 'filter-data'].forEach(id => {
                document.getElementById(id).addEventListener('change', applyFilters);
            });
        }

        async function loadData() {
            const windowRange = getDefaultShowWindow();
            [cinemas, films, shows] = await Promise.all([
                ApiClient.get('/cinemas'),
                ApiClient.get('/films?summary=true&limit=500'),
                ApiClient.get(`/admin/shows?fromDate=${windowRange.fromDate}&toDate=${windowRange.toDate}&take=600`)
            ]);

            const cinemaSel = document.getElementById('filter-cinema');
            cinemaSel.innerHTML = `<option value="">Cinema</option>` + cinemas.map(c => `<option value="${c.id}">${escapeHtml(c.nome)}</option>`).join('');

            const filmSel = document.getElementById('filter-film');
            filmSel.innerHTML = `<option value="">Film</option>` + films.map(f => `<option value="${f.id}">${escapeHtml(f.titolo)}</option>`).join('');

            await refreshSaleFilters();
            renderTable(shows);
        }

        async function refreshSaleFilters() {
            const cinemaId = parseInt(document.getElementById('filter-cinema').value || '0');
            const salaSel = document.getElementById('filter-sala');

            if (cinemaId) {
                sale = await ApiClient.get(`/admin/cinemas/${cinemaId}/sale`);
            } else {
                sale = [];
            }

            salaSel.innerHTML = `<option value="">Sala</option>` + sale.map(s => `<option value="${s.id}">#${s.numeroSala} ${escapeHtml(s.nome || '')}</option>`).join('');
            populateFormSale();
            populateFormFilms();
        }

        function populateFormSale() {
            const formSala = document.getElementById('form-sala');
            formSala.innerHTML = sale.map(s => `<option value="${s.id}">Sala ${s.numeroSala} - ${escapeHtml(s.tipologia)}</option>`).join('');
        }

        function populateFormFilms() {
            const formFilm = document.getElementById('form-film');
            formFilm.innerHTML = films.map(f => `<option value="${f.id}">${escapeHtml(f.titolo)}</option>`).join('');
        }

        async function applyFilters() {
            await refreshSaleFilters();
            const cinemaId = document.getElementById('filter-cinema').value;
            const salaId = document.getElementById('filter-sala').value;
            const filmId = document.getElementById('filter-film').value;
            const data = document.getElementById('filter-data').value;
            const windowRange = getDefaultShowWindow();

            const query = new URLSearchParams();
            if (cinemaId) query.set('cinemaId', cinemaId);
            if (salaId) query.set('salaId', salaId);
            if (filmId) query.set('filmId', filmId);
            if (data) {
                query.set('data', data);
            } else {
                query.set('fromDate', windowRange.fromDate);
                query.set('toDate', windowRange.toDate);
                query.set('take', '600');
            }

            shows = await ApiClient.get(`/admin/shows${query.toString() ? '?' + query.toString() : ''}`);
            renderTable(shows);
        }

        function getDefaultShowWindow() {
            const now = new Date();
            const from = new Date(now);
            from.setDate(from.getDate() - 7);
            const to = new Date(now);
            to.setDate(to.getDate() + 60);

            return {
                fromDate: formatDateToIso(from),
                toDate: formatDateToIso(to)
            };
        }

        function formatDateToIso(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function renderTable(rows) {
            const tb = document.getElementById('shows-tbody');
            if (!rows.length) {
                tb.innerHTML = `<tr><td colspan="8" class="p-4 text-on-surface-variant">Nessuno show trovato.</td></tr>`;
                return;
            }

            tb.innerHTML = rows.map(r => `
                <tr class="border-t border-outline-variant/20 hover:bg-surface-container-high/40 transition-colors">
                    <td class="p-3">${r.id}</td>
                    <td class="p-3">${escapeHtml(r.filmTitolo)}</td>
                    <td class="p-3">${escapeHtml(r.salaNome)} (${escapeHtml(r.tipologiaSala)})</td>
                    <td class="p-3">${formatDate(r.data)}</td>
                    <td class="p-3">${(r.oraInizio || '').substring(0,5)}</td>
                    <td class="p-3">${Number(r.prezzoBase || 0).toFixed(2)}</td>
                    <td class="p-3">${escapeHtml(r.stato)}</td>
                    <td class="p-3">
                        <button onclick="openEdit(${r.id})" class="px-2 py-1 bg-surface-container-high rounded text-xs hover-lift">Modifica</button>
                        <button onclick="removeShow(${r.id})" class="px-2 py-1 bg-error-container/50 rounded text-xs text-error hover-lift">Elimina</button>
                    </td>
                </tr>
            `).join('');
        }

        function openCreate() {
            editId = null;
            document.getElementById('show-modal-title').textContent = 'Nuovo Show';
            document.getElementById('show-form').reset();
            toggleModal(true);
        }

        async function openEdit(id) {
            const s = await ApiClient.get(`/admin/shows/${id}`);
            editId = id;
            document.getElementById('show-modal-title').textContent = `Modifica Show #${id}`;

            const f = document.getElementById('show-form');
            f.salaId.value = s.salaId;
            f.filmId.value = s.filmId;
            f.data.value = s.data;
            f.oraInizio.value = (s.oraInizio || '').substring(0, 5);
            f.prezzoBase.value = s.prezzoBase;

            toggleModal(true);
        }

        async function onSubmit(e) {
            e.preventDefault();
            const f = e.target;
            const payload = {
                salaId: parseInt(f.salaId.value),
                filmId: parseInt(f.filmId.value),
                data: f.data.value,
                oraInizio: f.oraInizio.value,
                prezzoBase: f.prezzoBase.value ? parseFloat(f.prezzoBase.value) : null
            };

            if (editId) {
                await ApiClient.put(`/admin/shows/${editId}`, {
                    ...payload,
                    prezzoBase: payload.prezzoBase || 0,
                    stato: 0
                });
            } else {
                await ApiClient.post('/admin/shows', payload);
            }

            toggleModal(false);
            await applyFilters();
            Utils.showNotification('Show salvato', 'success');
        }

        async function removeShow(id) {
            if (!Utils.confirmDialog('Eliminare show?')) return;
            await ApiClient.delete(`/admin/shows/${id}`);
            await applyFilters();
            Utils.showNotification('Show eliminato', 'success');
        }

        function toggleModal(show) {
            document.getElementById('show-modal').classList.toggle('hidden', !show);
        }

        function formatDate(iso) {
            if (!iso) return '-';
            return new Date(iso).toLocaleDateString('it-IT');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
</body>
</html>
