<!DOCTYPE html>
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Sale | FilmAPI</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-light-32.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-dark-32.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-dark-32.png">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon-light.ico" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon-dark.ico" media="(prefers-color-scheme: dark)">
    <link rel="shortcut icon" type="image/x-icon" href="/assets/icons/favicon-dark.ico">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
    <div id="navbar-container"></div>
    <div class="flex flex-1">
        <div id="sidebar-container"></div>
        <main class="page-shell flex-1 p-4 md:p-8 lg:p-10 pb-20 md:pb-6">
            <section class="hero-banner p-6 md:p-8 mb-6 reveal-up">
                <div class="flex flex-col gap-4">
                    <div>
                        <span class="badge-soft mb-3">
                            <span class="material-symbols-outlined text-sm">meeting_room</span>
                            Gestione sale
                        </span>
                        <h1 class="font-headline text-3xl md:text-5xl font-semibold">Gestione Sale</h1>
                        <p class="text-on-surface-variant mt-2">Configura sale, capienza e tipologia per ogni cinema della rete.</p>
                    </div>
                    <div class="mt-1 flex flex-col md:flex-row gap-3">
                        <select id="cinema-select" class="bg-surface-container-high rounded-lg border-none"></select>
                        <button id="add-sala-btn" class="px-4 py-2 bg-primary-container text-white rounded-lg hover-lift">Aggiungi Sala</button>
                    </div>
                </div>
            </section>

            <section class="bg-surface-container rounded-2xl border border-outline-variant/20 overflow-auto reveal-up delay-1">
                <table class="w-full min-w-[760px]">
                    <thead class="bg-surface-container-high text-left text-xs uppercase text-on-surface-variant">
                        <tr>
                            <th class="p-3">Sala #</th>
                            <th class="p-3">Nome</th>
                            <th class="p-3">Tipologia</th>
                            <th class="p-3">File</th>
                            <th class="p-3">Posti</th>
                            <th class="p-3">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="sale-tbody"></tbody>
                </table>
            </section>
        </main>
    </div>
    <div id="footer-container"></div>

    <div id="sale-modal" class="hidden fixed inset-0 bg-black/60 z-50 p-4 overflow-y-auto">
        <div class="max-w-2xl mx-auto bg-surface-container rounded-2xl p-5 border border-outline-variant/20 reveal-up max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h2 id="modal-title" class="font-headline text-xl font-bold">Nuova Sala</h2>
                <button onclick="toggleModal(false)" class="p-2 rounded-lg hover:bg-surface-container-high"><span class="material-symbols-outlined">close</span></button>
            </div>
            <form id="sala-form" class="space-y-3">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <input name="numeroSala" type="number" min="1" placeholder="Numero sala (automatico)" class="bg-surface-container-high rounded-lg border-none" required readonly />
                    <input name="nome" type="text" placeholder="Nome" class="bg-surface-container-high rounded-lg border-none" />
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <select name="tipologia" class="bg-surface-container-high rounded-lg border-none" required>
                        <option value="0">ISENSE</option>
                        <option value="1">XL</option>
                        <option value="2">3D</option>
                        <option value="3">2D</option>
                    </select>
                </div>
                <input type="hidden" name="configurazionePosti" id="configurazione-posti" />
                <div id="manual-config-panel" class="rounded-xl border border-outline-variant/20 bg-surface-container-high/40 p-3 space-y-3">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                        <input id="grid-rows" type="number" min="1" max="30" value="8" class="bg-surface-container-high rounded-lg border-none" placeholder="Numero file">
                        <input id="grid-cols" type="number" min="1" max="40" value="12" class="bg-surface-container-high rounded-lg border-none" placeholder="Posti per fila (max)">
                        <button type="button" id="apply-grid-size-btn" class="px-3 py-2 text-sm rounded-lg bg-surface-container-high hover-lift">Applica griglia</button>
                    </div>
                    <div class="flex flex-wrap items-center gap-2">
                        <button type="button" id="fill-grid-btn" class="px-3 py-1.5 text-xs rounded-lg bg-surface-container-high hover-lift">Attiva tutti i posti</button>
                        <button type="button" id="clear-grid-btn" class="px-3 py-1.5 text-xs rounded-lg bg-surface-container-high hover-lift">Svuota griglia</button>
                        <span class="text-xs text-on-surface-variant">Clicca sui posti per attivarli/disattivarli.</span>
                    </div>
                    <div id="seat-grid" class="overflow-auto rounded-lg border border-outline-variant/20 bg-surface-container-high/30 p-3"></div>
                </div>
                <div class="flex justify-end gap-2 pt-2">
                    <button type="button" onclick="toggleModal(false)" class="px-4 py-2 rounded-lg bg-surface-container-high">Annulla</button>
                    <button type="submit" class="px-4 py-2 rounded-lg bg-primary-container text-white">Salva</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/api-config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/route-guard.js"></script>
    <script src="/js/template-loader.js"></script>
    <script src="/js/api-client.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        let cinemas = [];
        let currentCinemaId = null;
        let editingSalaId = null;
        let manualSeatMatrix = [];
        let saleRows = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAllComponents();
            bindEvents();
            await initPage();
        });

        function bindEvents() {
            document.getElementById('cinema-select').addEventListener('change', async e => {
                currentCinemaId = parseInt(e.target.value);
                await loadSale();
            });

            document.getElementById('add-sala-btn').addEventListener('click', () => {
                editingSalaId = null;
                document.getElementById('modal-title').textContent = 'Nuova Sala';
                document.getElementById('sala-form').reset();
                initSeatMatrix(8, 12, false);
                document.querySelector('#sala-form [name="numeroSala"]').value = getNextSalaNumber();
                toggleModal(true);
            });

            document.getElementById('apply-grid-size-btn').addEventListener('click', () => {
                const rows = parseInt(document.getElementById('grid-rows').value, 10) || 1;
                const cols = parseInt(document.getElementById('grid-cols').value, 10) || 1;
                initSeatMatrix(rows, cols, false);
            });

            document.getElementById('fill-grid-btn').addEventListener('click', () => {
                fillSeatMatrix(true);
                renderSeatGrid();
            });

            document.getElementById('clear-grid-btn').addEventListener('click', () => {
                fillSeatMatrix(false);
                renderSeatGrid();
            });

            document.getElementById('sala-form').addEventListener('submit', submitSala);
        }

        async function initPage() {
            cinemas = await ApiClient.get('/cinemas');
            const sel = document.getElementById('cinema-select');
            sel.innerHTML = cinemas.map(c => `<option value="${c.id}">${escapeHtml(c.nome)} - ${escapeHtml(c.citta)}</option>`).join('');
            currentCinemaId = cinemas[0]?.id || null;
            if (currentCinemaId) await loadSale();
        }

        async function loadSale() {
            const rows = await ApiClient.get(`/admin/cinemas/${currentCinemaId}/sale`);
            saleRows = Array.isArray(rows) ? rows : [];
            const tb = document.getElementById('sale-tbody');

            if (!rows.length) {
                tb.innerHTML = `<tr><td colspan="6" class="p-4 text-on-surface-variant">Nessuna sala per questo cinema.</td></tr>`;
                return;
            }

            tb.innerHTML = rows.map(r => `
                <tr class="border-t border-outline-variant/20 hover:bg-surface-container-high/40 transition-colors">
                    <td class="p-3">${r.numeroSala}</td>
                    <td class="p-3">${escapeHtml(r.nome || '-')}</td>
                    <td class="p-3">${escapeHtml(r.tipologia)}</td>
                    <td class="p-3">${r.numeroFile}</td>
                    <td class="p-3">${r.postiTotali}</td>
                    <td class="p-3">
                        <button onclick="editSala(${r.id})" class="px-2 py-1 bg-surface-container-high rounded text-xs hover-lift">Modifica</button>
                        <button onclick="deleteSala(${r.id})" class="px-2 py-1 bg-error-container/50 rounded text-xs text-error hover-lift">Elimina</button>
                    </td>
                </tr>
            `).join('');
        }

        function getNextSalaNumber() {
            if (!Array.isArray(saleRows) || !saleRows.length) return 1;
            const max = saleRows.reduce((acc, s) => Math.max(acc, parseInt(s?.numeroSala, 10) || 0), 0);
            return max + 1;
        }

        function toggleModal(show) {
            document.getElementById('sale-modal').classList.toggle('hidden', !show);
        }

        function initSeatMatrix(rows, cols, fillActive) {
            const safeRows = Math.max(1, Math.min(30, rows || 1));
            const safeCols = Math.max(1, Math.min(40, cols || 1));
            manualSeatMatrix = Array.from({ length: safeRows }, () =>
                Array.from({ length: safeCols }, () => !!fillActive)
            );
            document.getElementById('grid-rows').value = safeRows;
            document.getElementById('grid-cols').value = safeCols;
            renderSeatGrid();
        }

        function fillSeatMatrix(active) {
            manualSeatMatrix = manualSeatMatrix.map((row) => row.map(() => !!active));
        }

        function renderSeatGrid() {
            const grid = document.getElementById('seat-grid');
            if (!grid) return;
            if (!manualSeatMatrix.length) {
                grid.innerHTML = '';
                return;
            }

            const cols = manualSeatMatrix[0].length || 1;
            grid.innerHTML = `
                <div class="inline-grid gap-1.5" style="grid-template-columns: auto repeat(${cols}, minmax(24px, 24px));">
                    ${manualSeatMatrix.map((row, rowIndex) => `
                        <div class="pr-2 text-[10px] text-on-surface-variant flex items-center justify-end">F${rowIndex + 1}</div>
                        ${row.map((isActive, colIndex) => `
                            <button
                                type="button"
                                class="seat-cell w-6 h-6 rounded ${isActive ? 'bg-primary-container text-white' : 'bg-surface-container-high text-on-surface-variant'} text-[10px] border border-outline-variant/40 hover-lift"
                                data-row="${rowIndex}"
                                data-col="${colIndex}"
                                title="Fila ${rowIndex + 1}, Posto ${colIndex + 1}">
                                ${colIndex + 1}
                            </button>
                        `).join('')}
                    `).join('')}
                </div>
            `;

            grid.querySelectorAll('.seat-cell').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const row = parseInt(btn.dataset.row, 10);
                    const col = parseInt(btn.dataset.col, 10);
                    if (!Number.isFinite(row) || !Number.isFinite(col)) return;
                    manualSeatMatrix[row][col] = !manualSeatMatrix[row][col];
                    renderSeatGrid();
                });
            });
        }

        function collectManualConfig() {
            const rows = manualSeatMatrix
                .map((row, idx) => ({
                    fila: idx + 1,
                    posti: row
                        .map((active, seatIndex) => (active ? seatIndex + 1 : null))
                        .filter((x) => Number.isFinite(x))
                }))
                .filter((r) => r.posti.length > 0);

            if (!rows.length) return null;
            return JSON.stringify({ file: rows });
        }

        function loadManualConfig(configText) {
            let parsedRows = [];
            try {
                const parsed = typeof configText === 'string' ? JSON.parse(configText) : configText;
                parsedRows = Array.isArray(parsed?.file) ? parsed.file : [];
            } catch {
                parsedRows = [];
            }

            if (!parsedRows.length) {
                initSeatMatrix(8, 12, false);
                return;
            }

            const maxFila = Math.max(...parsedRows.map((r) => parseInt(r?.fila, 10) || 0), 1);
            const maxPosti = Math.max(...parsedRows.map((r) => {
                if (Array.isArray(r?.posti)) return r.posti.length ? Math.max(...r.posti.map((p) => parseInt(p, 10) || 0)) : 0;
                return parseInt(r?.posti, 10) || 0;
            }), 1);
            initSeatMatrix(maxFila, maxPosti, false);

            parsedRows.forEach((r) => {
                const rowIndex = (parseInt(r?.fila, 10) || 1) - 1;
                if (rowIndex < 0 || rowIndex >= manualSeatMatrix.length) return;
                if (Array.isArray(r?.posti)) {
                    r.posti.forEach((seat) => {
                        const seatIndex = (parseInt(seat, 10) || 1) - 1;
                        if (seatIndex >= 0 && seatIndex < maxPosti) manualSeatMatrix[rowIndex][seatIndex] = true;
                    });
                } else {
                    const count = Math.max(0, Math.min(maxPosti, parseInt(r?.posti, 10) || 0));
                    for (let i = 0; i < count; i += 1) manualSeatMatrix[rowIndex][i] = true;
                }
            });

            renderSeatGrid();
        }

        async function submitSala(e) {
            e.preventDefault();
            const f = e.target;
            const manualConfig = collectManualConfig();
            if (!manualConfig) {
                Utils.showNotification('Inserisci almeno una fila valida (fila + posti)', 'error');
                return;
            }

            const payload = {
                numeroSala: parseInt(f.numeroSala.value),
                nome: f.nome.value || null,
                tipologia: parseInt(f.tipologia.value),
                numeroFile: manualSeatMatrix.length,
                postiPerFila: null,
                configurazionePosti: manualConfig
            };

            if (editingSalaId) {
                await ApiClient.put(`/admin/sale/${editingSalaId}`, {
                    ...payload,
                    attiva: true
                });
            } else {
                await ApiClient.post(`/admin/cinemas/${currentCinemaId}/sale`, payload);
            }

            toggleModal(false);
            await loadSale();
            Utils.showNotification('Sala salvata', 'success');
        }

        async function editSala(id) {
            const sala = await ApiClient.get(`/admin/sale/${id}`);
            editingSalaId = id;
            document.getElementById('modal-title').textContent = `Modifica Sala #${sala.numeroSala}`;
            toggleModal(true);

            const f = document.getElementById('sala-form');
            f.numeroSala.value = sala.numeroSala;
            f.nome.value = sala.nome || '';
            f.tipologia.value = tipologiaToValue(sala.tipologia);
            f.configurazionePosti.value = sala.configurazionePosti || '';
            loadManualConfig(sala.configurazionePosti || JSON.stringify({
                file: Array.from({ length: sala.numeroFile || 8 }, (_, i) => ({
                    fila: i + 1,
                    posti: Array.from({ length: sala.postiPerFila || 10 }, (__ , p) => p + 1)
                }))
            }));
        }

        async function deleteSala(id) {
            if (!Utils.confirmDialog('Eliminare questa sala?')) return;
            try {
                await ApiClient.delete(`/admin/sale/${id}`);
                Utils.showNotification('Sala eliminata', 'success');
                await loadSale();
            } catch (e) {
                Utils.showNotification(e.message || 'Impossibile eliminare sala', 'error');
            }
        }

        function tipologiaToValue(t) {
            if (t === 'ISENSE') return 0;
            if (t === 'XL') return 1;
            if (t === 'TRE_D') return 2;
            return 3;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
</body>
</html>
