<!DOCTYPE html>
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reimposta Password - FilmHub</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/styles.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'primary-container': '#e50914',
                        'secondary': '#e9c176',
                        'background': '#131313',
                        'surface': '#131313',
                        'surface-container': '#201f1f',
                        'surface-container-high': '#2a2a2a',
                        'on-surface': '#e5e2e1',
                        'on-surface-variant': '#e9bcb6',
                        'outline-variant': '#5e3f3b'
                    },
                    fontFamily: {
                        headline: ['Manrope'],
                        body: ['Inter']
                    }
                }
            }
        }
    </script>
</head>
<body class="auth-page bg-background min-h-screen">
    <button onclick="Theme.toggle()" class="fixed top-4 right-4 p-2.5 rounded-full bg-surface-container-high text-on-surface-variant border border-outline-variant/20 z-30">
        <span data-theme-toggle-icon class="material-symbols-outlined">light_mode</span>
    </button>

    <main class="auth-shell mx-auto reveal-up">
        <section class="auth-spotlight reveal-up delay-1 hidden lg:block">
            <span class="section-eyebrow mb-5 inline-flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">security</span>
                Password Update
            </span>
            <h1 class="font-headline text-3xl md:text-4xl text-on-surface">Imposta una nuova password</h1>
            <p class="mt-3 text-sm md:text-base text-on-surface-variant">Scegli una password robusta, con almeno 8 caratteri, per proteggere il tuo account.</p>
        </section>

        <section class="auth-card auth-card-compact p-6 md:p-8 reveal-up delay-2">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary-container mb-4 shadow-xl shadow-primary-container/20">
                    <span class="material-symbols-outlined text-3xl text-white">lock</span>
                </div>
                <h2 class="font-headline text-3xl text-on-surface tracking-tight">Reimposta password</h2>
                <p class="text-sm text-on-surface-variant mt-1">Inserisci e conferma la tua nuova password.</p>
            </div>

            <form id="reset-form" class="space-y-5">
                <div>
                    <label for="new-password" class="block text-sm font-medium text-on-surface-variant mb-2">Nuova password</label>
                    <input id="new-password" type="password" minlength="8" required
                        class="w-full px-4 py-3 bg-surface-container-high border border-outline-variant/30 rounded-xl text-on-surface placeholder-on-surface-variant/50 focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all duration-200">
                </div>

                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-on-surface-variant mb-2">Conferma password</label>
                    <input id="confirm-password" type="password" minlength="8" required
                        class="w-full px-4 py-3 bg-surface-container-high border border-outline-variant/30 rounded-xl text-on-surface placeholder-on-surface-variant/50 focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all duration-200">
                </div>

                <button type="submit" class="app-btn app-btn-primary w-full py-3 px-4 rounded-xl font-semibold hover-lift">
                    Aggiorna password
                </button>
            </form>

            <p id="message" class="mt-4 text-sm text-on-surface-variant"></p>

            <div class="mt-6 text-center">
                <a href="login.html" class="text-sm text-primary-container hover:opacity-80 inline-flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">arrow_back</span>
                    Torna al login
                </a>
            </div>
        </section>
    </main>

<script src="js/theme.js"></script>
<script src="/js/api-config.js"></script>
<script src="js/auth.js"></script>
<script src="/js/api-client.js"></script>
<script src="js/pages/reimposta-password.js"></script>
</body>
</html>
